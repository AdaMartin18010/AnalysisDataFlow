# =============================================================================
# Flink 测试环境 Kubernetes 部署配置
# 用途: 测试集群部署、集成测试、性能基准测试
# 版本: Flink 1.18+, Kubernetes 1.25+
# 包含: ConfigMap + JobManager Service + JobManager Deployment + 
#       TaskManager Deployment + PersistentVolume
# =============================================================================

# ---------------------------------------------
# 1. Namespace 定义
# ---------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: flink-test
  labels:
    environment: test
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: streaming-platform

---
# ---------------------------------------------
# 2. ConfigMap - Flink 配置
# ---------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: flink-test
  labels:
    app: flink
data:
  flink-conf.yaml: |
    # 基础配置
    jobmanager.memory.process.size: 2048m
    taskmanager.memory.process.size: 4096m
    taskmanager.numberOfTaskSlots: 8
    parallelism.default: 4
    
    # 高可用配置
    high-availability: zookeeper
    high-availability.zookeeper.quorum: zookeeper.flink-test:2181
    high-availability.zookeeper.path.root: /flink-test
    high-availability.cluster-id: test-cluster
    high-availability.storageDir: file:///opt/flink/ha
    
    # Checkpoint 配置
    state.backend: rocksdb
    state.checkpoint-storage: filesystem
    state.checkpoints.dir: file:///opt/flink/checkpoints
    state.savepoints.dir: file:///opt/flink/savepoints
    execution.checkpointing.interval: 10s
    execution.checkpointing.min-pause-between-checkpoints: 5s
    execution.checkpointing.timeout: 5m
    
    # RocksDB 配置
    state.backend.rocksdb.memory.managed: true
    state.backend.incremental: true
    
    # Metrics 配置
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: 9249
    
    # 重启策略
    restart-strategy: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 5s
    restart-strategy.exponential-delay.max-backoff: 60s
    
    # Web UI
    rest.port: 8081
    rest.bind-address: 0.0.0.0
    
    # JVM 配置
    env.java.opts.jobmanager: -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError
    env.java.opts.taskmanager: -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError

  log4j-console.properties: |
    rootLogger.level = INFO
    rootLogger.appenderRef.console.ref = ConsoleAppender
    appender.console.name = ConsoleAppender
    appender.console.type = CONSOLE
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n
    
    logger.flink.name = org.apache.flink
    logger.flink.level = INFO
    logger.akka.name = akka
    logger.akka.level = WARN

---
# ---------------------------------------------
# 3. PersistentVolumeClaim - Checkpoint 存储
# ---------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-checkpoint-pvc
  namespace: flink-test
  labels:
    app: flink
    component: storage
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard  # 根据集群调整
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-ha-pvc
  namespace: flink-test
  labels:
    app: flink
    component: ha-storage
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
# ---------------------------------------------
# 4. Service - JobManager
# ---------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: flink-test
  labels:
    app: flink
    component: jobmanager
spec:
  type: ClusterIP
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
      protocol: TCP
    - name: blob
      port: 6124
      targetPort: 6124
      protocol: TCP
    - name: query
      port: 6125
      targetPort: 6125
      protocol: TCP
    - name: ui
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: prom
      port: 9249
      targetPort: 9249
      protocol: TCP

---
# ---------------------------------------------
# 5. Service - JobManager (Headless for HA)
# ---------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager-headless
  namespace: flink-test
  labels:
    app: flink
    component: jobmanager
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123

---
# ---------------------------------------------
# 6. Deployment - JobManager
# ---------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: flink-test
  labels:
    app: flink
    component: jobmanager
spec:
  replicas: 1  # 测试环境单实例，HA 由 ZooKeeper 提供
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
        prometheus.io/path: "/"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: flink
                    component: taskmanager
                topologyKey: kubernetes.io/hostname
      containers:
        - name: jobmanager
          image: flink:1.18-scala_2.12-java11
          imagePullPolicy: IfNotPresent
          args: ["jobmanager"]
          ports:
            - containerPort: 6123
              name: rpc
            - containerPort: 6124
              name: blob
            - containerPort: 6125
              name: query
            - containerPort: 8081
              name: ui
            - containerPort: 9249
              name: prom
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf
            - name: checkpoint-volume
              mountPath: /opt/flink/checkpoints
            - name: ha-volume
              mountPath: /opt/flink/ha
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            tcpSocket:
              port: 6123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
        - name: checkpoint-volume
          persistentVolumeClaim:
            claimName: flink-checkpoint-pvc
        - name: ha-volume
          persistentVolumeClaim:
            claimName: flink-ha-pvc

---
# ---------------------------------------------
# 7. Deployment - TaskManager
# ---------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: flink-test
  labels:
    app: flink
    component: taskmanager
spec:
  replicas: 2  # 测试环境 2 个 TaskManager
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
        prometheus.io/path: "/"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: flink
                    component: taskmanager
                topologyKey: kubernetes.io/hostname
      containers:
        - name: taskmanager
          image: flink:1.18-scala_2.12-java11
          imagePullPolicy: IfNotPresent
          args: ["taskmanager"]
          ports:
            - containerPort: 6121
              name: data
            - containerPort: 6122
              name: rpc
            - containerPort: 9249
              name: prom
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf
            - name: checkpoint-volume
              mountPath: /opt/flink/checkpoints
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
          livenessProbe:
            tcpSocket:
              port: 6122
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6122
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
        - name: checkpoint-volume
          persistentVolumeClaim:
            claimName: flink-checkpoint-pvc

---
# ---------------------------------------------
# 8. HorizontalPodAutoscaler - TaskManager
# ---------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flink-taskmanager-hpa
  namespace: flink-test
  labels:
    app: flink
    component: taskmanager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flink-taskmanager
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

---
# ---------------------------------------------
# 9. Ingress - Web UI 访问
# ---------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flink-ingress
  namespace: flink-test
  labels:
    app: flink
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: flink-test.local  # 根据实际情况修改
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flink-jobmanager
                port:
                  number: 8081

---
# ---------------------------------------------
# 10. NetworkPolicy - 网络安全
# ---------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flink-network-policy
  namespace: flink-test
  labels:
    app: flink
spec:
  podSelector:
    matchLabels:
      app: flink
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: flink
      ports:
        - protocol: TCP
          port: 6121
        - protocol: TCP
          port: 6122
        - protocol: TCP
          port: 6123
        - protocol: TCP
          port: 6124
        - protocol: TCP
          port: 6125
    - from: []
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 9249
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: flink

---
# ---------------------------------------------
# 11. ServiceAccount & RBAC
# ---------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-service-account
  namespace: flink-test
  labels:
    app: flink

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
  namespace: flink-test
  labels:
    app: flink
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-role-binding
  namespace: flink-test
  labels:
    app: flink
subjects:
  - kind: ServiceAccount
    name: flink-service-account
    namespace: flink-test
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io

# =============================================================================
# 部署说明:
# -----------------------------------------------------------------------------
# 1. 前置条件:
#    - Kubernetes 集群 (1.25+)
#    - kubectl 配置完成
#    - StorageClass 可用
#    - Ingress Controller 已部署 (可选)
#
# 2. 部署命令:
#    kubectl apply -f k8s-flink-test.yaml
#
# 3. 验证部署:
#    kubectl get pods -n flink-test
#    kubectl logs -n flink-test -l component=jobmanager
#
# 4. 访问 Web UI:
#    kubectl port-forward -n flink-test svc/flink-jobmanager 8081:8081
#    然后访问 http://localhost:8081
#
# 5. 扩容 TaskManager:
#    kubectl scale deployment flink-taskmanager -n flink-test --replicas=4
#
# 6. 清理资源:
#    kubectl delete -f k8s-flink-test.yaml
# -----------------------------------------------------------------------------
# =============================================================================
