# =============================================================================
# Flink 生产环境配置文件
# 环境: Production Cluster / 大规模分布式部署
# 版本: Flink 1.18+
# 说明: 高可用、高性能、安全的企业级配置
# =============================================================================

# ============================================
# 1. 基础集群配置 (Production)
# ============================================

# JobManager 内存配置 (生产环境)
jobmanager.memory.process.size: ${JM_MEM:-4096m}
jobmanager.memory.heap.size: ${JM_HEAP:-2048m}
jobmanager.memory.off-heap.size: ${JM_OFFHEAP:-512m}
jobmanager.memory.jvm-metaspace.size: ${JM_METASPACE:-512m}

# TaskManager 内存配置 (生产环境)
taskmanager.memory.process.size: ${TM_MEM:-16384m}
taskmanager.memory.flink.size: ${TM_FLINK:-12288m}
taskmanager.memory.managed.size: ${TM_MANAGED:-4096m}
taskmanager.memory.network.fraction: 0.12
taskmanager.memory.network.min: 512m
taskmanager.memory.network.max: 2048m

# TaskManager Slot 配置
taskmanager.numberOfTaskSlots: ${TM_SLOTS:-16}

# 并行度默认配置
parallelism.default: ${DEFAULT_PARALLELISM:-8}

# ============================================
# 2. 高可用配置 (HA)
# ============================================

# 高可用模式
high-availability: zookeeper
high-availability.zookeeper.quorum: ${ZOOKEEPER_QUORUM}
high-availability.zookeeper.path.root: /flink
high-availability.cluster-id: ${CLUSTER_ID:-flink-production}
high-availability.storageDir: ${HA_STORAGE_DIR}

# JobManager 高可用
high-availability.jobmanager.port: 6123

# ZooKeeper 客户端配置
high-availability.zookeeper.client.session-timeout: 60000
high-availability.zookeeper.client.connection-timeout: 15000
high-availability.zookeeper.client.retry-wait: 5000
high-availability.zookeeper.client.max-retry-attempts: 3

# JobManager 故障恢复
jobmanager.execution.failover-strategy: region
jobmanager.execution.attached-execution: false

# ============================================
# 3. Checkpoint 配置 (生产环境)
# ============================================

# Checkpoint 基础配置
execution.checkpointing.interval: ${CHECKPOINT_INTERVAL:-60000}
execution.checkpointing.min-pause-between-checkpoints: ${CHECKPOINT_MIN_PAUSE:-30000}
execution.checkpointing.timeout: ${CHECKPOINT_TIMEOUT:-600000}
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.mode: EXACTLY_ONCE

# Unaligned Checkpoint (低延迟场景启用)
execution.checkpointing.unaligned.enabled: ${UNALIGNED_CHECKPOINT:-false}
execution.checkpointing.unaligned.max-aligned-checkpoint-size: 1mb
execution.checkpointing.max-aligned-checkpoint-size-enabled: true

# Checkpoint 存储 (生产环境使用分布式存储)
state.backend: ${STATE_BACKEND:-rocksdb}
state.checkpoint-storage: ${CHECKPOINT_STORAGE:-filesystem}
state.checkpoints.dir: ${CHECKPOINT_DIR}
state.savepoints.dir: ${SAVEPOINT_DIR}

# RocksDB 状态后端详细配置
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.fixed-per-slot: ${ROCKSDB_MEMORY_PER_SLOT:-1024mb}
state.backend.rocksdb.memory.high-prio-pool-ratio: 0.1
state.backend.rocksdb.threads.threads-number: ${ROCKSDB_THREADS:-4}
state.backend.rocksdb.predefined-options: FLASH_SSD_OPTIMIZED

# RocksDB 性能调优
state.backend.rocksdb.compression: LZ4
state.backend.rocksdb.compaction.style: LEVEL
state.backend.rocksdb.compaction.level.target-file-size-base: 64mb
state.backend.rocksdb.compaction.level.max-size-level-base: 512mb
state.backend.rocksdb.max-background-jobs: 4
state.backend.rocksdb.max-open-files: -1

# 增量 Checkpoint
state.backend.incremental: true
state.backend.local-recovery: true

# Checkpoint 清理策略
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

# ============================================
# 4. State 配置
# ============================================

# State TTL 配置
state.backend.rocksdb.compaction.style: LEVEL
state.backend.rocksdb.compaction.level.target-file-size-base: 64mb

# 状态大小限制
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.fixed-per-slot: 1024mb

# 状态快照压缩
state.backend.rocksdb.timer-service.factory: ROCKSDB

# ============================================
# 5. Web UI 配置 (生产环境安全配置)
# ============================================

rest.port: 8081
rest.bind-address: 0.0.0.0
rest.address: 0.0.0.0

# 禁用 Web 提交 (生产环境通过 CLI 或 API 提交)
web.submit.enable: false
web.cancel.enable: false

# Web 访问控制
rest.authorization.enabled: ${REST_AUTH_ENABLED:-true}
rest.cookie.max-age: 86400

# 历史服务器配置
jobmanager.archive.fs.dir: ${HISTORY_DIR}
historyserver.web.address: 0.0.0.0
historyserver.web.port: 8082
historyserver.archive.fs.dir: ${HISTORY_DIR}
historyserver.archive.fs.refresh-interval: 10000

# ============================================
# 6. 资源配置与调度
# ============================================

# 细粒度资源管理
scheduler-mode: ${SCHEDULER_MODE:-reactive}
cluster.evenly-spread-out-slots: true

# 资源调度超时
resourcemanager.taskmanager-timeout: 30000
resourcemanager.jobmanager-timeout: 60000

# 任务槽共享组
slot.idle.timeout: 50000
slot.request.timeout: 300000

# ============================================
# 7. 容错与重试配置
# ============================================

# 重启策略 (生产环境使用指数退避)
restart-strategy: exponential-delay
restart-strategy.exponential-delay.initial-backoff: 10s
restart-strategy.exponential-delay.max-backoff: 300s
restart-strategy.exponential-delay.backoff-multiplier: 2.0
restart-strategy.exponential-delay.reset-backoff-threshold: 600s
restart-strategy.exponential-delay.jitter-fraction: 0.1

# 失败率重启策略配置
restart-strategy.failure-rate.max-failures-per-interval: ${MAX_FAILURES:-10}
restart-strategy.failure-rate.failure-rate-interval: 5min
restart-strategy.failure-rate.delay: 30s

# 任务失败重试
execution.retry-strategy.fixed-delay.delay: 10s
execution.retry-strategy.fixed-delay.max-attempts: 3

# 全局失败处理
jobmanager.execution.attached-execution: false

# ============================================
# 8. 网络与连接配置
# ============================================

# RPC 配置 (生产环境适当增大)
akka.ask.timeout: 120s
akka.lookup.timeout: 120s
akka.client.timeout: 180s
akka.tcp.timeout: 120s
akka.framesize: 134217728b  # 128MB

# 网络缓冲区
taskmanager.memory.network.fraction: 0.12
taskmanager.memory.network.min: 512m
taskmanager.memory.network.max: 2048m

# 数据交换配置
taskmanager.data.bind-port: 0
taskmanager.data.port: 6122

# Blob 服务器配置
blob.server.port: 6124
blob.service.cleanup.interval: 3600
blob.fetch.retries: 3
blob.fetch.num-concurrent: 50
blob.fetch.backlog: 1000

# ============================================
# 9. Metrics 与监控 (生产环境全面监控)
# ============================================

# Metrics 报告器配置
metrics.reporters: ${METRICS_REPORTERS:-prom,jmx,influxdb}

# Prometheus 报告器
metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prom.port: 9249-9259

# JMX 报告器
metrics.reporter.jmx.class: org.apache.flink.metrics.jmx.JMXReporter
metrics.reporter.jmx.port: 8789-8799

# InfluxDB 报告器 (可选)
metrics.reporter.influxdb.class: org.apache.flink.metrics.influxdb.InfluxdbReporter
metrics.reporter.influxdb.host: ${INFLUXDB_HOST:-influxdb}
metrics.reporter.influxdb.port: ${INFLUXDB_PORT:-8086}
metrics.reporter.influxdb.db: ${INFLUXDB_DB:-flink_metrics}
metrics.reporter.influxdb.interval: 60 SECONDS

# Metrics 范围配置
metrics.scope.jm: production.jobmanager
metrics.scope.jm.job: production.jobmanager.job.<job_name>
metrics.scope.tm: production.taskmanager.<tm_id>
metrics.scope.tm.job: production.taskmanager.<tm_id>.job.<job_name>
metrics.scope.task: production.taskmanager.<tm_id>.job.<job_name>.task.<task_name>
metrics.scope.operator: production.taskmanager.<tm_id>.job.<job_name>.task.<task_name>.<operator_name>

# 系统资源监控
metrics.system-resource: true
metrics.system-resource-probing-interval: 5000

# Latency 指标
latency-tracking.interval: 100
latency-tracking.sample-number: 100

# ============================================
# 10. 安全配置 (Production)
# ============================================

# SSL/TLS 配置
security.ssl.internal.enabled: ${SSL_INTERNAL_ENABLED:-false}
security.ssl.internal.keystore: ${SSL_KEYSTORE_PATH:-}
security.ssl.internal.keystore-password: ${SSL_KEYSTORE_PASSWORD:-}
security.ssl.internal.key-password: ${SSL_KEY_PASSWORD:-}
security.ssl.internal.truststore: ${SSL_TRUSTSTORE_PATH:-}
security.ssl.internal.truststore-password: ${SSL_TRUSTSTORE_PASSWORD:-}

security.ssl.rest.enabled: ${SSL_REST_ENABLED:-false}
security.ssl.rest.keystore: ${SSL_KEYSTORE_PATH:-}
security.ssl.rest.keystore-password: ${SSL_KEYSTORE_PASSWORD:-}

# Kerberos 认证
security.kerberos.login.use-ticket-cache: ${KRB_USE_TICKET_CACHE:-true}
security.kerberos.login.keytab: ${KRB_KEYTAB:-}
security.kerberos.login.principal: ${KRB_PRINCIPAL:-}
security.kerberos.login.contexts: Client,KafkaClient

# 委托令牌
security.delegation.tokens.enabled: true
security.delegation.token.provider.hadoop.enabled: ${HADOOP_TOKEN_ENABLED:-true}
security.delegation.token.provider.kafka.enabled: ${KAFKA_TOKEN_ENABLED:-true}

# 网络加密
security.ssl.algorithms: TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_128_CBC_SHA256

# ============================================
# 11. JVM 配置 (Production 优化)
# ============================================

# JobManager JVM 参数
env.java.opts.jobmanager: >
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=200
  -XX:InitiatingHeapOccupancyPercent=35
  -XX:+ParallelRefProcEnabled
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath=${FLINK_LOG_DIR}/heap_dump_jm.hprof
  -XX:+CrashOnOutOfMemoryError
  -XX:ErrorFile=${FLINK_LOG_DIR}/hs_err_pid_%p.log
  -XX:+PrintGCDetails
  -XX:+PrintGCDateStamps
  -XX:+PrintGCTimeStamps
  -Xloggc:${FLINK_LOG_DIR}/gc_jm.log
  -XX:+UseGCLogFileRotation
  -XX:NumberOfGCLogFiles=5
  -XX:GCLogFileSize=50M
  -Djava.security.krb5.conf=${KRB5_CONF:-/etc/krb5.conf}

# TaskManager JVM 参数
env.java.opts.taskmanager: >
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=200
  -XX:InitiatingHeapOccupancyPercent=35
  -XX:+ParallelRefProcEnabled
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath=${FLINK_LOG_DIR}/heap_dump_tm.hprof
  -XX:+CrashOnOutOfMemoryError
  -XX:ErrorFile=${FLINK_LOG_DIR}/hs_err_pid_%p.log
  -XX:+PrintGCDetails
  -XX:+PrintGCDateStamps
  -XX:+PrintGCTimeStamps
  -Xloggc:${FLINK_LOG_DIR}/gc_tm.log
  -XX:+UseGCLogFileRotation
  -XX:NumberOfGCLogFiles=5
  -XX:GCLogFileSize=50M
  -XX:+UnlockExperimentalVMOptions
  -XX:+UseContainerSupport
  -Djava.security.krb5.conf=${KRB5_CONF:-/etc/krb5.conf}

# ============================================
# 12. Blob 服务器配置
# ============================================

blob.server.port: 6124
blob.service.cleanup.interval: 3600
blob.fetch.retries: 3
blob.fetch.num-concurrent: 50
blob.fetch.backlog: 1000

# ============================================
# 13. 心跳与超时配置
# ============================================

# 心跳间隔
heartbeat.interval: 10000
heartbeat.timeout: 50000

# 任务管理器超时
taskmanager.timeout: 60000

# 资源管理器超时
resourcemanager.taskmanager-timeout: 30000
resourcemanager.jobmanager-timeout: 60000

# ============================================
# 14. 文件系统配置
# ============================================

# 默认文件系统
fs.default-scheme: ${DEFAULT_FS:-s3p://}

# S3 配置 (AWS)
fs.s3a.access.key: ${AWS_ACCESS_KEY_ID:-}
fs.s3a.secret.key: ${AWS_SECRET_ACCESS_KEY:-}
fs.s3a.endpoint: ${S3_ENDPOINT:-}
fs.s3a.path.style.access: ${S3_PATH_STYLE:-true}
fs.s3a.connection.timeout: 10000
fs.s3a.socket.timeout: 60000
fs.s3a.attempts.maximum: 20

# HDFS 配置 (如使用)
fs.hdfs.hadoopconf: ${HADOOP_CONF_DIR:-}

# Azure Blob 存储
fs.azure.account.key.${AZURE_ACCOUNT_NAME}.blob.core.windows.net: ${AZURE_ACCOUNT_KEY:-}

# GCS 配置
fs.gs.project.id: ${GCP_PROJECT_ID:-}
fs.gs.auth.service.account.enable: true

# ============================================
# 15. 类加载配置
# ============================================

classloader.resolve-order: parent-first
classloader.check-leaked-classloader: true
classloader.parent-first-patterns.additional: org.apache.flink.
classloader.prefer-user-definer-classloader: true

# ============================================
# 16. 管道配置
# ============================================

pipeline.object-reuse: ${OBJECT_REUSE:-false}
pipeline.compression: LZ4
pipeline.auto-type-registration: true

# ============================================
# 17. 扩展配置
# ============================================

# 作业调度
akka.fork-join-executor.parallelism-factor: 2.0
akka.fork-join-executor.parallelism-min: 8
akka.fork-join-executor.parallelism-max: 64

# 网络栈优化
akka.tcp.maximum-frame-size: 134217728b
akka.tcp.tcp-nodelay: on
akka.tcp.tcp-keepalive: on

# =============================================================================
# 环境变量说明:
# -----------------------------------------------------------------------------
# | 变量名 | 必需 | 默认值 | 说明 |
# |--------|------|--------|------|
# | ZOOKEEPER_QUORUM | 是 | - | ZooKeeper 连接字符串 |
# | CHECKPOINT_DIR | 是 | - | Checkpoint 存储路径 |
# | SAVEPOINT_DIR | 是 | - | Savepoint 存储路径 |
# | HA_STORAGE_DIR | 是 | - | HA 元数据存储路径 |
# | HISTORY_DIR | 是 | - | 历史记录存储路径 |
# | TM_MEM | 否 | 16384m | TaskManager 内存 |
# | JM_MEM | 否 | 4096m | JobManager 内存 |
# | TM_SLOTS | 否 | 16 | 每个 TM 的 Slot 数 |
# | STATE_BACKEND | 否 | rocksdb | 状态后端 |
# | SSL_INTERNAL_ENABLED | 否 | false | 内部通信 SSL |
# | SSL_REST_ENABLED | 否 | false | REST API SSL |
# -----------------------------------------------------------------------------
# =============================================================================
