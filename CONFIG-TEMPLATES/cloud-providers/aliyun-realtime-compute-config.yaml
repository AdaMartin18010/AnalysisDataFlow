# =============================================================================
# 阿里云实时计算 Flink 配置
# 服务: 阿里云实时计算 Flink 版 (Ververica Platform)
# 版本: Flink 1.15+
# 特性: 全托管 Flink 服务、与阿里云生态深度集成
# =============================================================================

# ============================================
# 1. 实时计算 Flink 版基础配置
# ============================================

# 控制台创建集群 (阿里云 CLI)
# aliyun vpc CreateVSwitch --RegionId cn-hangzhou \
#   --ZoneId cn-hangzhou-b \
#   --CidrBlock 172.16.0.0/24 \
#   --VpcId vpc-xxx

# 创建 VVP 工作空间
# aliyun vvp CreateNamespace --RegionId cn-hangzhou \
#   --Namespace flink-production \
#   --VpcId vpc-xxx \
#   --VSwitchId vsw-xxx \
#   --SecurityGroupId sg-xxx

# ============================================
# 2. OSS (对象存储) 配置
# ============================================

# Flink 配置文件
flink-conf.yaml: |
  # 基础配置
  jobmanager.memory.process.size: 4096m
  taskmanager.memory.process.size: 16384m
  taskmanager.numberOfTaskSlots: 8
  
  # Checkpoint 存储 - OSS
  state.backend: rocksdb
  state.checkpoint-storage: filesystem
  state.checkpoints.dir: oss://flink-bucket/checkpoints
  state.savepoints.dir: oss://flink-bucket/savepoints
  
  # OSS 配置
  fs.oss.endpoint: oss-cn-hangzhou.aliyuncs.com
  fs.oss.accessKeyId: ${ALICLOUD_ACCESS_KEY_ID}
  fs.oss.accessKeySecret: ${ALICLOUD_ACCESS_KEY_SECRET}
  fs.oss.securityToken: ${ALICLOUD_SECURITY_TOKEN}  # 如使用 STS
  
  # OSS 性能优化
  fs.oss.connection.max: 200
  fs.oss.multipart.download.size: 128mb
  fs.oss.multipart.upload.threshold: 512mb
  fs.oss.upload.part.size: 128mb

# Hadoop Core-Site 配置
core-site.xml: |
  <configuration>
    <property>
      <name>fs.oss.impl</name>
      <value>org.apache.hadoop.fs.aliyun.oss.AliyunOSSFileSystem</value>
    </property>
    <property>
      <name>fs.oss.endpoint</name>
      <value>oss-cn-hangzhou.aliyuncs.com</value>
    </property>
    <property>
      <name>fs.oss.accessKeyId</name>
      <value>${ALICLOUD_ACCESS_KEY_ID}</value>
    </property>
    <property>
      <name>fs.oss.accessKeySecret</name>
      <value>${ALICLOUD_ACCESS_KEY_SECRET}</value>
    </property>
    <!-- 性能优化 -->
    <property>
      <name>fs.oss.connection.secure.enabled</name>
      <value>true</value>
    </property>
    <property>
      <name>fs.oss.upload.part.size</name>
      <value>134217728</value> <!-- 128MB -->
    </property>
    <property>
      <name>fs.oss.download.thread.count</name>
      <value>8</value>
    </property>
  </configuration>

# ============================================
# 3. DataHub / Log Service (SLS) 集成
# ============================================

# DataHub 连接器配置
datahub.endpoint: http://dh-cn-hangzhou.aliyuncs.com
datahub.project: my-project
datahub.access.id: ${ALICLOUD_ACCESS_KEY_ID}
datahub.access.key: ${ALICLOUD_ACCESS_KEY_SECRET}

# Log Service (SLS) 配置
sls.endpoint: cn-hangzhou.log.aliyuncs.com
sls.project: my-sls-project
sls.logstore: my-logstore
sls.access.id: ${ALICLOUD_ACCESS_KEY_ID}
sls.access.key: ${ALICLOUD_ACCESS_KEY_SECRET}

# 消费组配置
sls.consumer.group: flink-consumer-group
sls.consumer.begin-position: BEGIN_CURSOR

# ============================================
# 4. RDS / PolarDB 集成
# ============================================

# JDBC 连接器配置
url: jdbc:mysql://rm-xxx.mysql.rds.aliyuncs.com:3306/mydb
user: flinkuser
password: ${RDS_PASSWORD}
driver: com.mysql.jdbc.Driver

# 连接池优化
connection.max-retry-timeout: 60
connection.check-timeout.seconds: 60

# PolarDB 配置
url: jdbc:mysql://pc-xxx.polardb.rds.aliyuncs.com:3306/mydb
useServerPrepStmts: true
cachePrepStmts: true
prepStmtCacheSize: 250
prepStmtCacheSqlLimit: 2048

# ============================================
# 5. Hologres 集成 (实时数仓)
# ============================================

# Hologres 连接器配置
hologres.endpoint: hgpostcn-xxx-cn-hangzhou.hologres.aliyuncs.com:80
hologres.database: mydb
hologres.username: ACCESS_ID
hologres.password: ${HOLOGRES_ACCESS_KEY}
hologres.table: my_table

# 写入模式
hologres.connection.pool.size: 5
hologres.mutate.thread.size: 3
hologres.batch.size: 500
hologres.batch.write.timeout.ms: 5000

# ============================================
# 6. Message Queue (RocketMQ) 集成
# ============================================

# RocketMQ 连接器配置
rocketmq.nameserver.addr: http://MQ_INST_xxx.cn-hangzhou.mq-internal.aliyuncs.com:8080
rocketmq.access.key: ${ALICLOUD_ACCESS_KEY_ID}
rocketmq.secret.key: ${ALICLOUD_ACCESS_KEY_SECRET}
rocketmq.topic: my-topic
rocketmq.consumer.group: flink-consumer-group
rocketmq.consumer.thread.count: 20

# ============================================
# 7. 阿里云监控集成 (ARMS / SLS)
# ============================================

# ARMS 应用监控
arms.app.name: flink-application
arms.license.key: ${ARMS_LICENSE_KEY}

# Metrics 配置
metrics.reporters: sls
metrics.reporter.sls.class: com.alibaba.flink.metrics.SLSReporter
metrics.reporter.sls.endpoint: cn-hangzhou.log.aliyuncs.com
metrics.reporter.sls.project: flink-metrics
metrics.reporter.sls.logstore: flink-metrics-store
metrics.reporter.sls.access.id: ${ALICLOUD_ACCESS_KEY_ID}
metrics.reporter.sls.access.key: ${ALICLOUD_ACCESS_KEY_SECRET}
metrics.reporter.sls.interval: 60 SECONDS

# 日志配置 (SLS)
log4j.appender.sls=com.aliyun.openservices.log.log4j.LoghubAppender
log4j.appender.sls.projectName=flink-logs
log4j.appender.sls.logstore=flink-logstore
log4j.appender.sls.endpoint=cn-hangzhou.log.aliyuncs.com
log4j.appender.sls.accessKeyId=${ALICLOUD_ACCESS_KEY_ID}
log4j.appender.sls.accessKey=${ALICLOUD_ACCESS_KEY_SECRET}

# ============================================
# 8. RAM 角色与权限配置
# ============================================

# RAM 角色策略
{
  "Version": "1",
  "Statement": [
    {
      "Effect": "Allow",
      "Action": [
        "oss:GetObject",
        "oss:PutObject",
        "oss:DeleteObject",
        "oss:ListBucket"
      ],
      "Resource": [
        "acs:oss:*:*:flink-bucket",
        "acs:oss:*:*:flink-bucket/*"
      ]
    },
    {
      "Effect": "Allow",
      "Action": [
        "datahub:GetTopic",
        "datahub:ListShard",
        "datahub:GetCursor",
        "datahub:GetRecords",
        "datahub:PutRecords"
      ],
      "Resource": "*"
    },
    {
      "Effect": "Allow",
      "Action": [
        "log:GetCursorOrData",
        "log:CreateConsumerGroup",
        "log:UpdateConsumerGroup",
        "log:DeleteConsumerGroup",
        "log:ListConsumerGroup",
        "log:ConsumerGroupUpdateCheckPoint",
        "log:ConsumerGroupHeartBeat",
        "log:GetConsumerGroupCheckPoint"
      ],
      "Resource": "*"
    },
    {
      "Effect": "Allow",
      "Action": [
        "mq:QueryTopicRoute",
        "mq:PopMessage",
        "mq:AckMessage"
      ],
      "Resource": "*"
    }
  ]
}

# ============================================
# 9. VPC 与网络安全
# ============================================

# 安全组配置
# 入站规则:
# - TCP 8081: Flink Web UI (限内部 IP)
# - TCP 6123: JobManager RPC (限内部 IP)
# - TCP 9249: Prometheus Metrics

# 出站规则:
# - TCP 80/443: OSS/DataHub/SLS
# - TCP 3306: RDS/PolarDB
# - TCP 5432: Hologres

# 专有网络配置
# - 创建 VPC (172.16.0.0/16)
# - 创建交换机 (172.16.1.0/24)
# - 配置 NAT 网关用于外网访问
# - 配置 VPN/专线用于内网访问

# ============================================
# 10. 自动扩缩容配置
# ============================================

# VVP 自动扩缩容规则
{
  "scalingRules": [
    {
      "name": "scale-up-cpu",
      "metricType": "CPU",
      "threshold": 70,
      "operator": "GreaterThan",
      "scalingAction": "ScaleUp",
      "adjustmentStep": 2
    },
    {
      "name": "scale-down-cpu",
      "metricType": "CPU",
      "threshold": 30,
      "operator": "LessThan",
      "scalingAction": "ScaleDown",
      "adjustmentStep": 1
    }
  ],
  "minReplicas": 2,
  "maxReplicas": 20,
  "cooldownPeriod": 300
}

# ============================================
# 11. 高可用配置
# ============================================

# 使用 ZooKeeper 或阿里云提供的 HA 方案
high-availability: zookeeper
high-availability.zookeeper.quorum: zk-1:2181,zk-2:2181,zk-3:2181
high-availability.zookeeper.path.root: /flink
high-availability.cluster-id: aliyun-flink-cluster
high-availability.storageDir: oss://flink-bucket/ha

# 或者使用阿里云托管的 HA (推荐)
# 在 VVP 控制台中启用高可用

# ============================================
# 12. 费用优化策略
# ============================================

# 1. 使用抢占式实例
# 在 VVP 中配置使用抢占式实例降低计算成本 (最高节省 70%)

# 2. 存储分层
# - 热数据: 标准存储
# - 温数据: 低频访问
# - 冷数据: 归档存储

# 3. 预留实例
# 购买 1 年/3 年预留实例获得大幅折扣

# 4. 存储生命周期
{
  "Rules": [
    {
      "ID": "expire-checkpoints",
      "Status": "Enabled",
      "Filter": {
        "Prefix": "checkpoints/"
      },
      "Expiration": {
        "Days": 30
      }
    }
  ]
}

# =============================================================================
# 阿里云部署最佳实践:
# -----------------------------------------------------------------------------
# 1. 使用 RAM 角色代替 AccessKey (更安全)
# 2. 配置 VPC 内网访问降低延迟和费用
# 3. 使用 Hologres 作为实时数仓后端
# 4. 配置 SLS 统一日志采集和分析
# 5. 启用 ARMS 应用性能监控
# -----------------------------------------------------------------------------
#
# 服务依赖关系:
# -----------------------------------------------------------------------------
# ┌─────────────────────────────────────────────┐
# │         阿里云实时计算 Flink 版              │
# │  ┌─────────────────────────────────────┐   │
# │  │         Flink Cluster               │   │
# │  └─────────────────────────────────────┘   │
# └───────────────────┬─────────────────────────┘
#                     │
#    ┌────────┬───────┼───────┬────────┐
#    ▼        ▼       ▼       ▼        ▼
# ┌──────┐ ┌──────┐ ┌────┐ ┌──────┐ ┌────────┐
# │ OSS  │ │DataHub│ │SLS │ │Hologres│ │RocketMQ│
# └──────┘ └──────┘ └────┘ └──────┘ └────────┘
# -----------------------------------------------------------------------------
#
# 地域选择建议:
# -----------------------------------------------------------------------------
# | 地域 | 适用场景 |
# |------|----------|
# | 华东1 (杭州) | 通用业务 |
# | 华东2 (上海) | 金融、企业 |
# | 华北2 (北京) | 政府、国企 |
# | 华南1 (深圳) | 游戏、视频 |
