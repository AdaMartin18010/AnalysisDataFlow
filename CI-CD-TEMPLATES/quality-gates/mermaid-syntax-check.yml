# =============================================================================
# AnalysisDataFlow Mermaid图表语法检查配置
# =============================================================================
# 描述: 定义Mermaid图表语法验证的规则
# 用途: 确保文档中Mermaid图表的语法正确性
# =============================================================================

# 支持的图表类型
supported_diagram_types:
  - flowchart      # 流程图
  - graph          # 图形（TB/TD/LR/RL/BT）
  - sequenceDiagram   # 时序图
  - classDiagram   # 类图
  - stateDiagram-v2   # 状态图
  - erDiagram      # ER图
  - gantt          # 甘特图
  - pie            # 饼图
  - gitGraph       # Git图
  - journey        # 用户旅程图
  - requirementDiagram  # 需求图
  - mindmap        # 思维导图
  - timeline       # 时间线
  - quadrantChart  # 象限图
  - xychart-beta   # XY图表

# 图表使用推荐
recommended_diagrams:
  # 概念定义文档推荐使用
  concept_definition:
    - mindmap        # 概念关系思维导图
    - classDiagram   # 类型定义
    
  # 架构文档推荐使用
  architecture:
    - flowchart      # 架构流程
    - component      # 组件关系
    
  # 算法/流程文档推荐使用
  algorithm:
    - flowchart      # 算法流程
    - sequenceDiagram   # 交互流程

# 语法检查规则
syntax_rules:
  # 基本语法检查
  basic:
    valid_diagram_type: true    # 图表类型有效
    closed_code_block: true     # 代码块正确关闭
    non_empty: true             # 非空图表
    
  # 命名规范
  naming:
    node_id_pattern: '^[a-zA-Z0-9_]+$'  # 节点ID格式
    max_node_id_length: 50      # 最大节点ID长度
    
  # 图表大小限制
  size_limits:
    max_nodes: 100              # 最大节点数
    max_edges: 200              # 最大边数
    max_lines: 500              # 最大行数

# 风格规范
style_rules:
  # 推荐使用主题
  preferred_theme: default
  
  # 颜色使用
  color_usage:
    allow_custom_colors: true
    accessibility_check: true   # 检查颜色对比度
    
  # 字体大小
  font_size:
    minimum: 10
    maximum: 48

# 验证配置
validation:
  # 验证方法
  method: cli  # cli, api, online
  
  # CLI配置（使用mmdc）
  cli:
    command: mmdc
    timeout: 30              # 验证超时（秒）
    output_format: svg       # 验证输出格式
    
  # 在线API配置（备用）
  api:
    endpoint: https://mermaid.ink/img/
    timeout: 30

# 错误级别定义
error_levels:
  # 致命错误（阻止合并）
  fatal:
    - syntax_error          # 语法错误
    - unknown_diagram_type  # 未知图表类型
    - unclosed_code_block   # 未关闭代码块
    
  # 错误（需要修复）
  error:
    - invalid_node_id       # 无效节点ID
    - duplicate_node_id     # 重复节点ID
    - self_loop             # 自循环（可能的设计问题）
    
  # 警告（建议修复）
  warning:
    - diagram_too_large     # 图表过大
    - low_contrast_colors   # 颜色对比度低
    - unused_nodes          # 未使用的节点
    
  # 提示（可选优化）
  info:
    - could_use_subgraph    # 可以使用子图优化
    - missing_styles        # 缺少样式定义

# 统计和报告
reporting:
  # 统计信息
  statistics:
    count_by_type: true      # 按类型统计
    total_diagrams: true     # 总图表数
    syntax_errors: true      # 语法错误数
    
  # 输出格式
  output_formats:
    - text
    - json
    - html
    
  # 报告内容
  include:
    - error_details         # 错误详情
    - line_numbers          # 行号
    - suggestions           # 修复建议
    - code_snippets         # 代码片段

# 忽略配置
ignore:
  # 忽略的文件模式
  file_patterns:
    - '**/vendor/**'
    - '**/third_party/**'
    
  # 忽略的图表（通过注释标记）
  markers:
    - '<!-- mermaid:ignore -->'
    - '<!-- skip-validation -->'
