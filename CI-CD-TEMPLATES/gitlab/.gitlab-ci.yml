# =============================================================================
# AnalysisDataFlow GitLab CI/CD 配置模板
# =============================================================================
# 描述: GitLab CI/CD 完整流水线配置
# 功能:
#   - 文档验证
#   - 链接检查
#   - 统计更新
#   - 质量门禁
#   - 自动部署
# 配置说明:
#   - 使用GitLab Runner执行
#   - 支持缓存加速
#   - 包含测试、构建、部署阶段
# =============================================================================

# -----------------------------------------------------------------------------
# 全局配置
# -----------------------------------------------------------------------------

# 使用的Docker镜像
image: python:3.11-slim

# 阶段定义
stages:
  - validate        # 验证阶段
  - quality         # 质量检查阶段
  - report          # 报告生成阶段
  - deploy          # 部署阶段

# 全局变量
variables:
  # Python配置
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  
  # 项目配置
  PROJECT_NAME: "AnalysisDataFlow"
  
  # 质量门禁开关
  QUALITY_GATE_ENABLED: "true"
  
  # 部署配置
  PREVIEW_DOMAIN: "analysis-dataflow-preview.gitlab.io"
  
  # GitLab Pages配置
  PAGES_DOMAIN: "gitlab.io"
  PAGES_PREFIX: "$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME"

# 缓存配置 - 加速后续构建
cache:
  paths:
    - .cache/pip/
    - node_modules/

# 默认配置
.default:
  tags:
    - docker
  interruptible: true

# -----------------------------------------------------------------------------
# 前置脚本 - 每个Job执行前运行
# -----------------------------------------------------------------------------
before_script:
  # 显示环境信息
  - echo "======================================"
  - echo "🚀 AnalysisDataFlow CI/CD Pipeline"
  - echo "======================================"
  - echo "项目: $CI_PROJECT_NAME"
  - echo "分支: $CI_COMMIT_REF_NAME"
  - echo "提交: $CI_COMMIT_SHORT_SHA"
  - echo "======================================"
  
  # 安装依赖
  - apt-get update -qq && apt-get install -y -qq nodejs npm git
  - python -m pip install --upgrade pip -q
  - pip install pyyaml markdown pymdown-extensions requests -q
  - npm install -g @mermaid-js/mermaid-cli
  
  # 创建工作目录
  - mkdir -p reports artifacts

# -----------------------------------------------------------------------------
# 验证阶段 Jobs
# -----------------------------------------------------------------------------

# Job 1: 定理注册表验证
validate:theorem-registry:
  stage: validate
  script:
    - echo "::group::验证定理注册表"
    - |
      python3 << 'SCRIPT'
      import re
      import sys
      from pathlib import Path
      from collections import defaultdict
      
      def validate():
          theorems = defaultdict(list)
          pattern = r'(Thm|Lemma|Def|Prop|Cor)-([SKF])-(\d{2})-(\d{2})'
          
          for md_file in Path('.').rglob('*.md'):
              if any(p.startswith('.') for p in md_file.parts):
                  continue
              try:
                  content = md_file.read_text(encoding='utf-8')
                  for match in re.finditer(pattern, content):
                      theorems[match.group(0)].append(str(md_file))
              except:
                  continue
          
          duplicates = {k: v for k, v in theorems.items() if len(v) > 1}
          
          print(f"唯一定理: {len(theorems)}")
          print(f"重复数量: {len(duplicates)}")
          
          if duplicates:
              print("❌ 发现重复定理编号")
              for tid, files in list(duplicates.items())[:5]:
                  print(f"  {tid}: {files}")
              sys.exit(1)
          else:
              print("✅ 定理注册表验证通过")
              sys.exit(0)
      
      validate()
      SCRIPT
    - echo "::endgroup::"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week

# Job 2: 交叉引用验证
validate:cross-references:
  stage: validate
  script:
    - echo "::group::验证交叉引用"
    - |
      python3 << 'SCRIPT'
      import re
      import sys
      from pathlib import Path
      
      def validate():
          md_files = [f for f in Path('.').rglob('*.md') 
                     if not any(p.startswith('.') for p in f.parts)]
          
          broken = []
          total = 0
          
          for file_path in md_files:
              try:
                  content = file_path.read_text(encoding='utf-8')
                  links = re.findall(r'\[([^\]]+)\]\(([^)]+)\)', content)
                  
                  for text, url in links:
                      if url.startswith(('http', '#', 'mailto:')):
                          continue
                      total += 1
                      
                      url_clean = url.split('#')[0]
                      if url_clean:
                          target = file_path.parent / url_clean
                          if not target.exists() and not (target.parent / (target.name + '.md')).exists():
                              broken.append({'source': str(file_path), 'text': text, 'url': url})
              except:
                  continue
          
          print(f"总链接: {total}")
          print(f"无效链接: {len(broken)}")
          
          if broken:
              print("❌ 发现无效链接")
              for link in broken[:10]:
                  print(f"  {link['source']} -> [{link['text']}]({link['url']})")
              sys.exit(1)
          else:
              print("✅ 所有交叉引用有效")
              sys.exit(0)
      
      validate()
      SCRIPT
    - echo "::endgroup::"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week

# Job 3: Mermaid图表验证
validate:mermaid:
  stage: validate
  script:
    - echo "::group::验证Mermaid图表"
    - |
      python3 << 'SCRIPT'
      import re
      import sys
      import subprocess
      from pathlib import Path
      from tempfile import NamedTemporaryFile
      
      def validate():
          md_files = [f for f in Path('.').rglob('*.md') 
                     if not any(p.startswith('.') for p in f.parts)]
          
          total = 0
          errors = []
          
          for file_path in md_files:
              try:
                  content = file_path.read_text(encoding='utf-8')
                  diagrams = re.findall(r'```mermaid\s*\n(.*?)```', content, re.DOTALL)
                  
                  for idx, diagram in enumerate(diagrams):
                      total += 1
                      with NamedTemporaryFile(mode='w', suffix='.mmd', delete=False) as f:
                          f.write(diagram)
                          temp_path = f.name
                      
                      try:
                          result = subprocess.run(['mmdc', '-i', temp_path, '-o', '/dev/null'],
                                                  capture_output=True, text=True, timeout=30)
                          if result.returncode != 0:
                              errors.append({'file': str(file_path), 'index': idx})
                      except:
                          pass
                      finally:
                          Path(temp_path).unlink(missing_ok=True)
              except:
                  continue
          
          print(f"总图表: {total}")
          print(f"错误数: {len(errors)}")
          
          if errors:
              print("❌ 发现语法错误")
              sys.exit(1)
          else:
              print("✅ 所有Mermaid图表语法正确")
              sys.exit(0)
      
      validate()
      SCRIPT
    - echo "::endgroup::"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week

# -----------------------------------------------------------------------------
# 质量检查阶段 Jobs
# -----------------------------------------------------------------------------

# Job 4: 链接全面检查
quality:link-check:
  stage: quality
  script:
    - echo "::group::全面链接检查"
    - |
      python3 << 'SCRIPT'
      import re
      import requests
      from pathlib import Path
      from concurrent.futures import ThreadPoolExecutor
      from collections import defaultdict
      import time
      
      def check():
          md_files = [f for f in Path('.').rglob('*.md') 
                     if not any(p.startswith('.') for p in f.parts)]
          
          external_urls = set()
          url_to_links = defaultdict(list)
          
          # 收集外部链接
          for file_path in md_files:
              try:
                  content = file_path.read_text(encoding='utf-8')
                  for match in re.finditer(r'\[([^\]]+)\]\(([^)]+)\)', content):
                      text, url = match.groups()
                      if url.startswith('http'):
                          external_urls.add(url)
                          url_to_links[url].append((str(file_path), text))
              except:
                  continue
          
          print(f"发现 {len(external_urls)} 个唯一外部链接")
          
          # 检查URL
          broken = []
          
          def check_url(url):
              try:
                  headers = {'User-Agent': 'GitLab-CI-LinkChecker/1.0'}
                  resp = requests.head(url, timeout=10, headers=headers, allow_redirects=True)
                  if resp.status_code >= 400:
                      return url, resp.status_code
              except:
                  return url, 'Error'
              return None, None
          
          with ThreadPoolExecutor(max_workers=5) as executor:
              results = list(executor.map(check_url, external_urls))
          
          broken = [(url, status) for url, status in results if url]
          
          print(f"无效链接: {len(broken)}")
          
          if broken:
              for url, status in broken[:10]:
                  print(f"  [{status}] {url}")
              return False
          else:
              print("✅ 所有外部链接有效")
              return True
      
      import sys
      sys.exit(0 if check() else 1)
      SCRIPT
    - echo "::endgroup::"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  allow_failure: true  # 外部链接检查允许失败（可能因网络问题误报）
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week

# Job 5: 文档统计更新
quality:update-stats:
  stage: quality
  script:
    - echo "::group::更新文档统计"
    - |
      python3 << 'SCRIPT'
      import re
      import json
      from pathlib import Path
      
      def update():
          stats = {'Struct': 0, 'Knowledge': 0, 'Flink': 0, 'total': 0}
          
          for dir_name in ['Struct', 'Knowledge', 'Flink']:
              dir_path = Path(dir_name)
              if dir_path.exists():
                  count = len(list(dir_path.rglob('*.md')))
                  stats[dir_name] = count
                  stats['total'] += count
          
          print(json.dumps(stats, indent=2))
          
          # 更新PROJECT-TRACKING.md
          tracking = Path('PROJECT-TRACKING.md')
          if tracking.exists():
              content = tracking.read_text(encoding='utf-8')
              
              for dir_name, count in stats.items():
                  if dir_name != 'total':
                      content = re.sub(rf'({dir_name}/.*?\d+%.*?)(\d+)(文档)',
                                     rf'\g<1>{count}\g<3>', content)
              
              tracking.write_text(content, encoding='utf-8')
              print("✅ 统计已更新")
          
          return True
      
      update()
      SCRIPT
    - echo "::endgroup::"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
  artifacts:
    paths:
      - PROJECT-TRACKING.md
    expire_in: 1 week

# -----------------------------------------------------------------------------
# 报告生成阶段 Jobs
# -----------------------------------------------------------------------------

# Job 6: 生成综合报告
report:generate:
  stage: report
  needs:
    - validate:theorem-registry
    - validate:cross-references
    - validate:mermaid
  script:
    - echo "::group::生成综合报告"
    - |
      python3 << 'SCRIPT'
      from datetime import datetime
      from pathlib import Path
      
      def generate():
          report = f"""# GitLab CI 验证报告

**生成时间:** {datetime.now().isoformat()}
**管道ID:** {env.CI_PIPELINE_ID}
**提交:** {env.CI_COMMIT_SHORT_SHA}
**分支:** {env.CI_COMMIT_REF_NAME}

## 验证结果

| 检查项 | 状态 |
|--------|------|
| 定理注册表 | ✅ |
| 交叉引用 | ✅ |
| Mermaid图表 | ✅ |

---
*由GitLab CI自动生成*
"""
          Path('reports/ci-report.md').write_text(report, encoding='utf-8')
          print("✅ 报告已生成")
      
      import os
      os.environ['CI_COMMIT_SHORT_SHA'] = os.environ.get('CI_COMMIT_SHORT_SHA', 'unknown')
      os.environ['CI_COMMIT_REF_NAME'] = os.environ.get('CI_COMMIT_REF_NAME', 'unknown')
      os.environ['CI_PIPELINE_ID'] = os.environ.get('CI_PIPELINE_ID', 'unknown')
      generate()
      SCRIPT
    - echo "::endgroup::"
  artifacts:
    paths:
      - reports/
    expire_in: 1 month
    reports:
      junit: reports/*.xml

# -----------------------------------------------------------------------------
# 部署阶段 Jobs
# -----------------------------------------------------------------------------

# Job 7: 部署到GitLab Pages
pages:
  stage: deploy
  needs:
    - report:generate
  script:
    - echo "::group::部署到GitLab Pages"
    
    # 构建静态站点
    - mkdir -p public
    - cp -r *.md public/ 2>/dev/null || true
    - cp -r Struct Knowledge Flink public/ 2>/dev/null || true
    - cp reports/ci-report.md public/ 2>/dev/null || true
    
    # 生成索引页面
    - |
      python3 << 'SCRIPT'
      from pathlib import Path
      
      html = '''<!DOCTYPE html>
      <html>
      <head>
          <meta charset="UTF-8">
          <title>AnalysisDataFlow</title>
          <style>
              body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 40px; }
              h1 { color: #2563eb; }
              a { color: #2563eb; }
          </style>
      </head>
      <body>
          <h1>📊 AnalysisDataFlow</h1>
          <p>流计算知识体系文档</p>
          <h2>目录</h2>
          <ul>
              <li><a href="Struct/">Struct/ - 形式理论</a></li>
              <li><a href="Knowledge/">Knowledge/ - 知识结构</a></li>
              <li><a href="Flink/">Flink/ - Flink专项</a></li>
          </ul>
          <hr>
          <p><a href="ci-report.md">查看CI报告</a></p>
      </body>
      </html>'''
      
      Path('public/index.html').write_text(html, encoding='utf-8')
      print("✅ Pages站点已准备")
      SCRIPT
    
    - echo "::endgroup::"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://$CI_PROJECT_NAMESPACE.gitlab.io/$CI_PROJECT_NAME

# -----------------------------------------------------------------------------
# 可选: MR预览部署
# -----------------------------------------------------------------------------

# Job 8: MR预览（可选）
deploy:preview:
  stage: deploy
  script:
    - echo "::group::部署MR预览"
    - echo "MR预览部署在此配置中需要额外设置"
    - echo "可以考虑使用GitLab Review Apps"
    - echo "::endgroup::"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  environment:
    name: review/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    url: https://$CI_PROJECT_NAMESPACE.gitlab.io/-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html
    on_stop: stop_preview
    auto_stop_in: 1 week

# Job 9: 停止MR预览
stop_preview:
  stage: deploy
  script:
    - echo "停止预览环境"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  environment:
    name: review/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    action: stop
