* CheckpointMC.cfg - TLC模型检验配置文件
* 用于验证CheckpointCoordinator规约

CONSTANTS
    Tasks = {t1, t2, t3}
    MaxCheckpointId = 2
    MaxAttempts = 2
    TimeoutPeriod = 5

INIT MC_Init
NEXT MC_Next

* 安全属性
INVARIANT MC_TypeInvariant
INVARIANT MC_NoDeadlock

* 活性属性
PROPERTY MC_Completeness

* 状态空间约束
CONSTRAINT globalClock < 20

* 对称性优化
SYMMETRY TaskSymmetry

* 检查死锁
CHECK_DEADLOCK TRUE

* 工作线程数
WORKER_THREADS 4
