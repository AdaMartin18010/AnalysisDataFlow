* ExactlyOnceMC.cfg - TLC模型检验配置文件
* 用于验证ExactlyOnce规约（两阶段提交）

CONSTANTS
    p1 = p1
    p2 = p2
    tx1 = tx1
    tx2 = tx2
    Participants = {p1, p2}
    Transactions = {tx1, tx2}
    MaxRetries = 1
    CoordinatorId = "coord"

INIT MC_Init
NEXT MC_Next

* 安全属性
INVARIANT MC_TypeInvariant
INVARIANT MC_Atomicity

* 活性属性
PROPERTY MC_EventuallyCommits

* 状态空间约束
CONSTRAINT globalClock < 15

* 检查死锁
CHECK_DEADLOCK TRUE

* 工作线程数
WORKER_THREADS 4
