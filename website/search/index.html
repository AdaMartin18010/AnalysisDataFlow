        <!-- 顶部导航栏 -->
        <header class="top-header">

                </button>
            </div>
        </header>

        <!-- 页面内容 -->
        <div class="content-wrapper">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索定理、定义、引理... (例如: Thm-S-17-01, Checkpoint, Exactly-Once)">
                </div>
                
                <div class="search-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="Thm">定理 (Thm)</button>
                    <button class="filter-btn" data-filter="Def">定义 (Def)</button>
                    <button class="filter-btn" data-filter="Lemma">引理 (Lemma)</button>
                    <button class="filter-btn" data-filter="Prop">命题 (Prop)</button>
                    <button class="filter-btn" data-filter="Cor">推论 (Cor)</button>
                </div>
                
                <div class="search-results" id="searchResults">
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>输入关键词开始搜索</p>
                        <p style="font-size: 0.85rem; margin-top: 8px;">支持模糊匹配，可搜索编号、名称或描述</p>
                    </div>
                </div>
            </div>
            
            <section class="features" style="margin-top: 48px;">
                <h2><i class="fas fa-lightbulb"></i> 搜索提示</h2>
                <div class="feature-grid">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-fingerprint"></i>
                        </div>
                        <h3>按编号搜索</h3>
                        <p>直接输入完整编号如 Thm-S-17-01</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-tag"></i>
                        </div>
                        <h3>按名称搜索</h3>
                        <p>输入定理/定义名称关键词</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-filter"></i>
                        </div>
                        <h3>类型筛选</h3>
                        <p>使用过滤器按类型筛选结果</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-magic"></i>
                        </div>
                        <h3>模糊匹配</h3>
                        <p>支持拼写容错和相似匹配</p>
                    </div>
                </div>
            </section>
        </div>
