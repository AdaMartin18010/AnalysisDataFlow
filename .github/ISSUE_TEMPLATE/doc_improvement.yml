name: 📝 文档改进
labels: ["type:docs", "triage"]
body:
  - type: markdown
    attributes:
      value: 感谢帮助改进文档！请提供以下信息：

  - type: dropdown
    id: type
    attributes:
      label: 改进类型
      options:
        - 补充示例
        - 优化表达
        - 添加可视化
        - 补充引用
        - 其他
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: 目标文件
      placeholder: 例如：Knowledge/2.1-streaming-patterns.md
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 当前状态
      description: 当前文档存在的问题

  - type: textarea
    id: proposal
    attributes:
      label: 建议改进
      description: 您建议如何改进？
    validations:
      required: true
