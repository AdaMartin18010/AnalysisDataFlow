name: 🐛 错误报告
labels: ["type:bug", "triage"]
body:
  - type: markdown
    attributes:
      value: 感谢您帮助改进项目！请提供以下信息：

  - type: dropdown
    id: type
    attributes:
      label: 错误类型
      options:
        - 内容错误
        - 链接失效
        - 排版问题
        - 定理/定义编号问题
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: 文件路径
      placeholder: 例如：Struct/1.1-streaming-foundation.md
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的正确内容

  - type: textarea
    id: references
    attributes:
      label: 参考依据
      description: 权威来源链接或文献
