name: ❓ 问题询问
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: 欢迎提问！请描述您的问题：

  - type: dropdown
    id: type
    attributes:
      label: 问题类型
      options:
        - 概念理解
        - 文档内容
        - 使用帮助
        - 贡献流程
        - 其他
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: 相关文件（如适用）
      placeholder: 例如：Struct/1.1-streaming-foundation.md

  - type: textarea
    id: question
    attributes:
      label: 您的问题
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景/上下文
      description: 有助于理解问题的背景信息
