name: ✨ 功能建议
labels: ["type:feature", "triage"]
body:
  - type: markdown
    attributes:
      value: 感谢您的建议！请描述您的想法：

  - type: dropdown
    id: type
    attributes:
      label: 建议类型
      options:
        - 新主题
        - 章节重组
        - 工具/流程改进
        - 其他
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: 目标领域
      placeholder: 例如：Struct/、Flink/、全局改进
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 详细描述
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 动机/背景
      description: 为什么这个建议对项目有益？

  - type: textarea
    id: references
    attributes:
      label: 参考资源
