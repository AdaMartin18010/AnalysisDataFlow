name: 🐛 错误报告
about: 报告项目中的错误或问题
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 错误报告
        感谢您帮助我们发现错误！请尽可能详细地描述问题，以便我们快速定位和修复。

  - type: dropdown
    id: bug_type
    attributes:
      label: 错误类型
      description: 请选择错误的类型
      options:
        - 内容错误（概念错误、公式错误、逻辑错误）
        - 引用错误（引用失效或引用内容不准确）
        - 格式错误（Markdown 渲染问题、排版错乱）
        - 定理/定义问题（编号冲突、重复定义、表述矛盾）
        - 链接错误（内部链接失效、外部链接 404）
        - Mermaid 图表渲染失败
        - 交叉引用错误
        - 其他错误
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 所属领域
      description: 请选择错误所属的知识领域
      options:
        - Struct/ 形式理论与分析
        - Knowledge/ 工程知识与设计模式
        - Flink/ Flink 专项技术
        - 构建/工具脚本
        - CI/CD 工作流
        - 其他
    validations:
      required: true

  - type: input
    id: file_path
    attributes:
      label: 文件路径
      description: 请提供包含错误的文件路径
      placeholder: "例如: Struct/2.3-lambda-architecture.md"
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: 错误描述
      description: 请详细描述发现的错误
      placeholder: |
        清晰准确地描述错误是什么...
        包括：
        - 错误的具体表现
        - 涉及的概念/定理/定义
        - 错误的影响范围
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期望的正确内容
      description: 请描述您认为正确的内容应该是什么
      placeholder: "描述正确的表述、公式、逻辑等..."
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: 复现步骤（如适用）
      description: 如果是工具/脚本错误，请提供复现步骤
      placeholder: |
        1. 运行命令 '...'
        2. 查看文件 '...'
        3. 出现错误

  - type: textarea
    id: evidence
    attributes:
      label: 证据支持
      description: 提供证明这是错误的权威依据
      placeholder: |
        - 论文引用：[标题](DOI链接)
        - 官方文档：[文档链接]
        - 标准规范：[规范名称和章节]
        - 逻辑推导过程...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 评估此错误对项目的影响程度
      options:
        - 严重 - 根本性概念错误，会误导读者
        - 重要 - 明显的错误，影响理解
        - 一般 - 轻微错误，不影响主要结论
        - 微小 - 拼写错误、格式问题等
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 修复优先级
      description: 建议的修复优先级
      options:
        - P0 - 必须立即修复
        - P1 - 应该在1周内修复
        - P2 - 可以在1个月内修复
        - P3 - 可在维护周期内修复
      default: 1

  - type: textarea
    id: suggested_fix
    attributes:
      label: 建议的修复方案
      description: 如果您有具体的修复建议，请在此说明
      placeholder: "提供建议的修正内容或修复方法..."

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      description: 请确认以下事项
      options:
        - label: 我已经确认此错误尚未被报告（搜索了现有 Issue）
        - label: 我提供了足够的证据支持我的判断
        - label: 我愿意协助验证修复结果
