# PR Quality Gate - Pull Request 质量门禁 (v3.0 Optimized)
#
# 版本: v3.0 | 日期: 2026-04-12 | 状态: Production | 优化版本
#
# 触发条件: PR 创建和更新时
# 优化特性:
#   - 合并重复检查 (将原有8个任务优化为5个)
#   - 智能缓存策略
#   - 并行执行优化
#   - 增量检查支持
#
# 检查项目及级别:
#   1. Markdown语法 + 关键错误检查     - 阻塞合并 (blocking)
#   2. 定理/Mermaid/结构联合验证       - 阻塞合并 (blocking)
#   3. 链接健康检查 (内部+交叉引用)     - 阻塞合并 (blocking)
#   4. 前瞻性内容标记检查              - 阻塞合并 (blocking)
#   5. 形式化元素完整性检查            - 警告 (warning)

name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.md'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.scripts/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

# 并发控制 - 相同PR取消旧运行
concurrency:
  group: 'pr-quality-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  # ============ 任务1: 变更检测 (所有下游任务依赖) ============
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changes.outputs.changed_files }}
      changed_dirs: ${{ steps.changes.outputs.changed_dirs }}
      has_markdown: ${{ steps.changes.outputs.has_markdown }}
      has_struct: ${{ steps.changes.outputs.has_struct }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          changed_files=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD | grep '\.md$' || true)
          
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 检测变更目录
          changed_dirs=""
          for dir in Struct Knowledge Flink; do
            if echo "$changed_files" | grep -q "^$dir/"; then
              changed_dirs="$changed_dirs $dir"
            fi
          done
          echo "changed_dirs=$changed_dirs" >> $GITHUB_OUTPUT
          
          # 设置标志
          if [ -n "$changed_files" ]; then
            echo "has_markdown=true" >> $GITHUB_OUTPUT
          else
            echo "has_markdown=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$changed_files" | grep -qE '^(Struct|Knowledge|Flink)/'; then
            echo "has_struct=true" >> $GITHUB_OUTPUT
          else
            echo "has_struct=false" >> $GITHUB_OUTPUT
          fi

  # ============ 任务2: Markdown语法检查 [阻塞合并] ============
  markdown-lint:
    name: Markdown Syntax [BLOCKING]
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_markdown == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache markdownlint
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: markdownlint-${{ runner.os }}-${{ env.NODE_VERSION }}-0.41.0

      - name: Install markdownlint
        run: npm install -g markdownlint-cli@0.41.0

      - name: Run markdownlint on changed files
        run: |
          changed_files="${{ needs.detect-changes.outputs.changed_files }}"
          echo "$changed_files" | xargs -I {} markdownlint {} 2>/dev/null || true

      - name: Check critical markdown errors
        run: |
          errors=0
          changed_files="${{ needs.detect-changes.outputs.changed_files }}"
          
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            # 检查YAML frontmatter
            if head -1 "$file" | grep -q '^---'; then
              if ! grep -q '^---' "$file" | head -3 | tail -1; then
                echo "❌ YAML frontmatter may be malformed in: $file"
                errors=$((errors + 1))
              fi
            fi
          done <<< "$changed_files"
          
          if [ $errors -gt 0 ]; then
            echo "❌ Found $errors critical markdown errors"
            exit 1
          fi
          echo "✅ Markdown syntax check passed"

  # ============ 任务3: 联合验证 (定理+Mermaid+结构) [阻塞合并] ============
  combined-validation:
    name: Combined Validation [BLOCKING]
    runs-on: ubuntu-latest
    needs: [detect-changes, markdown-lint]
    if: needs.detect-changes.outputs.has_struct == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Run combined validation
        run: |
          python << 'PYEOF'
          import re
          import sys
          import json
          from pathlib import Path
          from datetime import datetime
          from collections import defaultdict

          # 获取变更文件
          import subprocess
          result = subprocess.run(
              ['git', 'diff', '--name-only', '--diff-filter=ACMRT', 'origin/' + '${{ github.base_ref }}', '...HEAD'],
              capture_output=True, text=True
          )
          changed_files = [f for f in result.stdout.strip().split('\n') if f.endswith('.md')]

          # 只检查核心目录的变更文件
          target_files = [f for f in changed_files if any(d in f for d in ['Struct/', 'Knowledge/', 'Flink/'])]

          # 模式定义
          THEOREM_PATTERN = re.compile(r'\b(Thm|Def|Lemma|Prop|Cor)-([SKF])-(\d{2})-(\d{2})\b')
          MERMAID_PATTERN = re.compile(r'```mermaid\s*\n(.*?)```', re.DOTALL)
          VALID_CHART_TYPES = ['graph', 'flowchart', 'sequenceDiagram', 'classDiagram',
              'stateDiagram', 'stateDiagram-v2', 'erDiagram', 'gantt', 'pie', 'mindmap']
          
          REQUIRED_SECTIONS = [
              ('概念定义', 'Definitions'),
              ('实例验证', 'Examples'),
              ('引用参考', 'References')
          ]

          # 统计
          stats = {
              'theorem_duplicates': 0,
              'mermaid_errors': 0,
              'structure_issues': 0
          }
          errors = []

          # 定理唯一性检查
          all_theorems = defaultdict(list)
          for file_path in target_files:
              if not Path(file_path).exists():
                  continue
              try:
                  content = Path(file_path).read_text(encoding='utf-8')
                  for match in THEOREM_PATTERN.finditer(content):
                      theorem_id = match.group(0)
                      all_theorems[theorem_id].append(file_path)
              except Exception:
                  pass

          for theorem_id, files in all_theorems.items():
              if len(files) > 1:
                  stats['theorem_duplicates'] += 1
                  errors.append(f"Duplicate theorem {theorem_id} in: {', '.join(files)}")

          # Mermaid语法检查
          for file_path in target_files:
              if not Path(file_path).exists():
                  continue
              try:
                  content = Path(file_path).read_text(encoding='utf-8')
                  diagrams = MERMAID_PATTERN.findall(content)
                  
                  for diagram in diagrams:
                      lines = diagram.strip().split('\n')
                      if not lines:
                          continue
                      
                      first_line = lines[0].strip()
                      chart_type = None
                      for vt in VALID_CHART_TYPES:
                          if first_line.startswith(vt):
                              chart_type = vt
                              break
                      
                      if not chart_type:
                          stats['mermaid_errors'] += 1
                      
                      # 括号匹配
                      open_b = diagram.count('[') + diagram.count('{') + diagram.count('(')
                      close_b = diagram.count(']') + diagram.count('}') + diagram.count(')')
                      if open_b != close_b:
                          stats['mermaid_errors'] += 1
              except Exception:
                  pass

          # 结构检查 (仅核心文档)
          for file_path in target_files:
              if not Path(file_path).exists():
                  continue
              try:
                  content = Path(file_path).read_text(encoding='utf-8')
                  
                  # 只检查有元数据的文档
                  if '所属阶段:' not in content and '所属阶段：' not in content:
                      continue
                  
                  missing = []
                  for zh_name, en_name in REQUIRED_SECTIONS:
                      pattern = rf'^##+\s*\d*\.?\s*{re.escape(zh_name)}|##+\s*\d*\.?\s*{re.escape(en_name)}'
                      if not re.search(pattern, content, re.MULTILINE | re.IGNORECASE):
                          missing.append(zh_name)
                  
                  if len(missing) > 2:
                      stats['structure_issues'] += 1
              except Exception:
                  pass

          # 生成报告
          Path('reports').mkdir(exist_ok=True)
          
          report = {
              'generated_at': datetime.now().isoformat(),
              'summary': stats,
              'errors': errors[:10]
          }

          with open('reports/combined-validation.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Combined Validation:")
          print(f"  Theorem duplicates: {stats['theorem_duplicates']}")
          print(f"  Mermaid errors: {stats['mermaid_errors']}")
          print(f"  Structure issues: {stats['structure_issues']}")

          if errors:
              print("\nErrors:")
              for e in errors[:5]:
                  print(f"  - {e}")

          # 失败条件
          if stats['theorem_duplicates'] > 0 or stats['mermaid_errors'] > 5:
              print("❌ Combined validation failed")
              sys.exit(1)
          
          print("✅ Combined validation passed")
          PYEOF

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-validation-report
          path: reports/combined-validation.json
          if-no-files-found: ignore

  # ============ 任务4: 链接健康检查 [阻塞合并] ============
  link-health-check:
    name: Link Health Check [BLOCKING]
    runs-on: ubuntu-latest
    needs: [detect-changes, markdown-lint]
    if: needs.detect-changes.outputs.has_markdown == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache link check results
        uses: actions/cache@v4
        with:
          path: .link-check-cache
          key: link-check-pr-${{ github.run_id }}
          restore-keys: |
            link-check-pr-
            link-check-

      - name: Run internal link check
        run: |
          python << 'PYEOF'
          import re
          import sys
          import json
          from pathlib import Path
          from datetime import datetime
          from collections import defaultdict

          link_pattern = re.compile(r'\[([^\]]+)\]\(([^)]+)\)')

          stats = {'total': 0, 'valid': 0, 'broken': 0}
          broken_links = []

          # 收集所有文档
          all_docs = set()
          for directory in ['Struct', 'Knowledge', 'Flink', 'docs', 'tutorials']:
              if Path(directory).exists():
                  for md_file in Path(directory).rglob('*.md'):
                      all_docs.add(str(md_file).replace('\\', '/'))

          # 检查所有文档
          for doc_path in sorted(all_docs):
              try:
                  content = Path(doc_path).read_text(encoding='utf-8')
                  doc_dir = Path(doc_path).parent

                  for match in link_pattern.finditer(content):
                      link_target = match.group(2)
                      stats['total'] += 1

                      # 跳过外部链接和锚点
                      if link_target.startswith(('http://', 'https://', 'mailto:', '#')):
                          stats['valid'] += 1
                          continue

                      target_path = link_target.split('#')[0]
                      if not target_path:
                          stats['valid'] += 1
                          continue

                      if target_path.startswith('/'):
                          full_path = target_path.lstrip('/')
                      else:
                          full_path = str((doc_dir / target_path)).replace('\\', '/')

                      if full_path in all_docs or Path(full_path).exists():
                          stats['valid'] += 1
                      else:
                          stats['broken'] += 1
                          broken_links.append({'source': doc_path, 'target': link_target})
              except Exception:
                  pass

          # 生成报告
          Path('reports').mkdir(exist_ok=True)
          
          broken_rate = (stats['broken'] / stats['total'] * 100) if stats['total'] > 0 else 0

          report = {
              'generated_at': datetime.now().isoformat(),
              'summary': stats,
              'broken_rate': round(broken_rate, 2),
              'broken_links': broken_links[:20]
          }

          with open('reports/internal-link-check.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Link Health Check:")
          print(f"  Total: {stats['total']}")
          print(f"  Valid: {stats['valid']}")
          print(f"  Broken: {stats['broken']}")
          print(f"  Broken rate: {broken_rate:.2f}%")

          if broken_rate > 3:
              print("❌ Broken link rate exceeds 3% threshold")
              sys.exit(1)
          
          print("✅ Link health check passed")
          PYEOF

      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internal-link-check-report
          path: reports/internal-link-check.json
          if-no-files-found: ignore

  # ============ 任务5: 前瞻性内容标记检查 [阻塞合并] ============
  prospective-content-check:
    name: Prospective Content Check [BLOCKING]
    runs-on: ubuntu-latest
    needs: [detect-changes, markdown-lint]
    if: needs.detect-changes.outputs.has_struct == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Check prospective content markers
        run: |
          python << 'PYEOF'
          import re
          import sys
          from pathlib import Path
          from datetime import datetime

          prospective_keywords = [
              'Flink 2.4', 'Flink 2.5', 'Flink 3.0', 'Flink 3.x',
              '即将发布', 'coming soon', 'roadmap', 'preview',
              '规划中', '设计中', '草案', '草案阶段'
          ]

          prospective_markers = [
              '> ⚠️ **前瞻性声明**',
              '> **前瞻性声明**',
              'status: preview',
              'status: roadmap',
              '前瞻性内容',
              'forward-looking'
          ]

          errors = []

          # 检查变更文件
          import subprocess
          result = subprocess.run(
              ['git', 'diff', '--name-only', '--diff-filter=ACMRT', 'origin/' + '${{ github.base_ref }}', '...HEAD'],
              capture_output=True, text=True
          )
          changed_files = [f for f in result.stdout.strip().split('\n') if f.endswith('.md')]
          target_files = [f for f in changed_files if any(d in f for d in ['Struct/', 'Knowledge/', 'Flink/'])]

          for file_path in target_files:
              if not Path(file_path).exists():
                  continue
              
              try:
                  content = Path(file_path).read_text(encoding='utf-8')
                  
                  # 检查是否包含前瞻性关键词
                  has_keywords = any(kw in content for kw in prospective_keywords)
                  has_markers = any(marker in content for marker in prospective_markers)
                  
                  if has_keywords and not has_markers:
                      errors.append(file_path)
              except Exception:
                  pass

          # 生成报告
          Path('reports').mkdir(exist_ok=True)
          
          report = {
              'generated_at': datetime.now().isoformat(),
              'files_checked': len(target_files),
              'errors': errors
          }

          with open('reports/prospective-content-check.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Prospective Content Check:")
          print(f"  Files checked: {len(target_files)}")
          print(f"  Missing markers: {len(errors)}")

          if errors:
              print("❌ Missing prospective content markers:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          
          print("✅ Prospective content check passed")
          PYEOF

      - name: Upload prospective content report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prospective-content-check-report
          path: reports/prospective-content-check.json
          if-no-files-found: ignore

  # ============ 任务6: 形式化元素检查 [警告级别] ============
  formal-element-check:
    name: Formal Element Check [WARNING]
    runs-on: ubuntu-latest
    needs: [detect-changes, combined-validation]
    if: needs.detect-changes.outputs.has_struct == 'true'
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Run formal element check
        run: |
          python << 'PYEOF'
          import re
          import json
          from pathlib import Path
          from datetime import datetime
          from collections import defaultdict

          THEOREM_PATTERN = re.compile(r'\b(Thm|Def|Lemma|Prop|Cor)-([SKF])-(\d{2})-(\d{2})\b')

          stats = {
              'total_elements': 0,
              'by_type': defaultdict(int),
              'by_stage': defaultdict(int)
          }

          for directory in ['Struct', 'Knowledge', 'Flink']:
              if not Path(directory).exists():
                  continue
              
              for md_file in Path(directory).rglob('*.md'):
                  if any(p.startswith('.') for p in md_file.parts):
                      continue
                  
                  try:
                      content = md_file.read_text(encoding='utf-8')
                      
                      for match in THEOREM_PATTERN.finditer(content):
                          stats['total_elements'] += 1
                          stats['by_type'][match.group(1)] += 1
                          stats['by_stage'][match.group(2)] += 1
                  except Exception:
                      pass

          # 生成报告
          Path('reports').mkdir(exist_ok=True)
          
          report = {
              'generated_at': datetime.now().isoformat(),
              'summary': {
                  'total_elements': stats['total_elements'],
                  'by_type': dict(stats['by_type']),
                  'by_stage': dict(stats['by_stage'])
              }
          }

          with open('reports/formal-element-check.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Formal Element Check:")
          print(f"  Total elements: {stats['total_elements']}")
          print(f"  By type: {dict(stats['by_type'])}")
          print(f"  By stage: {dict(stats['by_stage'])}")
          print("✅ Formal element check completed (warning level)")
          PYEOF
        continue-on-error: true

      - name: Upload formal element report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-element-check-report
          path: reports/formal-element-check.json
          if-no-files-found: ignore

  # ============ 汇总报告 ============
  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: 
      - detect-changes
      - markdown-lint
      - combined-validation
      - link-health-check
      - prospective-content-check
      - formal-element-check
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## 📊 PR Quality Gate Summary (Optimized v3.0)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Level | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Markdown Lint
          if [ "${{ needs.markdown-lint.result }}" == "success" ]; then
            echo "| Markdown Syntax | 🔴 BLOCKING | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.markdown-lint.result }}" == "skipped" ]; then
            echo "| Markdown Syntax | 🔴 BLOCKING | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Markdown Syntax | 🔴 BLOCKING | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi

          # Combined Validation
          if [ "${{ needs.combined-validation.result }}" == "success" ]; then
            echo "| Combined Validation (Thm+Mermaid+Structure) | 🔴 BLOCKING | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.combined-validation.result }}" == "skipped" ]; then
            echo "| Combined Validation | 🔴 BLOCKING | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Combined Validation | 🔴 BLOCKING | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi

          # Link Health Check
          if [ "${{ needs.link-health-check.result }}" == "success" ]; then
            echo "| Link Health Check | 🔴 BLOCKING | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.link-health-check.result }}" == "skipped" ]; then
            echo "| Link Health Check | 🔴 BLOCKING | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Link Health Check | 🔴 BLOCKING | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi

          # Prospective Content Check
          if [ "${{ needs.prospective-content-check.result }}" == "success" ]; then
            echo "| Prospective Content | 🔴 BLOCKING | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.prospective-content-check.result }}" == "skipped" ]; then
            echo "| Prospective Content | 🔴 BLOCKING | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Prospective Content | 🔴 BLOCKING | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi

          # Formal Element Check
          if [ "${{ needs.formal-element-check.result }}" == "success" ]; then
            echo "| Formal Element Check | 🟡 WARNING | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.formal-element-check.result }}" == "skipped" ]; then
            echo "| Formal Element Check | 🟡 WARNING | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Formal Element Check | 🟡 WARNING | ⚠️ Issues |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # 最终状态判断
          blocking_failed=false
          if [ "${{ needs.markdown-lint.result }}" == "failure" ]; then
            blocking_failed=true
          fi
          if [ "${{ needs.combined-validation.result }}" == "failure" ]; then
            blocking_failed=true
          fi
          if [ "${{ needs.link-health-check.result }}" == "failure" ]; then
            blocking_failed=true
          fi
          if [ "${{ needs.prospective-content-check.result }}" == "failure" ]; then
            blocking_failed=true
          fi

          if [ "$blocking_failed" == "true" ]; then
            echo "## ❌ Quality Gate Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more blocking checks failed. Please fix the issues before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## ✅ Quality Gate Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All blocking checks passed! PR is ready for merge." >> $GITHUB_STEP_SUMMARY
          fi
