      - name: Upload unified report bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v4.3-quality-gate-unified-report
          path: |
            ${{ env.REPORTS_DIR }}/
          if-no-files-found: ignore

      - name: Fail workflow if checks failed
        if: steps.summary.outputs.overall_status == 'failed'
        run: |
          echo "❌ v4.3 Quality Gate failed. See summary above for details."
          exit 1
