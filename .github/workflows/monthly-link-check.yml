# =============================================================================
# AnalysisDataFlow жңҲеәҰй“ҫжҺҘе·ЎжЈҖе·ҘдҪңжөҒ v2.0
# =============================================================================
# жҸҸиҝ°: жҜҸжңҲиҮӘеҠЁжү§иЎҢеӨ–йғЁй“ҫжҺҘеҒҘеә·жЈҖжҹҘдёҺдҝ®еӨҚ
# и§ҰеҸ‘жқЎд»¶: жҜҸжңҲ1ж—Ҙ UTC 02:00 иҮӘеҠЁжү§иЎҢпјҢжҲ–жүӢеҠЁи§ҰеҸ‘
# жӣҙж–°ж—Ҙжңҹ: 2026-04-05
# =============================================================================

name: Monthly Link Check and Fix

on:
  # е®ҡжңҹиҝҗиЎҢ: жҜҸжңҲ1ж—Ҙ UTC 02:00
  schedule:
    - cron: '0 2 1 * *'
  
  # е…Ғи®ёжүӢеҠЁи§ҰеҸ‘
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'дҝ®еӨҚжЁЎејҸ'
        required: false
        default: 'auto'
        type: choice
        options:
          - dry-run    # иҜ•иҝҗиЎҢпјҢдёҚе®һйҷ…дҝ®ж”№
          - auto       # иҮӘеҠЁдҝ®еӨҚе·ІзҹҘй—®йўҳ
          - full       # е…ЁйҮҸдҝ®еӨҚпјҲеҢ…жӢ¬WaybackеӯҳжЎЈпјү
      create_issue:
        description: 'еҲӣе»әи·ҹиёӘIssue'
        required: false
        default: true
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  FIX_MODE: ${{ github.event.inputs.fix_mode || 'auto' }}
  CREATE_ISSUE: ${{ github.event.inputs.create_issue || 'true' }}

jobs:
  # ===========================================================================
  # Job 1: жү§иЎҢе…ЁйҮҸй“ҫжҺҘжЈҖжҹҘ
  # ===========================================================================
  link-check:
    name: е…ЁйҮҸй“ҫжҺҘжЈҖжҹҘ
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pyyaml
      
      - name: Restore link check cache
        uses: actions/cache@v4
        with:
          path: .link-checker-cache
          key: link-checker-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            link-checker-cache-${{ runner.os }}-
      
      - name: Run full link check
        id: link_check
        run: |
          echo "::group::жү§иЎҢе…ЁйҮҸй“ҫжҺҘжЈҖжҹҘ"
          python .scripts/link_checker.py \
            --path . \
            --output reports/link-health-report.md \
            --json reports/link-health-results.json \
            --timeout 30 \
            --retries 3 \
            --concurrent 30 || true
          echo "::endgroup::"
      
      - name: Upload check results
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: |
            reports/link-health-report.md
            reports/link-health-results.json
          retention-days: 90
      
      - name: Parse results
        id: parse
        run: |
          if [ -f reports/link-health-results.json ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('reports/link-health-results.json')); print(d['summary']['total_links'])")
            BROKEN=$(python3 -c "import json; d=json.load(open('reports/link-health-results.json')); print(d['summary']['broken_external'])")
            REDIRECT=$(python3 -c "import json; d=json.load(open('reports/link-health-results.json')); print(d['summary']['redirect_links'])")
            
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "broken=$BROKEN" >> $GITHUB_OUTPUT
            echo "redirect=$REDIRECT" >> $GITHUB_OUTPUT
            
            echo "жЈҖжҹҘз»“жһң: жҖ»и®Ў=$TOTAL, еӨұж•Ҳ=$BROKEN, йҮҚе®ҡеҗ‘=$REDIRECT"
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "broken=0" >> $GITHUB_OUTPUT
            echo "redirect=0" >> $GITHUB_OUTPUT
          fi
    
    outputs:
      total: ${{ steps.parse.outputs.total }}
      broken: ${{ steps.parse.outputs.broken }}
      redirect: ${{ steps.parse.outputs.redirect }}

  # ===========================================================================
  # Job 2: иҮӘеҠЁдҝ®еӨҚй“ҫжҺҘ
  # ===========================================================================
  auto-fix:
    name: иҮӘеҠЁдҝ®еӨҚй“ҫжҺҘ
    runs-on: ubuntu-latest
    needs: link-check
    if: needs.link-check.outputs.broken > 0 && github.event.inputs.fix_mode != 'dry-run'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pyyaml
      
      - name: Download check results
        uses: actions/download-artifact@v4
        with:
          name: link-check-results
          path: reports
      
      - name: Run auto-fix v2
        run: |
          echo "::group::жү§иЎҢиҮӘеҠЁдҝ®еӨҚ"
          if [ "${{ env.FIX_MODE }}" == "full" ]; then
            python .scripts/fix-broken-links-v2.py reports/link-health-results.json --use-wayback
          else
            python .scripts/fix-broken-links-v2.py reports/link-health-results.json
          fi
          echo "::endgroup::"
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "жІЎжңүйңҖиҰҒжҸҗдәӨзҡ„жӣҙж”№"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "жЈҖжөӢеҲ°ж–Үд»¶жӣҙж”№"
            git diff --stat
          fi
      
      - name: Commit fixes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "рҹӨ– жңҲеәҰй“ҫжҺҘеҒҘеә·жЈҖжҹҘдёҺиҮӘеҠЁдҝ®еӨҚ

          - жЈҖжҹҘж–Үд»¶: 890дёӘMarkdownж–Үд»¶
          - дҝ®еӨҚжЁЎејҸ: ${{ env.FIX_MODE }}
          - жү§иЎҢж—¶й—ҙ: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          жҹҘзңӢиҜҰз»ҶжҠҘе‘Ҡ: reports/LINK-FIX-REPORT-v2.md"
          git push

  # ===========================================================================
  # Job 3: еҲӣе»әи·ҹиёӘIssue
  # ===========================================================================
  create-issue:
    name: еҲӣе»әи·ҹиёӘIssue
    runs-on: ubuntu-latest
    needs: [link-check, auto-fix]
    if: needs.link-check.outputs.broken > 0 && github.event.inputs.create_issue != 'false'
    
    permissions:
      issues: write
    
    steps:
      - name: Download check results
        uses: actions/download-artifact@v4
        with:
          name: link-check-results
          path: reports
      
      - name: Create or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            
            // иҜ»еҸ–жҠҘе‘Ҡ
            let reportContent = '';
            try {
              reportContent = fs.readFileSync('reports/link-health-report.md', 'utf8');
            } catch (e) {
              reportContent = 'жҠҘе‘Ҡж–Үд»¶дёҚеӯҳеңЁ';
            }
            
            // жҸҗеҸ–ж‘ҳиҰҒ
            const summaryMatch = reportContent.match(/## рҹ“Ҡ ж‘ҳиҰҒз»ҹи®Ў[\s\S]*?(?=## |$)/);
            const summary = summaryMatch ? summaryMatch[0] : '';
            
            const issueTitle = `рҹ”— жңҲеәҰй“ҫжҺҘеҒҘеә·жЈҖжҹҘжҠҘе‘Ҡ - ${date}`;
            const issueBody = `## рҹ“Ҡ й“ҫжҺҘеҒҘеә·жЈҖжҹҘжҠҘе‘Ҡ

**жЈҖжҹҘж—¶й—ҙ:** ${new Date().toISOString()}
**е·ҘдҪңжөҒиҝҗиЎҢ:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

### жЈҖжҹҘз»“жһң

| жҢҮж Ү | ж•°еҖј |
|------|------|
| жЈҖжҹҘж–Үд»¶ж•° | 890 |
| жҖ»й“ҫжҺҘж•° | ${{ needs.link-check.outputs.total }} |
| вқҢ еӨұж•ҲеӨ–йғЁй“ҫжҺҘ | ${{ needs.link-check.outputs.broken }} |
| рҹ”„ йҮҚе®ҡеҗ‘й“ҫжҺҘ | ${{ needs.link-check.outputs.redirect }} |

${summary}

### дҝ®еӨҚзҠ¶жҖҒ

- [x] иҮӘеҠЁжЈҖжҹҘе®ҢжҲҗ
- [x] е·ІзҹҘй—®йўҳдҝ®еӨҚ
- [ ] WaybackеӯҳжЎЈжҹҘжүҫ (йңҖдәәе·ҘзЎ®и®Ө)
- [ ] еӯҰжңҜи®әж–Үй“ҫжҺҘйӘҢиҜҒ

### еҫ…еҠһдәӢйЎ№

1. жЈҖжҹҘдҝ®еӨҚжҠҘе‘Ҡ: \`reports/LINK-FIX-REPORT-v2.md\`
2. дәәе·ҘйӘҢиҜҒеӯҰжңҜй“ҫжҺҘ (ACM, IEEE, Springer)
3. жӣҙж–°жӯ»еҹҹеҗҚй“ҫжҺҘ (еҰӮ Twitter Engineering)
4. дҝ®еӨҚзӣёеҜ№и·Ҝеҫ„й”ҷиҜҜ

### еёёз”Ёе‘Ҫд»Ө

\`\`\`bash
# жҹҘзңӢжүҖжңүеӨұж•Ҳй“ҫжҺҘ
python .scripts/fix-broken-links-v2.py --dry-run

# дҝ®еӨҚд»Јз ҒжЁЎејҸй“ҫжҺҘ
python .scripts/fix-broken-links-v2.py --fix-code-patterns

# жүӢеҠЁдҝ®еӨҚзү№е®ҡй“ҫжҺҘ
python .scripts/link-quick-fix.py --find "<еӨұж•ҲURL>"
\`\`\`

---
*жң¬Issueз”ұжңҲеәҰй“ҫжҺҘе·ЎжЈҖе·ҘдҪңжөҒиҮӘеҠЁеҲӣе»ә*
*дёӢж¬ЎжЈҖжҹҘ: дёӢдёӘжңҲ1ж—Ҙ*
`;
            
            // жҹҘжүҫзҺ°жңүIssue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-health,automated,monthly-check'
            });
            
            const existingIssue = issues.find(i => 
              i.title.includes('рҹ”— жңҲеәҰй“ҫжҺҘеҒҘеә·жЈҖжҹҘжҠҘе‘Ҡ')
            );
            
            if (existingIssue) {
              // жӣҙж–°зҺ°жңүIssue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody
              });
              console.log(`Updated issue #${existingIssue.number}`);
            } else {
              // еҲӣе»әж–°Issue
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['link-health', 'automated', 'monthly-check', 'maintenance']
              });
              console.log(`Created issue #${newIssue.number}`);
            }

  # ===========================================================================
  # Job 4: з”ҹжҲҗж‘ҳиҰҒ
  # ===========================================================================
  summary:
    name: з”ҹжҲҗе·ҘдҪңжөҒж‘ҳиҰҒ
    runs-on: ubuntu-latest
    needs: [link-check, auto-fix]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## рҹ”— жңҲеәҰй“ҫжҺҘе·ЎжЈҖе®ҢжҲҗ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| жҢҮж Ү | ж•°еҖј | зҠ¶жҖҒ |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| жҖ»й“ҫжҺҘж•° | ${{ needs.link-check.outputs.total }} | - |" >> $GITHUB_STEP_SUMMARY
          
          BROKEN="${{ needs.link-check.outputs.broken }}"
          if [ "$BROKEN" -eq 0 ]; then
            echo "| еӨұж•Ҳй“ҫжҺҘ | $BROKEN | вң… дјҳз§Җ |" >> $GITHUB_STEP_SUMMARY
          elif [ "$BROKEN" -lt 10 ]; then
            echo "| еӨұж•Ҳй“ҫжҺҘ | $BROKEN | вҡ пёҸ йңҖиҰҒе…іжіЁ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| еӨұж•Ҳй“ҫжҺҘ | $BROKEN | вқҢ йңҖиҰҒдҝ®еӨҚ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "| йҮҚе®ҡеҗ‘й“ҫжҺҘ | ${{ needs.link-check.outputs.redirect }} | вң… е·ІиҮӘеҠЁдҝ®еӨҚ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### дҝ®еӨҚжҠҘе‘Ҡ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "рҹ“„ [жҹҘзңӢиҜҰз»ҶжҠҘе‘Ҡ](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
