name: Flink Version Tracking

on:
  schedule:
    # 每 6 小时运行一次 (UTC)
    # 注意: GitHub Actions 的 schedule 使用 UTC 时间
    # UTC 00:00 = 北京时间 08:00
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    paths:
      - '.scripts/flink-version-tracking/**'
      - '.github/workflows/flink-version-tracking.yml'

env:
  PYTHON_VERSION: '3.11'
  WORKING_DIR: '.scripts/flink-version-tracking'

jobs:
  # =====================================================
  # 任务 1: 检查 FLIP 状态
  # =====================================================
  check-flip-status:
    runs-on: ubuntu-latest
    outputs:
      new-flips: ${{ steps.check.outputs.new_flips }}
      has-changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.scripts/flink-version-tracking/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt

      - name: Restore FLIP cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIR }}/data
          key: flip-cache-${{ github.run_id }}
          restore-keys: |
            flip-cache-

      - name: Fetch FLIP status
        id: fetch
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python fetch-flip-status.py --detailed --output data/flip_result.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for new FLIPs
        id: check
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f data/flip_result.json ]; then
            new_count=$(python -c "import json; d=json.load(open('data/flip_result.json')); print(d.get('new_count', 0))" 2>/dev/null || echo 0)
            echo "new_flips=$new_count" >> $GITHUB_OUTPUT
            if [ "$new_count" -gt 0 ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "new_flips=0" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload FLIP data
        if: steps.fetch.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: flip-data
          path: ${{ env.WORKING_DIR }}/data/
          retention-days: 30

  # =====================================================
  # 任务 2: 检查新版本
  # =====================================================
  check-new-releases:
    runs-on: ubuntu-latest
    outputs:
      new-releases: ${{ steps.check.outputs.new_releases }}
      has-changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.scripts/flink-version-tracking/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt

      - name: Restore release cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIR }}/data
          key: release-cache-${{ github.run_id }}
          restore-keys: |
            release-cache-

      - name: Check new releases
        id: check
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python check-new-releases.py --stable-only --output data/release_result.json || true
          if [ -f data/release_result.json ]; then
            new_count=$(python -c "import json; d=json.load(open('data/release_result.json')); print(len(d.get('new_releases', [])))" 2>/dev/null || echo 0)
            echo "new_releases=$new_count" >> $GITHUB_OUTPUT
            if [ "$new_count" -gt 0 ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "new_releases=0" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload release data
        uses: actions/upload-artifact@v4
        with:
          name: release-data
          path: ${{ env.WORKING_DIR }}/data/
          retention-days: 30

  # =====================================================
  # 任务 3: 更新文档
  # =====================================================
  update-documentation:
    needs: [check-flip-status, check-new-releases]
    runs-on: ubuntu-latest
    # 即使前序任务失败也执行，但需要有数据
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WORKING_DIR }}/data/
          merge-multiple: true

      - name: List downloaded files
        run: |
          ls -la ${{ env.WORKING_DIR }}/data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt

      - name: Update documentation
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python update-version-docs.py || echo "Documentation update completed with warnings"

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "没有需要提交的变更"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到变更:"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 生成提交信息
          new_flips="${{ needs.check-flip-status.outputs.new-flips }}"
          new_releases="${{ needs.check-new-releases.outputs.new-releases }}"
          
          commit_msg="docs: 自动更新 Flink 版本跟踪文档 [$(date +%Y-%m-%d)]"
          
          if [ "$new_flips" != "0" ] && [ -n "$new_flips" ]; then
            commit_msg="$commit_msg

- 新增 $new_flips 个 FLIP"
          fi
          
          if [ "$new_releases" != "0" ] && [ -n "$new_releases" ]; then
            commit_msg="$commit_msg

- 新增 $new_releases 个版本"
          fi
          
          git commit -m "$commit_msg"
          git push

  # =====================================================
  # 任务 4: 发送通知
  # =====================================================
  send-notifications:
    needs: [check-flip-status, check-new-releases, update-documentation]
    runs-on: ubuntu-latest
    # 检查是否有新内容需要通知
    if: |
      always() && 
      (needs.check-flip-status.outputs.has-changes == 'true' || 
       needs.check-new-releases.outputs.has-changes == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WORKING_DIR }}/data/
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt

      - name: Send notifications
        working-directory: ${{ env.WORKING_DIR }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          CUSTOM_WEBHOOK_URL: ${{ secrets.CUSTOM_WEBHOOK_URL }}
        run: |
          echo "检测到变更，发送通知..."
          echo "新 FLIPs: ${{ needs.check-flip-status.outputs.new-flips }}"
          echo "新版本: ${{ needs.check-new-releases.outputs.new-releases }}"
          
          python notify-changes.py --from-check-results || echo "通知发送完成"

  # =====================================================
  # 任务 5: 每日摘要 (可选)
  # =====================================================
  daily-summary:
    needs: [check-flip-status, check-new-releases]
    runs-on: ubuntu-latest
    # 只在定时触发时运行，且每天只运行一次 (UTC 01:00 = 北京时间 09:00)
    if: github.event_name == 'schedule' && github.run_attempt == 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WORKING_DIR }}/data/
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt

      - name: Send daily summary
        working-directory: ${{ env.WORKING_DIR }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python notify-changes.py --daily-summary || echo "每日摘要发送完成"
