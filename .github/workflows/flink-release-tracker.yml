name: Flink Release Tracker

on:
  schedule:
    # 每6小时运行一次 (UTC)
    # UTC 00:00 = 北京时间 08:00
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: '检查类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - releases-only
          - flips-only
      notify:
        description: '发送通知'
        required: false
        default: true
        type: boolean
  push:
    paths:
      - '.scripts/flink-release-monitor.py'
      - '.scripts/flink-monitor-config.json'
      - '.scripts/flink-version-tracking/**'
      - '.github/workflows/flink-release-tracker.yml'
      - '.tasks/flink-release-tracker.md'

env:
  PYTHON_VERSION: '3.11'
  TRACKING_DOC: '.tasks/flink-release-tracker.md'

jobs:
  # =====================================================
  # 任务 1: 检测 Flink 新版本发布
  # =====================================================
  detect-releases:
    runs-on: ubuntu-latest
    outputs:
      new-release-found: ${{ steps.check.outputs.new_release_found }}
      release-version: ${{ steps.check.outputs.release_version }}
      release-type: ${{ steps.check.outputs.release_type }}
      has-updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache release state
        uses: actions/cache@v4
        with:
          path: .scripts/flink-release-status.json
          key: flink-release-state-${{ github.run_id }}
          restore-keys: |
            flink-release-state-

      - name: Run release monitor
        id: check
        working-directory: .scripts
        run: |
          echo "Running Flink release monitor..."
          python flink-release-monitor.py --verbose --output flink-release-status.json || true
          
          # Parse results
          if [ -f flink-release-status.json ]; then
            has_updates=$(python3 -c "import json; d=json.load(open('flink-release-status.json')); print('true' if d.get('has_updates', False) else 'false')" 2>/dev/null || echo "false")
            new_releases=$(python3 -c "import json; d=json.load(open('flink-release-status.json')); print(len(d.get('new_releases', [])))" 2>/dev/null || echo "0")
            
            echo "has_updates=$has_updates" >> $GITHUB_OUTPUT
            echo "new_release_found=$has_updates" >> $GITHUB_OUTPUT
            
            if [ "$new_releases" -gt 0 ]; then
              first_release=$(python3 -c "import json; d=json.load(open('flink-release-status.json')); print(d.get('new_releases', [{}])[0].get('version', 'unknown'))" 2>/dev/null || echo "unknown")
              release_type=$(python3 -c "import json; d=json.load(open('flink-release-status.json')); print(d.get('new_releases', [{}])[0].get('version_type', 'unknown'))" 2>/dev/null || echo "unknown")
              echo "release_version=$first_release" >> $GITHUB_OUTPUT
              echo "release_type=$release_type" >> $GITHUB_OUTPUT
              echo "Found new release: $first_release (type: $release_type)"
            fi
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "new_release_found=false" >> $GITHUB_OUTPUT
            echo "No release status file found"
          fi

      - name: Upload release status
        uses: actions/upload-artifact@v4
        with:
          name: release-status
          path: .scripts/flink-release-status.json
          retention-days: 30

  # =====================================================
  # 任务 2: 更新跟踪文档
  # =====================================================
  update-tracking-doc:
    needs: detect-releases
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release status
        uses: actions/download-artifact@v4
        with:
          name: release-status
          path: .scripts/
        continue-on-error: true

      - name: Update tracking document
        run: |
          echo "Updating tracking document..."
          
          # Get current date
          current_date=$(date +%Y-%m-%d)
          
          # Update last checked timestamp
          sed -i "s/最后检查: .*/最后检查: $current_date/" ${{ env.TRACKING_DOC }} 2>/dev/null || true
          
          # If new release found, add to history
          if [ "${{ needs.detect-releases.outputs.new-release-found }}" == "true" ]; then
            version="${{ needs.detect-releases.outputs.release-version }}"
            type="${{ needs.detect-releases.outputs.release-type }}"
            
            # Add entry to history table
            new_entry="| $current_date | 检测到新版本 | $version ($type) | 自动化系统 |"
            sed -i "/| 日期 | 事件 | 版本 | 操作人 |/a $new_entry" ${{ env.TRACKING_DOC }} 2>/dev/null || true
            
            echo "Added history entry for $version"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --staged --stat
          fi

      - name: Commit tracking updates
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 更新 Flink 版本跟踪文档 [$(date +%Y-%m-%d)]"
          git push

  # =====================================================
  # 任务 3: 检查 FLIP 状态 (可选)
  # =====================================================
  check-flips:
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type != 'releases-only'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: .scripts/flink-version-tracking
        run: |
          pip install -r requirements.txt || pip install requests beautifulsoup4 packaging

      - name: Check FLIP status
        working-directory: .scripts/flink-version-tracking
        run: |
          echo "Checking FLIP status..."
          python fetch-flip-status.py --output data/flip-status.json || echo "FLIP check completed with warnings"

      - name: Upload FLIP status
        uses: actions/upload-artifact@v4
        with:
          name: flip-status
          path: .scripts/flink-version-tracking/data/
          retention-days: 30
        continue-on-error: true

  # =====================================================
  # 任务 4: 发送通知
  # =====================================================
  send-notifications:
    needs: [detect-releases, update-tracking-doc]
    runs-on: ubuntu-latest
    if: |
      always() && 
      needs.detect-releases.outputs.has-updates == 'true' &&
      (github.event.inputs.notify != 'false')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        run: |
          version="${{ needs.detect-releases.outputs.release-version }}"
          type="${{ needs.detect-releases.outputs.release-type }}"
          
          curl -X POST -H 'Content-type: application/json' \
            --url "${{ secrets.SLACK_WEBHOOK_URL }}" \
            --data "{
              \"text\": \"🎉 Flink 新版本检测通知\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"🎉 Flink 新版本检测通知\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*版本:*\\n$version\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*类型:*\\n$type\"
                    }
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"请检查 [.tasks/flink-release-tracker.md](${{ github.server_url }}/${{ github.repository }}/blob/main/.tasks/flink-release-tracker.md) 并开始文档更新流程。\"
                  }
                }
              ]
            }" || echo "Slack notification sent (or failed silently)"
        continue-on-error: true

      - name: Create GitHub Issue (for GA releases)
        if: needs.detect-releases.outputs.release-type == 'ga'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.detect-releases.outputs.release-version }}';
            const issueBody = `
            ## 🎉 Flink ${version} 已发布
            
            自动化系统检测到 Flink ${version} 已正式发布。
            
            ### 需要执行的文档更新任务
            
            - [ ] 更新所有 ${version.split('.').slice(0, 2).join('.')} 前瞻文档的状态标记
            - [ ] 验证前瞻特性与实际发布的符合度
            - [ ] 更新 Maven 依赖示例中的版本号
            - [ ] 更新配置示例（验证配置键有效性）
            - [ ] 添加官方发布说明链接
            - [ ] 更新迁移指南
            - [ ] 更新版本比较矩阵
            
            ### 相关文档
            
            - [版本跟踪文档](${{ github.server_url }}/${{ github.repository }}/blob/main/.tasks/flink-release-tracker.md)
            - [发布监控状态](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ---
            *此 Issue 由自动化系统创建*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Release] Flink ${version} 文档更新任务`,
              body: issueBody,
              labels: ['release-tracking', 'documentation', 'automated']
            });
        continue-on-error: true

  # =====================================================
  # 任务 5: 生成每日摘要报告
  # =====================================================
  daily-summary:
    needs: [detect-releases, check-flips]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.run_attempt == 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Flink 版本跟踪每日摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**检查时间**: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detect-releases.outputs.has-updates }}" == "true" ]; then
            echo "### 🎉 新发布 detected" >> $GITHUB_STEP_SUMMARY
            echo "- 版本: ${{ needs.detect-releases.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
            echo "- 类型: ${{ needs.detect-releases.outputs.release-type }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **需要更新前瞻文档**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ 暂无新版本" >> $GITHUB_STEP_SUMMARY
            echo "当前跟踪版本: 2.4, 2.5, 3.0" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 相关链接" >> $GITHUB_STEP_SUMMARY
          echo "- [版本跟踪文档](${{ github.server_url }}/${{ github.repository }}/blob/main/.tasks/flink-release-tracker.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Flink GitHub Releases](https://github.com/apache/flink/releases)" >> $GITHUB_STEP_SUMMARY
          echo "- [Maven Central](https://search.maven.org/artifact/org.apache.flink/flink-core)" >> $GITHUB_STEP_SUMMARY
