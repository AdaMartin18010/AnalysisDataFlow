name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'reconstruction/phase4-verification/**'
      - '.github/workflows/formal-verification.yml'
  pull_request:
    branches: [main]
    paths:
      - 'reconstruction/phase4-verification/**'
  schedule:
    # 每月 1 日全量验证
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  verify-coq:
    name: Verify Coq Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Coq
        uses: coq-community/setup-coq-action@v1
        with:
          coq-version: '8.18'
          opam-disable-sandboxing: true

      - name: Verify Coq Files
        working-directory: reconstruction/phase4-verification
        run: |
          eval $(opam env)
          make verify-coq

  verify-tla:
    name: Verify TLA+ Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download TLA+ Tools
        run: |
          wget -q https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -O /tmp/tla2tools.jar

      - name: Verify TLA+ Syntax
        working-directory: reconstruction/phase4-verification
        run: |
          export TLA_TOOLS=/tmp/tla2tools.jar
          for f in tla-specs/*.tla; do
            echo "Parsing: $f"
            java -cp $TLA_TOOLS tla2sany.SANY "$f"
          done

  docker-verify:
    name: Docker Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Run Docker
        working-directory: reconstruction/phase4-verification
        run: |
          docker compose build
          docker compose run --rm formal-verification
