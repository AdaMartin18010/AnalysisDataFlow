# Formal Verification Workflow - 形式化验证流水线 (v1.0)
#
# 版本: v1.0 | 日期: 2026-04-11 | 状态: Production
#
# 触发条件:
#   - Coq/TLA+文件变更时
#   - 手动触发
#   - 每周定时检查

name: Formal Verification

on:
  push:
    paths:
      - '**/*.v'
      - '**/*.tla'
      - 'formal-methods/**'
  pull_request:
    paths:
      - '**/*.v'
      - '**/*.tla'
      - 'formal-methods/**'
  schedule:
    # 每周日凌晨 3:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      verification_type:
        description: '验证类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - coq-only
          - tla-only
          - lean-only

env:
  COQ_VERSION: '8.17.1'
  PYTHON_VERSION: '3.11'

# 并发控制
concurrency:
  group: 'formal-verification-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # ============ 任务1: 检测变更 ============
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      coq_changed: ${{ steps.changes.outputs.coq_changed }}
      tla_changed: ${{ steps.changes.outputs.tla_changed }}
      lean_changed: ${{ steps.changes.outputs.lean_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "coq_changed=true" >> $GITHUB_OUTPUT
            echo "tla_changed=true" >> $GITHUB_OUTPUT
            echo "lean_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            changed_files=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD || true)
          else
            changed_files=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD || true)
          fi

          echo "Changed files:"
          echo "$changed_files"

          if echo "$changed_files" | grep -q '\.v$'; then
            echo "coq_changed=true" >> $GITHUB_OUTPUT
          else
            echo "coq_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$changed_files" | grep -q '\.tla$'; then
            echo "tla_changed=true" >> $GITHUB_OUTPUT
          else
            echo "tla_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$changed_files" | grep -q '\.lean$'; then
            echo "lean_changed=true" >> $GITHUB_OUTPUT
          else
            echo "lean_changed=false" >> $GITHUB_OUTPUT
          fi

  # ============ 任务2: Coq编译验证 ============
  coq-verification:
    name: Coq Compilation
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (needs.detect-changes.outputs.coq_changed == 'true' || 
       github.event.inputs.verification_type == 'coq-only' ||
       github.event.inputs.verification_type == 'full')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Coq
        uses: coq-community/setup-coq@v1
        with:
          coq-version: ${{ env.COQ_VERSION }}
          opam-pin: false

      - name: Find Coq files
        id: find-coq
        run: |
          COQ_FILES=$(find . -name "*.v" -type f | grep -E "(formal-methods|coq-proofs)" || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$COQ_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found Coq files:"
          echo "$COQ_FILES"

      - name: Compile Coq files
        id: compile
        run: |
          mkdir -p reports
          
          COQ_FILES="${{ steps.find-coq.outputs.files }}"
          
          if [ -z "$COQ_FILES" ]; then
            echo "No Coq files found to compile"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Compiling Coq files..."
          
          TOTAL=0
          SUCCESS=0
          FAILED=0
          ERRORS=""
          
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            TOTAL=$((TOTAL + 1))
            echo "Compiling: $file"
            
            if coqc -Q . "" "$file" 2>&1; then
              echo "  ✓ Success"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ✗ Failed"
              FAILED=$((FAILED + 1))
              ERRORS="${ERRORS}\n- $file"
            fi
          done <<< "$COQ_FILES"
          
          echo "status=completed" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          
          # 生成报告
          cat > reports/coq-compilation-report.md << EOF
          # Coq Compilation Report

          **Generated**: $(date -u +%Y-%m-%d %H:%M:%S UTC)
          **Coq Version**: ${{ env.COQ_VERSION }}

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Files | $TOTAL |
          | Success | $SUCCESS |
          | Failed | $FAILED |
          | Success Rate | $(if [ $TOTAL -gt 0 ]; then echo $(( SUCCESS * 100 / TOTAL )); else echo 100; fi)% |

          $(if [ $FAILED -gt 0 ]; then echo "## Failed Files"; echo "$ERRORS"; fi)
          EOF

          cat reports/coq-compilation-report.md

      - name: Upload Coq report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coq-compilation-report
          path: reports/coq-compilation-report.md

  # ============ 任务3: TLA+模型检查 ============
  tla-verification:
    name: TLA+ Model Checking
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (needs.detect-changes.outputs.tla_changed == 'true' || 
       github.event.inputs.verification_type == 'tla-only' ||
       github.event.inputs.verification_type == 'full')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download TLA+ Tools
        run: |
          mkdir -p tla-tools
          cd tla-tools
          
          # 下载TLC模型检查器
          curl -L -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar
          
          echo "TLA+ tools downloaded"
          ls -la

      - name: Find TLA+ files
        id: find-tla
        run: |
          TLA_FILES=$(find . -name "*.tla" -type f | grep -v tla-tools || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$TLA_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found TLA+ files:"
          echo "$TLA_FILES"

      - name: Run TLA+ syntax check
        id: tla-check
        run: |
          mkdir -p reports
          
          TLA_FILES="${{ steps.find-tla.outputs.files }}"
          
          if [ -z "$TLA_FILES" ]; then
            echo "No TLA+ files found"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL=0
          VALID=0
          INVALID=0
          
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            TOTAL=$((TOTAL + 1))
            echo "Checking: $file"
            
            # 基本的语法检查 - 使用SANY解析器
            if java -cp tla-tools/tla2tools.jar tla2sany.SANY "$file" 2>&1 | grep -q "parse error"; then
              echo "  ✗ Parse error"
              INVALID=$((INVALID + 1))
            else
              echo "  ✓ Valid syntax"
              VALID=$((VALID + 1))
            fi
          done <<< "$TLA_FILES"
          
          echo "status=completed" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "valid=$VALID" >> $GITHUB_OUTPUT
          echo "invalid=$INVALID" >> $GITHUB_OUTPUT

      - name: Generate TLA+ report
        run: |
          TOTAL="${{ steps.tla-check.outputs.total }}"
          VALID="${{ steps.tla-check.outputs.valid }}"
          INVALID="${{ steps.tla-check.outputs.invalid }}"
          STATUS="${{ steps.tla-check.outputs.status }}"
          
          cat > reports/tla-model-check-report.md << EOF
          # TLA+ Model Check Report

          **Generated**: $(date -u +%Y-%m-%d %H:%M:%S UTC)

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Files | ${TOTAL:-0} |
          | Valid Syntax | ${VALID:-0} |
          | Invalid | ${INVALID:-0} |
          | Status | ${STATUS:-unknown} |

          ## Notes

          - Full model checking requires TLC with proper configuration files
          - This check validates syntax only
          - For full verification, run TLC locally with appropriate models
          EOF

          cat reports/tla-model-check-report.md

      - name: Upload TLA+ report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tla-model-check-report
          path: reports/tla-model-check-report.md

  # ============ 任务4: Lean 4编译 ============
  lean-verification:
    name: Lean 4 Compilation
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (needs.detect-changes.outputs.lean_changed == 'true' || 
       github.event.inputs.verification_type == 'lean-only' ||
       github.event.inputs.verification_type == 'full')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false

      - name: Find Lean files
        id: find-lean
        run: |
          LEAN_FILES=$(find . -name "*.lean" -type f | grep formal-methods || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$LEAN_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found Lean files:"
          echo "$LEAN_FILES"

      - name: Try to compile Lean files
        run: |
          mkdir -p reports
          
          LEAN_FILES="${{ steps.find-lean.outputs.files }}"
          
          if [ -z "$LEAN_FILES" ]; then
            echo "No Lean files found"
            echo "status=skipped" >> reports/lean-report.txt
            exit 0
          fi
          
          echo "Lean files found but compilation requires lake setup" > reports/lean-report.txt
          echo "Please compile locally with: lake build" >> reports/lean-report.txt

      - name: Upload Lean report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-compilation-report
          path: reports/lean-report.txt

  # ============ 任务5: 生成验证报告汇总 ============
  verification-summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, coq-verification, tla-verification, lean-verification]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate summary report
        run: |
          mkdir -p reports
          
          cat > reports/formal-verification-summary.md << 'EOF'
          # Formal Verification Report

          **Generated**: $(date -u +%Y-%m-%d %H:%M:%S UTC)
          **Run ID**: ${{ github.run_id }}

          ## Results Summary

          | Tool | Status | Details |
          |------|--------|----------|
          | Coq | ${{ needs.coq-verification.result }} | See coq-compilation-report |
          | TLA+ | ${{ needs.tla-verification.result }} | See tla-model-check-report |
          | Lean 4 | ${{ needs.lean-verification.result }} | See lean-compilation-report |

          ## Change Detection

          | Type | Changed |
          |------|---------|
          | Coq (.v) | ${{ needs.detect-changes.outputs.coq_changed }} |
          | TLA+ (.tla) | ${{ needs.detect-changes.outputs.tla_changed }} |
          | Lean (.lean) | ${{ needs.detect-changes.outputs.lean_changed }} |

          ## Badges

          Add these badges to your documentation:

          ```markdown
          ![Coq](https://img.shields.io/badge/Coq-${{ env.COQ_VERSION }}-blue)
          ![TLA+](https://img.shields.io/badge/TLA%2B-Verified-green)
          ```

          ---
          *Generated by Formal Verification workflow*
          EOF

          cat reports/formal-verification-summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: formal-verification-summary
          path: reports/formal-verification-summary.md

      - name: Update COQ-COMPILATION-REPORT.md
        run: |
          if [ -f artifacts/coq-compilation-report/coq-compilation-report.md ]; then
            cp artifacts/coq-compilation-report/coq-compilation-report.md COQ-COMPILATION-REPORT.md 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Update TLA-MODEL-CHECK-REPORT.md
        run: |
          if [ -f artifacts/tla-model-check-report/tla-model-check-report.md ]; then
            cp artifacts/tla-model-check-report/tla-model-check-report.md TLA-MODEL-CHECK-REPORT.md 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Generate workflow summary
        run: |
          echo "## Formal Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coq | ${{ needs.coq-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TLA+ | ${{ needs.tla-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lean 4 | ${{ needs.lean-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查是否有失败
          if [ "${{ needs.coq-verification.result }}" == "failure" ] || \
             [ "${{ needs.tla-verification.result }}" == "failure" ] || \
             [ "${{ needs.lean-verification.result }}" == "failure" ]; then
            echo "⚠️ Some verification steps failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All verification steps completed" >> $GITHUB_STEP_SUMMARY
          fi
