name: Knowledge Graph Generator

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Struct/**/*.md'
      - 'Knowledge/**/*.md'
      - 'Flink/**/*.md'
      - '.scripts/knowledge-graph-generator.py'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Struct/**/*.md'
      - 'Knowledge/**/*.md'
      - 'Flink/**/*.md'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-graph:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 2>/dev/null || true
        
    - name: Generate Knowledge Graph
      run: |
        python .scripts/knowledge-graph-generator.py --base-path . --output visuals
        
    - name: Commit and push changes
      if: github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add visuals/
        git diff --staged --quiet || (git commit -m "📊 Auto-update knowledge graph [skip ci]" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: knowledge-graph
        path: visuals/
        retention-days: 30
