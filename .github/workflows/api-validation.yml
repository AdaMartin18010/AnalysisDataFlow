# =============================================================================
# AnalysisDataFlow API参数验证工作流
# =============================================================================
# 描述: 扫描文档中的API参数，标记可能是虚构的参数
# 触发条件: PR到main分支时，每月1号运行
# 对应任务: P1-9 自动检查虚构API参数
# =============================================================================

name: API Parameter Validation

on:
  # PR到main分支时检查
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
      - '.scripts/validate_api_params.py'
  
  # 每月1号运行
  schedule:
    - cron: '0 0 1 * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      focus:
        description: '关注重点'
        required: false
        default: 'suspicious'
        type: choice
        options:
          - suspicious
          - unknown
          - all

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # Job 1: 验证API参数
  # ===========================================================================
  validate-api-params:
    name: 验证API参数
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run API parameter validation
        id: validation
        run: |
          echo "::group::API参数验证"
          
          # 确保reports目录存在
          mkdir -p reports
          
          # 运行验证脚本
          python .scripts/validate_api_params.py \
            --path . \
            --output reports/api-validation-report.md \
            --json reports/api-validation-results.json \
            --focus ${{ github.event.inputs.focus || 'suspicious' }}
          
          VALIDATION_EXIT=$?
          echo "exit_code=$VALIDATION_EXIT" >> $GITHUB_OUTPUT
          
          echo "::endgroup::"
        continue-on-error: true
      
      - name: Parse validation results
        id: parse_results
        run: |
          if [ -f reports/api-validation-results.json ]; then
            SUSPICIOUS=$(python3 -c "import json; data=json.load(open('reports/api-validation-results.json')); print(data['summary']['suspicious_params'])")
            UNKNOWN=$(python3 -c "import json; data=json.load(open('reports/api-validation-results.json')); print(data['summary']['unknown_params'])")
            TOTAL=$(python3 -c "import json; data=json.load(open('reports/api-validation-results.json')); print(data['summary']['total_params'])")
            
            echo "suspicious=$SUSPICIOUS" >> $GITHUB_OUTPUT
            echo "unknown=$UNKNOWN" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "suspicious=0" >> $GITHUB_OUTPUT
            echo "unknown=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-validation-reports
          path: |
            reports/api-validation-report.md
            reports/api-validation-results.json
          retention-days: 90
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && (steps.parse_results.outputs.suspicious != '0' || steps.parse_results.outputs.unknown != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const suspicious = '${{ steps.parse_results.outputs.suspicious }}';
            const unknown = '${{ steps.parse_results.outputs.unknown }}';
            const total = '${{ steps.parse_results.outputs.total }}';
            
            let body = '## 🔍 API参数验证结果\n\n';
            body += '| 类别 | 数量 |\n';
            body += '|------|------|\n';
            body += `| 总参数 | ${total} |\n`;
            body += `| ⚠️  未知参数 | ${unknown} |\n`;
            body += `| ❌ 可疑参数 | ${suspicious} |\n\n`;
            
            if (suspicious !== '0') {
              body += '### ⚠️ 发现可疑参数\n\n';
              body += '请检查详细报告并修正可疑的API参数。\n\n';
            }
            
            body += '[查看详细报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Generate summary
        if: always()
        run: |
          echo "## 🔍 API参数验证结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 数值 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 总参数 | ${{ steps.parse_results.outputs.total }} | - |" >> $GITHUB_STEP_SUMMARY
          
          SUSPICIOUS="${{ steps.parse_results.outputs.suspicious }}"
          if [ "$SUSPICIOUS" -eq 0 ]; then
            echo "| ❌ 可疑参数 | $SUSPICIOUS | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ❌ 可疑参数 | $SUSPICIOUS | ⚠️ 需要处理 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "| ⚠️  未知参数 | ${{ steps.parse_results.outputs.unknown }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 [查看详细报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail on suspicious params
        if: steps.parse_results.outputs.suspicious != '0'
        run: |
          echo "❌ 发现 ${{ steps.parse_results.outputs.suspicious }} 个可疑API参数"
          echo "请修正后再提交"
          exit 1
