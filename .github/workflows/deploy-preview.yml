# =============================================================================
# AnalysisDataFlow 预览部署工作流
# =============================================================================
# 描述: 为Pull Request自动生成文档预览站点
# 触发条件: PR创建/更新时触发，支持手动触发
# 部署目标: GitHub Pages (预览环境)
# =============================================================================

name: Deploy Preview

on:
  # PR创建或更新时触发
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
      - 'visuals/**'
      - 'tutorials/**'
      - '.github/workflows/deploy-preview.yml'
    types: [opened, synchronize, reopened]
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR编号（用于手动触发特定PR的预览）'
        required: false
        default: ''
        type: string
      retention_days:
        description: '预览保留天数'
        required: false
        default: '7'
        type: choice
        options:
          - '3'
          - '7'
          - '14'
          - '30'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PREVIEW_RETENTION_DAYS: ${{ github.event.inputs.retention_days || '7' }}

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

# 并发控制
cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: 构建预览站点
  # ===========================================================================
  build-preview:
    name: 构建预览站点
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown pymdown-extensions pygments
          npm install -g @mermaid-js/mermaid-cli
      
      - name: Build static site
        run: |
          echo "::group::构建静态预览站点"
          
          # 创建构建目录
          mkdir -p _preview
          
          # 复制所有Markdown文件并转换为HTML
          cat > build_preview.py << 'SCRIPT'
          #!/usr/bin/env python3
          """
          构建预览站点：将Markdown转换为HTML并添加导航
          """
          import markdown
          import re
          from pathlib import Path
          from datetime import datetime
          
          # Markdown扩展配置
          md_extensions = [
              'toc',
              'tables',
              'fenced_code',
              'codehilite',
              'pymdownx.superfences',
              'pymdownx.highlight',
              'pymdownx.inlinehilite',
              'pymdownx.tabbed',
              'pymdownx.tasklist',
              'pymdownx.arithmatex',
          ]
          
          md = markdown.Markdown(extensions=md_extensions)
          
          # HTML模板
          HTML_TEMPLATE = '''<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{title} - AnalysisDataFlow Preview</title>
              <style>
                  :root {{
                      --primary-color: #2563eb;
                      --secondary-color: #1e40af;
                      --bg-color: #f8fafc;
                      --card-bg: #ffffff;
                      --text-color: #1e293b;
                      --text-muted: #64748b;
                      --border-color: #e2e8f0;
                      --code-bg: #f1f5f9;
                      --success-color: #22c55e;
                      --warning-color: #f59e0b;
                      --error-color: #ef4444;
                  }}
                  
                  * {{
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }}
                  
                  body {{
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                                   'Helvetica Neue', Arial, sans-serif;
                      background-color: var(--bg-color);
                      color: var(--text-color);
                      line-height: 1.6;
                  }}
                  
                  /* 顶部横幅 */
                  .preview-banner {{
                      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
                      color: white;
                      padding: 12px 24px;
                      text-align: center;
                      font-size: 14px;
                  }}
                  
                  .preview-banner a {{
                      color: white;
                      text-decoration: underline;
                  }}
                  
                  /* 布局 */
                  .container {{
                      display: flex;
                      min-height: calc(100vh - 48px);
                  }}
                  
                  /* 侧边栏 */
                  .sidebar {{
                      width: 300px;
                      background: var(--card-bg);
                      border-right: 1px solid var(--border-color);
                      padding: 24px;
                      overflow-y: auto;
                      position: fixed;
                      height: 100%;
                  }}
                  
                  .sidebar h2 {{
                      font-size: 18px;
                      margin-bottom: 16px;
                      color: var(--primary-color);
                  }}
                  
                  .sidebar ul {{
                      list-style: none;
                  }}
                  
                  .sidebar li {{
                      margin-bottom: 8px;
                  }}
                  
                  .sidebar a {{
                      color: var(--text-color);
                      text-decoration: none;
                      display: block;
                      padding: 8px 12px;
                      border-radius: 6px;
                      transition: all 0.2s;
                      font-size: 14px;
                  }}
                  
                  .sidebar a:hover {{
                      background-color: var(--bg-color);
                      color: var(--primary-color);
                  }}
                  
                  .sidebar .folder {{
                      font-weight: 600;
                      color: var(--text-muted);
                      margin-top: 16px;
                  }}
                  
                  /* 主内容区 */
                  .content {{
                      flex: 1;
                      margin-left: 300px;
                      padding: 40px;
                      max-width: 900px;
                  }}
                  
                  .content h1 {{
                      font-size: 32px;
                      margin-bottom: 24px;
                      padding-bottom: 16px;
                      border-bottom: 2px solid var(--border-color);
                  }}
                  
                  .content h2 {{
                      font-size: 24px;
                      margin-top: 32px;
                      margin-bottom: 16px;
                      color: var(--primary-color);
                  }}
                  
                  .content h3 {{
                      font-size: 20px;
                      margin-top: 24px;
                      margin-bottom: 12px;
                  }}
                  
                  .content p {{
                      margin-bottom: 16px;
                  }}
                  
                  .content code {{
                      background-color: var(--code-bg);
                      padding: 2px 6px;
                      border-radius: 4px;
                      font-family: 'Monaco', 'Menlo', monospace;
                      font-size: 14px;
                  }}
                  
                  .content pre {{
                      background-color: var(--code-bg);
                      padding: 16px;
                      border-radius: 8px;
                      overflow-x: auto;
                      margin-bottom: 16px;
                  }}
                  
                  .content pre code {{
                      background: none;
                      padding: 0;
                  }}
                  
                  .content table {{
                      width: 100%;
                      border-collapse: collapse;
                      margin-bottom: 24px;
                  }}
                  
                  .content th, .content td {{
                      padding: 12px;
                      text-align: left;
                      border-bottom: 1px solid var(--border-color);
                  }}
                  
                  .content th {{
                      background-color: var(--bg-color);
                      font-weight: 600;
                  }}
                  
                  .content blockquote {{
                      border-left: 4px solid var(--primary-color);
                      padding-left: 16px;
                      margin-bottom: 16px;
                      color: var(--text-muted);
                  }}
                  
                  .content ul, .content ol {{
                      margin-bottom: 16px;
                      padding-left: 24px;
                  }}
                  
                  .content li {{
                      margin-bottom: 8px;
                  }}
                  
                  /* Mermaid图表容器 */
                  .mermaid {{
                      background: white;
                      padding: 16px;
                      border-radius: 8px;
                      margin-bottom: 24px;
                      text-align: center;
                  }}
                  
                  /* 响应式 */
                  @media (max-width: 768px) {{
                      .sidebar {{
                          display: none;
                      }}
                      .content {{
                          margin-left: 0;
                          padding: 24px;
                      }}
                  }}
                  
                  /* 首页特殊样式 */
                  .home-intro {{
                      text-align: center;
                      padding: 60px 40px;
                  }}
                  
                  .home-intro h1 {{
                      font-size: 48px;
                      margin-bottom: 24px;
                      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      background-clip: text;
                  }}
                  
                  .stats-grid {{
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 24px;
                      margin-top: 40px;
                  }}
                  
                  .stat-card {{
                      background: var(--card-bg);
                      padding: 24px;
                      border-radius: 12px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                  }}
                  
                  .stat-card h3 {{
                      font-size: 14px;
                      color: var(--text-muted);
                      margin-bottom: 8px;
                  }}
                  
                  .stat-card .number {{
                      font-size: 36px;
                      font-weight: bold;
                      color: var(--primary-color);
                  }}
              </style>
          </head>
          <body>
              <div class="preview-banner">
                  🔍 这是PR #{pr_number} 的预览站点 | 
                  <a href="{pr_url}">查看Pull Request</a> |
                  生成时间: {build_time}
              </div>
              
              <div class="container">
                  <nav class="sidebar">
                      {navigation}
                  </nav>
                  
                  <main class="content">
                      {content}
                  </main>
              </div>
              
              <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
              <script>
                  mermaid.initialize({{ startOnLoad: true }});
              </script>
          </body>
          </html>'''
          
          def build_navigation(files_by_dir):
              """构建侧边栏导航"""
              nav_html = '<h2>📚 文档导航</h2><ul>'
              
              for dir_name, files in sorted(files_by_dir.items()):
                  if dir_name == '.':
                      display_name = '🏠 根目录'
                  else:
                      display_name = f'📁 {dir_name}'
                  
                  nav_html += f'<li class="folder">{display_name}</li><ul>'
                  
                  for file_path, title in sorted(files, key=lambda x: x[1]):
                      html_path = str(file_path).replace('.md', '.html')
                      nav_html += f'<li><a href="{html_path}">{title}</a></li>'
                  
                  nav_html += '</ul>'
              
              nav_html += '</ul>'
              return nav_html
          
          def convert_markdown_to_html(md_file):
              """转换Markdown文件为HTML"""
              try:
                  with open(md_file, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # 提取标题
                  title_match = re.search(r'^# (.+)$', content, re.MULTILINE)
                  title = title_match.group(1) if title_match else md_file.stem
                  
                  # 转换Markdown到HTML
                  html_content = md.convert(content)
                  
                  # 重置Markdown实例
                  md.reset()
                  
                  return title, html_content
              except Exception as e:
                  print(f"转换失败 {md_file}: {e}")
                  return md_file.stem, f"<p>无法加载文档: {e}</p>"
          
          def main():
              # 扫描所有Markdown文件
              md_files = list(Path('.').rglob('*.md'))
              md_files = [f for f in md_files if not any(
                  part.startswith('.') or part in ['node_modules', '__pycache__', '_preview']
                  for part in f.parts
              )]
              
              print(f"发现 {len(md_files)} 个Markdown文件")
              
              # 按目录分组
              files_by_dir = {}
              for md_file in md_files:
                  dir_name = str(md_file.parent) if str(md_file.parent) != '.' else '.'
                  if dir_name not in files_by_dir:
                      files_by_dir[dir_name] = []
                  
                  title, html_content = convert_markdown_to_html(md_file)
                  files_by_dir[dir_name].append((md_file, title))
              
              # 构建导航
              navigation = build_navigation(files_by_dir)
              
              # 生成HTML文件
              pr_number = '${{ github.event.pull_request.number || github.event.inputs.pr_number || "manual" }}'
              pr_url = '${{ github.event.pull_request.html_url || github.server_url }}'
              build_time = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
              
              for md_file in md_files:
                  title, html_content = convert_markdown_to_html(md_file)
                  
                  html = HTML_TEMPLATE.format(
                      title=title,
                      pr_number=pr_number,
                      pr_url=pr_url,
                      build_time=build_time,
                      navigation=navigation,
                      content=html_content
                  )
                  
                  # 保存HTML文件
                  output_path = Path('_preview') / md_file.with_suffix('.html')
                  output_path.parent.mkdir(parents=True, exist_ok=True)
                  
                  with open(output_path, 'w', encoding='utf-8') as f:
                      f.write(html)
                  
                  print(f"生成: {output_path}")
              
              # 生成首页
              generate_home_page(files_by_dir, pr_number, pr_url, build_time, navigation)
              
              print(f"\n✅ 预览站点构建完成！共 {len(md_files)} 个页面")
          
          def generate_home_page(files_by_dir, pr_number, pr_url, build_time, navigation):
              """生成预览首页"""
              # 统计各目录文档数
              stats = {}
              for dir_name, files in files_by_dir.items():
                  stats[dir_name] = len(files)
              
              total_docs = sum(stats.values())
              
              home_content = f'''
              <div class="home-intro">
                  <h1>📊 AnalysisDataFlow</h1>
                  <p>流计算知识体系 - PR #{pr_number} 预览</p>
                  
                  <div class="stats-grid">
                      <div class="stat-card">
                          <h3>总文档数</h3>
                          <div class="number">{total_docs}</div>
                      </div>
                      <div class="stat-card">
                          <h3>Struct 文档</h3>
                          <div class="number">{stats.get('Struct', 0)}</div>
                      </div>
                      <div class="stat-card">
                          <h3>Knowledge 文档</h3>
                          <div class="number">{stats.get('Knowledge', 0)}</div>
                      </div>
                      <div class="stat-card">
                          <h3>Flink 文档</h3>
                          <div class="number">{stats.get('Flink', 0)}</div>
                      </div>
                  </div>
              </div>
              
              <h2>📖 文档目录</h2>
              <p>使用左侧导航栏浏览文档，或在下方选择目录：</p>
              '''
              
              for dir_name, files in sorted(files_by_dir.items()):
                  if dir_name == '.':
                      continue
                  home_content += f'<h3>📁 {dir_name}</h3><ul>'
                  for file_path, title in sorted(files, key=lambda x: x[1])[:5]:  # 只显示前5个
                      html_path = str(file_path).replace('.md', '.html')
                      home_content += f'<li><a href="{html_path}">{title}</a></li>'
                  if len(files) > 5:
                      home_content += f'<li><em>...还有 {len(files) - 5} 个文档</em></li>'
                  home_content += '</ul>'
              
              html = HTML_TEMPLATE.format(
                  title="预览首页",
                  pr_number=pr_number,
                  pr_url=pr_url,
                  build_time=build_time,
                  navigation=navigation,
                  content=home_content
              )
              
              with open('_preview/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)
              
              print("生成: _preview/index.html")
          
          if __name__ == '__main__':
              main()
          SCRIPT
          
          python build_preview.py
          
          echo "::endgroup::"
      
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site
          path: _preview/
          retention-days: ${{ env.PREVIEW_RETENTION_DAYS }}
  
  # ===========================================================================
  # Job 2: 部署到GitHub Pages
  # ===========================================================================
  deploy-to-pages:
    name: 部署到预览环境
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: _preview/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_preview
          destination_dir: preview/pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
          keep_files: true
      
      - name: Generate preview URL
        id: preview
        run: |
          REPO_OWNER=$(echo ${{ github.repository }} | cut -d'/' -f1)
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          PR_NUM=${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
          
          PREVIEW_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/preview/pr-${PR_NUM}/"
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${PREVIEW_URL}"
      
      - name: Comment on PR
        if: github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = '${{ steps.preview.outputs.url }}';
            
            // 查找是否已有预览评论
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📖 文档预览')
            );
            
            const body = `## 📖 文档预览已就绪\n\n` +
                        `预览站点: [${previewUrl}](${previewUrl})\n\n` +
                        `此预览将在 PR 合并后自动清理。\n` +
                        `生成时间: ${new Date().toISOString()}`;
            
            if (botComment) {
              // 更新现有评论
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // 创建新评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
  
  # ===========================================================================
  # Job 3: 清理过期预览
  # ===========================================================================
  cleanup-old-previews:
    name: 清理过期预览
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      
      - name: Cleanup old previews
        run: |
          echo "::group::清理过期预览"
          
          if [ -d "preview" ]; then
              cd preview
              
              # 获取保留天数
              RETENTION_DAYS=${{ env.PREVIEW_RETENTION_DAYS }}
              CUTOFF_DATE=$(date -d "${RETENTION_DAYS} days ago" +%s)
              
              echo "保留天数: ${RETENTION_DAYS}"
              echo "截止日期: $(date -d @${CUTOFF_DATE} '+%Y-%m-%d')"
              
              # 检查每个预览目录
              for dir in pr-*; do
                  if [ -d "$dir" ]; then
                      # 获取目录最后修改时间
                      MODIFIED=$(stat -c %Y "$dir" 2>/dev/null || stat -f %m "$dir")
                      
                      if [ "$MODIFIED" -lt "$CUTOFF_DATE" ]; then
                          echo "删除过期预览: $dir (修改时间: $(date -d @$MODIFIED '+%Y-%m-%d'))"
                          rm -rf "$dir"
                      fi
                  fi
              done
              
              # 提交清理结果
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add .
              
              if git diff --staged --quiet; then
                  echo "没有需要清理的内容"
              else
                  git commit -m "chore: 清理过期预览 [skip ci]"
                  git push
              fi
          else
              echo "预览目录不存在"
          fi
          
          echo "::endgroup::"
  
  # ===========================================================================
  # Job 4: 生成部署报告
  # ===========================================================================
  generate-deployment-report:
    name: 生成部署报告
    runs-on: ubuntu-latest
    needs: deploy-to-pages
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## 📖 预览部署报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-preview.result }}" == "success" ]; then
            echo "✅ 预览站点构建成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 预览站点构建失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.deploy-to-pages.result }}" == "success" ]; then
            echo "✅ 部署成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 预览地址: ${{ steps.preview.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 部署失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📦 Artifacts保留天数: ${{ env.PREVIEW_RETENTION_DAYS }}天" >> $GITHUB_STEP_SUMMARY
