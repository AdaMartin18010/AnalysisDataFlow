name: Document Freshness Check

on:
  schedule:
    # 每月 1 日自动运行
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  freshness-check:
    name: Check Document Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Freshness Checker
        run: |
          python .scripts/doc-freshness-checker.py --root . --output FRESHNESS-REPORT.md

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: FRESHNESS-REPORT.md

      - name: Create Issue for P0 Items
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('FRESHNESS-REPORT.md', 'utf8');
            const p0Matches = report.match(/🔴 P0/g);
            const count = p0Matches ? p0Matches.length : 0;
            if (count > 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Freshness] ${count} 个 P0 级文档过期问题待处理`,
                body: `文档新鲜度检查发现 ${count} 个严重过期问题。\n\n详见报告: \`FRESHNESS-REPORT.md\`\n\n请维护者尽快核实并更新相关文档。`,
                labels: ['documentation', 'freshness', 'P0']
              });
            }
