# =============================================================================
# AnalysisDataFlow PR链接检查工作流
# =============================================================================
# 描述: PR合并前强制链接检查，确保不引入新的失效链接
# 触发条件: PR到main分支时
# 对应任务: P1-10 PR合并前强制链接检查
# =============================================================================

name: PR Link Check

on:
  # PR到main分支时检查
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
  
  # 手动触发（用于完整检查）
  workflow_dispatch:
    inputs:
      check_external:
        description: '检查外部链接'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  CHECK_EXTERNAL: ${{ github.event.inputs.check_external || 'false' }}

jobs:
  # ===========================================================================
  # Job 1: 检测变更文件
  # ===========================================================================
  detect-changes:
    name: 检测变更文件
    runs-on: ubuntu-latest
    
    outputs:
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
      has_changes: ${{ steps.changed-files.outputs.any_changed }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.md
          separator: ","
      
      - name: List changed files
        run: |
          echo "变更的Markdown文件:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ',' '\n'

  # ===========================================================================
  # Job 2: 检查内部链接
  # ===========================================================================
  check-internal-links:
    name: 检查内部链接
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Check internal links in changed files
        run: |
          echo "::group::检查变更文件的内部链接"
          
          cat > check_pr_links.py << 'SCRIPT'
          #!/usr/bin/env python3
          """检查PR中变更文件的链接"""
          import re
          import sys
          from pathlib import Path
          from collections import defaultdict
          
          CHANGED_FILES = "${{ needs.detect-changes.outputs.changed_files }}".split(',')
          
          def find_all_markdown_files():
              """获取所有Markdown文件路径映射"""
              md_files = list(Path('.').rglob('*.md'))
              md_files = [f for f in md_files if not any(
                  part.startswith('.') or part in ['node_modules', '__pycache__', '.git']
                  for part in f.parts
              )]
              
              path_map = {}
              for f in md_files:
                  path_map[f.name] = f
                  path_map[str(f)] = f
                  path_map[str(f).replace('\\', '/')] = f
              return md_files, path_map
          
          def extract_links(content):
              """提取所有链接 [text](url)"""
              links = []
              pattern = r'\[([^\]]+)\]\(([^)]+)\)'
              for match in re.finditer(pattern, content):
                  text = match.group(1)
                  url = match.group(2).split(' ')[0]  # 移除标题
                  links.append((text, url, match.start()))
              return links
          
          def classify_link(url):
              """分类链接类型"""
              if url.startswith('http://') or url.startswith('https://'):
                  return 'external'
              if url.startswith('#'):
                  return 'anchor'
              if url.startswith('mailto:'):
                  return 'email'
              return 'internal'
          
          def validate_internal_link(url, source_file, path_map):
              """验证内部链接"""
              source_dir = source_file.parent
              
              # 移除锚点
              url_without_anchor = url.split('#')[0]
              
              if not url_without_anchor:
                  return True, None
              
              # 解析路径
              if url_without_anchor.startswith('/'):
                  target = Path('.') / url_without_anchor.lstrip('/')
              else:
                  target = source_dir / url_without_anchor
              
              target = target.resolve()
              
              # 检查文件是否存在
              if not target.exists():
                  target_with_md = Path(str(target) + '.md')
                  if target_with_md.exists():
                      return True, None
                  
                  target_index = target / 'index.md'
                  if target_index.exists():
                      return True, None
                  
                  return False, f"文件不存在: {target}"
              
              return True, None
          
          def main():
              print("=" * 70)
              print("PR内部链接检查")
              print("=" * 70)
              
              print(f"\n变更文件: {len(CHANGED_FILES)} 个")
              for f in CHANGED_FILES:
                  print(f"  - {f}")
              
              all_files, path_map = find_all_markdown_files()
              
              broken_links = []
              
              for file_path_str in CHANGED_FILES:
                  file_path = Path(file_path_str)
                  if not file_path.exists():
                      continue
                  
                  try:
                      with open(file_path, 'r', encoding='utf-8') as f:
                          content = f.read()
                  except Exception as e:
                      print(f"⚠️  无法读取 {file_path}: {e}")
                      continue
                  
                  links = extract_links(content)
                  
                  for text, url, _ in links:
                      if classify_link(url) == 'internal':
                          is_valid, error = validate_internal_link(url, file_path, path_map)
                          if not is_valid:
                              broken_links.append({
                                  'source': str(file_path),
                                  'text': text,
                                  'url': url,
                                  'error': error
                              })
              
              if broken_links:
                  print(f"\n❌ 发现 {len(broken_links)} 个无效内部链接:")
                  print("-" * 70)
                  
                  by_source = defaultdict(list)
                  for link in broken_links:
                      by_source[link['source']].append(link)
                  
                  for source, links in sorted(by_source.items()):
                      print(f"\n  📄 {source}")
                      for link in links:
                          print(f"    - [{link['text']}]({link['url']})")
                          print(f"      错误: {link['error']}")
                  
                  print("-" * 70)
                  
                  # 生成PR注释格式
                  print("\n## 链接检查失败")
                  print("\n请在合并前修复以下失效链接：")
                  print("\n| 文件 | 链接 | 错误 |")
                  print("|------|------|------|")
                  for link in broken_links:
                      print(f"| {link['source']} | [{link['text']}]({link['url']}) | {link['error']} |")
                  
                  sys.exit(1)
              else:
                  print("\n✅ 所有内部链接有效!")
                  sys.exit(0)
          
          if __name__ == '__main__':
              main()
          SCRIPT
          
          python check_pr_links.py
          echo "::endgroup::"
      
      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ PR链接检查失败
            
            发现无效的内部链接。请在合并前修复。
            
            [查看详细报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ===========================================================================
  # Job 3: 快速外部链接检查（可选）
  # ===========================================================================
  quick-external-check:
    name: 快速外部链接检查
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && env.CHECK_EXTERNAL == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp
      
      - name: Quick check external links
        run: |
          echo "::group::快速检查新增的外部链接"
          
          cat > quick_external_check.py << 'SCRIPT'
          #!/usr/bin/env python3
          """快速检查PR中新增的外部链接"""
          import re
          import asyncio
          import aiohttp
          import sys
          from pathlib import Path
          from urllib.parse import urlparse
          
          CHANGED_FILES = "${{ needs.detect-changes.outputs.changed_files }}".split(',')
          
          EXCLUDE_PATTERNS = [
              r'localhost',
              r'127\.0\.0\.1',
              r'example\.com',
          ]
          
          def should_skip(url):
              for pattern in EXCLUDE_PATTERNS:
                  if re.search(pattern, url):
                      return True
              return False
          
          def extract_links(content):
              links = []
              pattern = r'\[([^\]]+)\]\(([^)]+)\)'
              for match in re.finditer(pattern, content):
                  text = match.group(1)
                  url = match.group(2).split(' ')[0]
                  if url.startswith('http://') or url.startswith('https://'):
                      if not should_skip(url):
                          links.append((text, url))
              return links
          
          async def check_url(session, url):
              try:
                  async with session.head(url, timeout=aiohttp.ClientTimeout(total=10), allow_redirects=True) as response:
                      if response.status >= 400:
                          return url, response.status
                      return url, None
              except Exception as e:
                  return url, str(e)
          
          async def main():
              print("=" * 70)
              print("快速外部链接检查")
              print("=" * 70)
              
              # 收集所有外部链接
              all_urls = set()
              url_locations = {}
              
              for file_path_str in CHANGED_FILES:
                  file_path = Path(file_path_str)
                  if not file_path.exists():
                      continue
                  
                  try:
                      with open(file_path, 'r', encoding='utf-8') as f:
                          content = f.read()
                  except Exception:
                      continue
                  
                  links = extract_links(content)
                  for text, url in links:
                      all_urls.add(url)
                      if url not in url_locations:
                          url_locations[url] = []
                      url_locations[url].append((file_path_str, text))
              
              if not all_urls:
                  print("\n✅ 没有发现外部链接")
                  return
              
              print(f"\n检查 {len(all_urls)} 个外部链接...")
              
              async with aiohttp.ClientSession() as session:
                  tasks = [check_url(session, url) for url in all_urls]
                  results = await asyncio.gather(*tasks, return_exceptions=True)
              
              broken = []
              for url, result in results:
                  if isinstance(result, Exception):
                      broken.append((url, str(result)))
                  elif result is not None:
                      broken.append((url, f"HTTP {result}"))
              
              if broken:
                  print(f"\n❌ 发现 {len(broken)} 个无效外部链接:")
                  for url, error in broken:
                      print(f"  - {url}")
                      print(f"    错误: {error}")
                      for loc in url_locations.get(url, []):
                          print(f"    位置: {loc[0]}")
                  sys.exit(1)
              else:
                  print("\n✅ 所有外部链接正常!")
          
          asyncio.run(main())
          SCRIPT
          
          python quick_external_check.py
          echo "::endgroup::"

  # ===========================================================================
  # Job 4: 生成PR链接检查报告
  # ===========================================================================
  generate-report:
    name: 生成PR链接检查报告
    runs-on: ubuntu-latest
    needs: [check-internal-links, quick-external-check]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🔗 PR链接检查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          INTERNAL_RESULT="${{ needs.check-internal-links.result }}"
          EXTERNAL_RESULT="${{ needs.quick-external-check.result }}"
          
          if [ "$INTERNAL_RESULT" == "success" ]; then
            echo "| 内部链接 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$INTERNAL_RESULT" == "failure" ]; then
            echo "| 内部链接 | ❌ 发现失效链接 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 内部链接 | ⏭️ 跳过 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$EXTERNAL_RESULT" == "success" ]; then
            echo "| 外部链接 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$EXTERNAL_RESULT" == "failure" ]; then
            echo "| 外部链接 | ❌ 发现失效链接 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 外部链接 | ⏭️ 跳过 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "变更文件: ${{ needs.detect-changes.outputs.changed_files }}" | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
      
      - name: PR status check
        if: needs.check-internal-links.result == 'failure'
        run: |
          echo "❌ 内部链接检查失败，PR无法合并"
          exit 1
