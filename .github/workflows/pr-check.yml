# =============================================================================
# AnalysisDataFlow PR快速检查工作流
# =============================================================================
# 功能: PR合并前的快速质量检查，只检查变更文件
#
# 目标:
# - 快速反馈（<2分钟）
# - 只检查变更的Markdown文件
# - 自动PR评论报告问题
# =============================================================================

name: PR Quick Check

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: '3.11'
  MAX_CHECK_TIME: 120  # 最大检查时间（秒）

# 权限设置
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ===========================================================================
  # Job 1: 检测变更文件
  # ===========================================================================
  detect-changes:
    name: 检测变更文件
    runs-on: ubuntu-latest
    
    outputs:
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
      has_md_changes: ${{ steps.changed-files.outputs.any_changed }}
      changed_count: ${{ steps.count.outputs.count }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.md
          separator: ","
      
      - name: Count changed files
        id: count
        run: |
          count=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ',' '\n' | grep -c '\.md$' || echo "0")
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "变更的Markdown文件数: $count"
      
      - name: List changed files
        run: |
          echo "变更的Markdown文件:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ',' '\n' | head -20
          count="${{ steps.count.outputs.count }}"
          if [ "$count" -gt 20 ]; then
            echo "... 还有 $((count - 20)) 个文件"
          fi

  # ===========================================================================
  # Job 2: 快速内部链接检查
  # ===========================================================================
  quick-link-check:
    name: 快速链接检查
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_md_changes == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run quick check
        id: quick_check
        timeout-minutes: 2
        run: |
          echo "::group::执行快速链接检查"
          python .scripts/quick-check.py \
            --files "${{ needs.detect-changes.outputs.changed_files }}" \
            --fail-on-error \
            --output reports/pr-quick-check.md
          echo "::endgroup::"
        continue-on-error: true
      
      - name: Upload check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-quick-check-report
          path: reports/pr-quick-check.md
          retention-days: 7
      
      - name: Parse check results
        id: parse_results
        if: always()
        run: |
          if [ -f reports/pr-quick-check.md ]; then
            # 提取统计信息
            broken_count=$(grep -oP '(?<=发现 )\d+(?= 个问题)' reports/pr-quick-check.md || echo "0")
            echo "broken_count=$broken_count" >> $GITHUB_OUTPUT
          else
            echo "broken_count=0" >> $GITHUB_OUTPUT
          fi
          
          # 获取检查结果状态
          if [ "${{ steps.quick_check.outcome }}" == "success" ]; then
            echo "check_status=passed" >> $GITHUB_OUTPUT
          else
            echo "check_status=failed" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Job 3: PR评论机器人
  # ===========================================================================
  pr-comment-bot:
    name: PR评论机器人
    runs-on: ubuntu-latest
    needs: [detect-changes, quick-link-check]
    if: always() && github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate PR comment
        id: generate_comment
        run: |
          check_status="${{ needs.quick-link-check.result }}"
          changed_count="${{ needs.detect-changes.outputs.changed_count }}"
          
          if [ "$check_status" == "success" ]; then
            body="## ✅ PR快速检查通过\n\n"
          else
            body="## ❌ PR快速检查发现问题\n\n"
          fi
          
          body+="| 检查项 | 结果 |\n"
          body+="|--------|------|\n"
          
          if [ "$check_status" == "success" ]; then
            body+="| 变更文件检查 | ✅ 通过 ($changed_count 个文件) |\n"
          elif [ "$check_status" == "failure" ]; then
            body+="| 变更文件检查 | ❌ 失败 ($changed_count 个文件) |\n"
          else
            body+="| 变更文件检查 | ⏭️ 跳过 |\n"
          fi
          
          body+="\n"
          
          if [ "$check_status" != "success" ]; then
            body+=":warning: 请修复上述问题后再合并PR。\n\n"
          fi
          
          body+="[查看详细报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          # 保存到文件
          echo "$body" > pr_comment.md
          echo "comment_body<<EOF" >> $GITHUB_OUTPUT
          cat pr_comment.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Find existing comment
        id: find_comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('PR快速检查')
            );
            
            if (botComment) {
              return botComment.id;
            }
            return '';
      
      - name: Post or update comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const commentId = '${{ steps.find_comment.outputs.result }}';
            
            if (commentId) {
              // 更新现有评论
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(commentId),
                body: commentBody
              });
              console.log('Updated existing comment');
            } else {
              // 创建新评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
              console.log('Created new comment');
            }

  # ===========================================================================
  # Job 4: 设置PR状态检查
  # ===========================================================================
  pr-status-check:
    name: PR状态检查
    runs-on: ubuntu-latest
    needs: [detect-changes, quick-link-check]
    if: always()
    
    steps:
      - name: Check PR readiness
        run: |
          echo "检查PR就绪状态..."
          
          # 如果没有Markdown变更，直接通过
          if [ "${{ needs.detect-changes.outputs.has_md_changes }}" != "true" ]; then
            echo "✅ 没有Markdown文件变更，检查通过"
            exit 0
          fi
          
          # 检查快速链接检查结果
          if [ "${{ needs.quick-link-check.result }}" == "success" ]; then
            echo "✅ 快速链接检查通过"
            exit 0
          elif [ "${{ needs.quick-link-check.result }}" == "failure" ]; then
            echo "❌ 快速链接检查失败，请修复问题后重试"
            exit 1
          else
            echo "⚠️ 快速链接检查被跳过或取消"
            exit 0
          fi
