name: 📊 社区反馈管理

on:
  schedule:
    # 每月 1 日 00:00 UTC 运行
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: 'monthly'
        type: choice
        options:
          - monthly
          - quarterly
          - full
      since:
        description: '起始日期 (YYYY-MM-DD，可选)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  aggregate-feedback:
    name: 聚合反馈数据
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 安装依赖
        run: |
          pip install requests urllib3

      - name: 📊 运行反馈聚合
        id: aggregate
        run: |
          mkdir -p reports/feedback
          
          if [ "${{ github.event.inputs.report_type }}" = "quarterly" ]; then
            # 季度报告：获取过去3个月
            SINCE=$(date -d '3 months ago' +%Y-%m-%d)
            python .scripts/feedback-aggregator.py --full-analysis --since $SINCE --output-dir reports/feedback
          elif [ "${{ github.event.inputs.report_type }}" = "full" ]; then
            # 完整报告：获取所有历史
            python .scripts/feedback-aggregator.py --full-analysis --output-dir reports/feedback
          elif [ -n "${{ github.event.inputs.since }}" ]; then
            # 自定义日期
            python .scripts/feedback-aggregator.py --full-analysis --since ${{ github.event.inputs.since }} --output-dir reports/feedback
          else
            # 月度报告（默认）
            python .scripts/feedback-aggregator.py --full-analysis --output-dir reports/feedback
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 更新 CONTRIBUTORS.md
        run: |
          python .scripts/feedback-aggregator.py --update-contributors --output-dir reports/feedback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📁 检查生成的文件
        run: |
          echo "=== 生成的报告文件 ==="
          ls -la reports/feedback/ || echo "目录不存在"
          
          echo "=== CONTRIBUTORS.md 更新状态 ==="
          git diff --stat CONTRIBUTORS.md || echo "无变更"

      - name: 📤 提交报告
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加报告文件
          git add reports/feedback/
          git add CONTRIBUTORS.md
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "没有需要提交的变更"
            exit 0
          fi
          
          # 提交变更
          REPORT_DATE=$(date +%Y-%m)
          git commit -m "📊 反馈报告: $REPORT_DATE 月度社区反馈统计

          - 更新反馈统计数据
          - 生成月度报告
          - 更新贡献者列表
          
          由 feedback-management.yml 自动生成"
          
          git push

      - name: 📎 上传报告作为工件
        uses: actions/upload-artifact@v4
        with:
          name: feedback-reports-${{ github.run_id }}
          path: reports/feedback/
          retention-days: 90

  notify-contributors:
    name: 通知活跃贡献者
    runs-on: ubuntu-latest
    needs: aggregate-feedback
    if: github.event_name == 'schedule' || github.event.inputs.report_type == 'monthly'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 安装依赖
        run: |
          pip install requests

      - name: 🔍 获取月度之星
        id: stars
        run: |
          # 分析最近一个月的贡献，找出活跃贡献者
          python << 'EOF'
          import json
          import os
          from datetime import datetime, timedelta
          
          # 这里可以添加更复杂的逻辑来识别月度之星
          # 暂时输出示例
          print("::set-output name=stars::@example-contributor")
          EOF

      - name: 💬 创建感谢评论
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toLocaleString('zh-CN', { month: 'long', year: 'numeric' });
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 ${month} 社区反馈报告`,
              body: `## 📊 ${month} 社区反馈月度报告已生成
              
              感谢所有为本月项目发展做出贡献的社区成员！
              
              ### 📁 报告文件
              - 详细报告: \`reports/feedback/monthly-report-*.md\`
              - 统计数据: \`.stats/feedback-stats.json\`
              - 贡献者列表: \`CONTRIBUTORS.md\`
              
              ### 🌟 特别感谢
              本月活跃贡献者将在 CONTRIBUTORS.md 中更新。
              
              ---
              *本 Issue 由自动化工作流创建，将自动关闭。*`,
              labels: ['meta', 'automated']
            });

  stale-check:
    name: 检查过时 Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 标记过时 Issue
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            ⚠️ 此 Issue 已被标记为过时，因为 **30 天内没有活动**。
            
            如果此问题仍然存在，请评论以重新激活。
            
            如果没有进一步活动，此 Issue 将在 **7 天后自动关闭**。
          stale-pr-message: |
            ⚠️ 此 PR 已被标记为过时，因为 **30 天内没有活动**。
            
            如果此 PR 仍在进行中，请评论以重新激活。
          close-issue-message: |
            🔒 此 Issue 因长期无活动而自动关闭。
            
            如果问题仍然存在，请随时 reopen 或创建新的 Issue。
          close-pr-message: |
            🔒 此 PR 因长期无活动而自动关闭。
            
            如果您希望继续推进，请 reopen 或创建新的 PR。
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'P0,P1,in-progress'
          exempt-pr-labels: 'in-progress'
          remove-stale-when-updated: true

  priority-triage:
    name: 优先级分类检查
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔴 检查 P0/P1 Issue
        uses: actions/github-script@v7
        with:
          script: |
            // 查找未标记优先级的开放 Issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'triage',
              per_page: 100
            });
            
            console.log(`找到 ${issues.data.length} 个待分类 Issue`);
            
            // 检查是否有长期未分类的 P0/P1 候选
            const now = new Date();
            for (const issue of issues.data) {
              const created = new Date(issue.created_at);
              const daysOpen = (now - created) / (1000 * 60 * 60 * 24);
              
              if (daysOpen > 3) {
                console.log(`⚠️ Issue #${issue.number} 已开放 ${daysOpen.toFixed(1)} 天尚未分类`);
              }
            }

      - name: 📧 发送提醒通知
        if: false  # 需要配置邮件/Slack webhook 时启用
        run: |
          echo "P0/P1 Issue 提醒功能需要配置通知渠道"
