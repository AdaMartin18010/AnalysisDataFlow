name: Deploy Knowledge Graph to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'KNOWLEDGE-GRAPH/**'
      - '.github/workflows/deploy-knowledge-graph.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache static assets
        uses: actions/cache@v4
        with:
          path: |
            KNOWLEDGE-GRAPH/data
            KNOWLEDGE-GRAPH/.vscode
          key: kg-static-${{ runner.os }}-${{ hashFiles('KNOWLEDGE-GRAPH/**') }}
          restore-keys: |
            kg-static-${{ runner.os }}-

      - name: Build sitemap and robots
        run: |
          echo "Building Knowledge Graph assets..."
          ls -la KNOWLEDGE-GRAPH/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './KNOWLEDGE-GRAPH'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Run Lighthouse CI
        if: steps.deployment.outputs.page_url != ''
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.deployment.outputs.page_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
