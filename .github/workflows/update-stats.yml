# AnalysisDataFlow 项目统计自动更新工作流
# 自动收集统计、生成仪表盘、更新文档

name: Update Statistics

on:
  # 定时触发：每天 UTC 06:00 (北京时间 14:00)
  schedule:
    - cron: '0 6 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      update_type:
        description: '更新类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - collect-only
          - dashboard-only
          - weekly-only

# 权限设置
permissions:
  contents: write

jobs:
  update-stats:
    name: 更新项目统计
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于Git统计
      
      # 2. 设置Python环境
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install schedule
      
      # 4. 执行统计更新
      - name: 执行统计更新
        id: update
        run: |
          cd .scripts/stats-updater
          
          # 根据输入选择更新类型
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'full' }}"
          
          case $UPDATE_TYPE in
            "collect-only")
              python run.py --collect-only
              ;;
            "dashboard-only")
              python run.py --dashboard-only
              ;;
            "weekly-only")
              python run.py --weekly-only
              ;;
            *)
              python run.py --full
              ;;
          esac
      
      # 5. 检查是否有变更
      - name: 检查变更
        id: check_changes
        run: |
          # 检查是否有文件变更
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📊 检测到统计变更"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 无变更需要提交"
          fi
      
      # 6. 提交变更
      - name: 提交变更
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "📊 自动更新项目统计 - $(date +'%Y-%m-%d %H:%M')"
          git push
          echo "✅ 统计更新已提交"
      
      # 7. 生成摘要
      - name: 生成摘要
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "## 📊 统计更新摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 读取统计数据
          if [ -f .stats/project-stats.json ]; then
            echo "### 当前统计" >> $GITHUB_STEP_SUMMARY
            echo "\`\``json" >> $GITHUB_STEP_SUMMARY
            cat .stats/project-stats.json | python3 -m json.tool >> $GITHUB_STEP_SUMMARY
            echo "\`\``" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 更新文件" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

  # 单独的任务：生成周报（每周日执行）
  weekly-report:
    name: 生成周报
    runs-on: ubuntu-latest
    
    # 仅在周日或手动触发时执行
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.update_type == 'weekly-only'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 生成周报
        run: |
          cd .scripts/stats-updater
          python weekly-report.py
      
      - name: 提交周报
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add reports/weekly/
          
          if git diff --staged --quiet; then
            echo "ℹ️ 无新周报需要提交"
          else
            git commit -m "📅 自动生成周报 - $(date +'%Y-%m-%d')"
            git push
            echo "✅ 周报已提交"
          fi
