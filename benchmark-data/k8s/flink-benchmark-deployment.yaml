apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-benchmark-config
  namespace: flink-benchmark
data:
  flink-conf.yaml: |+
    jobmanager.rpc.address: flink-benchmark-jobmanager
    taskmanager.numberOfTaskSlots: 8
    state.backend: rocksdb
    state.backend.incremental: true
    state.checkpoint-storage: filesystem
    state.checkpoints.dir: file:///tmp/flink-checkpoints
    execution.checkpointing.interval: 60s
    execution.checkpointing.min-pause-between-checkpoints: 30s
    taskmanager.memory.process.size: 8192m
    jobmanager.memory.process.size: 4096m
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: 9249
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-benchmark-jobmanager
  namespace: flink-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-benchmark
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink-benchmark
        component: jobmanager
    spec:
      containers:
        - name: jobmanager
          image: flink:2.0.0-scala_2.12
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
              name: web
            - containerPort: 6123
              name: rpc
            - containerPort: 6124
              name: blob
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "2"
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf
            - name: checkpoint-volume
              mountPath: /tmp/flink-checkpoints
      volumes:
        - name: flink-config
          configMap:
            name: flink-benchmark-config
        - name: checkpoint-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: flink-benchmark-jobmanager
  namespace: flink-benchmark
spec:
  type: ClusterIP
  selector:
    app: flink-benchmark
    component: jobmanager
  ports:
    - port: 8081
      targetPort: 8081
      name: web
    - port: 6123
      targetPort: 6123
      name: rpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-benchmark-taskmanager
  namespace: flink-benchmark
spec:
  replicas: 6
  selector:
    matchLabels:
      app: flink-benchmark
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink-benchmark
        component: taskmanager
    spec:
      containers:
        - name: taskmanager
          image: flink:2.0.0-scala_2.12
          args: ["taskmanager"]
          ports:
            - containerPort: 6122
              name: rpc
            - containerPort: 9249
              name: metrics
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf
            - name: checkpoint-volume
              mountPath: /tmp/flink-checkpoints
      volumes:
        - name: flink-config
          configMap:
            name: flink-benchmark-config
        - name: checkpoint-volume
          emptyDir: {}
