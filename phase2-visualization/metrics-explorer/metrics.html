<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Metrics Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .metric-card { background: #16213e; padding: 20px; border-radius: 10px; }
        .metric-name { color: #888; font-size: 14px; }
        .metric-value { font-size: 36px; font-weight: bold; color: #00d9ff; }
    </style>
    <!-- SEO Meta Tags -->
    <meta name="description" content="AnalysisDataFlow: Metrics Explorer">
    <meta name="keywords" content="流计算, Flink, 数据流, 分布式系统, 实时计算, 流处理, 知识图谱, 形式化理论">
    <meta name="author" content="AnalysisDataFlow Project">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <link rel="canonical" href="https://analysisdataflow.github.io/phase2-visualization/metrics-explorer/metrics.html">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Metrics Explorer">
    <meta property="og:description" content="AnalysisDataFlow: Metrics Explorer">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://analysisdataflow.github.io/phase2-visualization/metrics-explorer/metrics.html">
    <meta property="og:site_name" content="AnalysisDataFlow">
    <meta property="og:locale" content="zh_CN">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Metrics Explorer">
    <meta name="twitter:description" content="AnalysisDataFlow: Metrics Explorer">
    <meta name="twitter:creator" content="@AnalysisDataFlow">
    
    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Metrics Explorer",
  "description": "AnalysisDataFlow: Metrics Explorer",
  "url": "https://analysisdataflow.github.io/phase2-visualization/metrics-explorer/metrics.html",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "license": "https://github.com/AnalysisDataFlow/AnalysisDataFlow/blob/main/LICENSE"
}
    </script>
</head>
<body>
    <div class="header"><h1>📊 Metrics Explorer</h1></div>
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-name">吞吐量</div>
            <div class="metric-value">125.4K</div>
        </div>
        <div class="metric-card">
            <div class="metric-name">延迟</div>
            <div class="metric-value">45ms</div>
        </div>
        <div class="metric-card">
            <div class="metric-name">CPU</div>
            <div class="metric-value">68%</div>
        </div>
    </div>
</body>
</html>
