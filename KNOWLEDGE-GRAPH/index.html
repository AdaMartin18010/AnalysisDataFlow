<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        
        // ============================================
        // Constants & Configurations
        // ============================================
        const COLORS = {
            Struct: '#4A90D9',
            Knowledge: '#5CB85C',
            Flink: '#F0AD4E',
            Root: '#9B59B6',
            theorem: '#D9534F',
            definition: '#9B59B6',
            lemma: '#17A2B8',
            proposition: '#E83E8C',
            corollary: '#6C757D'
        };
        
        const EDGE_COLORS = {
            dependency: '#F0AD4E',
            citation: '#5CB85C',
            contains: '#6C757D',
            instantiates: '#9B59B6',
            evolves: '#17A2B8',
            implicit: '#FF6B9D'
        };
        
        // ============================================
        // Utility Functions
        // ============================================
        const debounce = (fn, delay) => {
            let timeoutId;
            return (...args) => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => fn(...args), delay);
            };
        };
        
        const calculateConnectedComponents = (nodes, edges) => {
            const visited = new Set();
            let components = 0;
            const adjacency = {};
            
            nodes.forEach(n => adjacency[n.id] = []);
            edges.forEach(e => {
                const source = typeof e.source === 'object' ? e.source.id : e.source;
                const target = typeof e.target === 'object' ? e.target.id : e.target;
                if (adjacency[source]) adjacency[source].push(target);
                if (adjacency[target]) adjacency[target].push(source);
            });
            
            const dfs = (nodeId) => {
                visited.add(nodeId);
                adjacency[nodeId].forEach(neighbor => {
                    if (!visited.has(neighbor)) dfs(neighbor);
                });
            };
            
            nodes.forEach(node => {
                if (!visited.has(node.id)) {
                    components++;
                    dfs(node.id);
                }
            });
            
            return components;
        };
        
        // ============================================
        // Algolia DocSearch Configuration
        // ============================================
        const ALGOLIA_CONFIG = {
            enabled: false,
            appId: 'YOUR_APP_ID',
            apiKey: 'YOUR_SEARCH_API_KEY',
            indexName: 'analysisdataflow',
            searchParameters: {
                hitsPerPage: 10
            }
        };
        // ============================================
        // Semantic Search Engine
        // ============================================
        class SemanticSearchEngine {
            constructor() {
                this.embeddings = new Map();
                this.concepts = new Map();
                this.initialized = false;
            }
            
            async initialize() {
                // Load pre-computed embeddings
                try {
                    const response = await fetch('.scripts/kg-v2/concept-embeddings.json');
                    if (response.ok) {
                        const data = await response.json();
                        this.embeddings = new Map(Object.entries(data.embeddings));
                        this.concepts = new Map(Object.entries(data.concepts));
                        this.initialized = true;
                        console.log('Semantic search engine initialized');
                    }
                } catch (e) {
                    console.log('Using fallback keyword search');
                }
            }
            
            // Simple cosine similarity
            cosineSimilarity(a, b) {
                let dotProduct = 0;
                let normA = 0;
                let normB = 0;
                for (let i = 0; i < a.length; i++) {
                    dotProduct += a[i] * b[i];
                    normA += a[i] * a[i];
                    normB += b[i] * b[i];
                }
                return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
            }
            
            async search(query, limit = 10) {
                if (!this.initialized) {
                    await this.initialize();
                }
                
                // Fallback to keyword search
                const results = [];
                const queryLower = query.toLowerCase();
                
                this.concepts.forEach((concept, id) => {
                    const label = (concept.label || '').toLowerCase();
                    const description = (concept.description || '').toLowerCase();
                    
                    let score = 0;
                    if (label.includes(queryLower)) score += 0.5;
                    if (description.includes(queryLower)) score += 0.3;
                    
                    // Fuzzy match
                    const words = queryLower.split(/\s+/);
                    words.forEach(word => {
                        if (label.includes(word)) score += 0.1;
                        if (description.includes(word)) score += 0.05;
                    });
                    
                    if (score > 0) {
                        results.push({ id, ...concept, score });
                    }
                });
                
                return results.sort((a, b) => b.score - a.score).slice(0, limit);
            }
        }
        
        // ============================================
        // Components
        // ============================================
        
        // Loading Component
        const LoadingScreen = ({ message }) => (
            <div style={{
                position: 'absolute',
                top: 0, left: 0, right: 0, bottom: 0,
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                background: 'var(--bg-primary)',
                zIndex: 9999
            }}>
                <div className="loading-spinner"></div>
                <p style={{ marginTop: 16, color: 'var(--text-secondary)' }}>{message}</p>
            </div>
        );
        
        // Header Component
        const Header = ({ title, subtitle }) => (
            <div style={{
                padding: '20px',
                borderBottom: '1px solid var(--border-color)',
                background: 'var(--bg-secondary)'
            }}>
                <h1 style={{ 
                    fontSize: '18px', 
                    color: 'var(--accent)', 
                    marginBottom: '4px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px'
                }}>
                    <span>🔮</span> {title}
                </h1>
                <p style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>{subtitle}</p>
            </div>
        );
        
        // Search Component with Algolia + Local Fallback
        const SearchPanel = ({ nodes, onSearch, onSelect }) => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [localIndex, setLocalIndex] = useState(null);
            const searchEngine = useRef(new SemanticSearchEngine());
            
            // Load local search index when Algolia is not enabled
            useEffect(() => {
                const loadLocalIndex = async () => {
                    try {
                        const response = await fetch('data/search-index.json');
                        if (response.ok) {
                            const data = await response.json();
                            setLocalIndex(data);
                            console.log('Local search index loaded');
                        }
                    } catch (e) {
                        console.log('Local search index not available, using semantic search fallback');
                    }
                };
                if (!ALGOLIA_CONFIG.enabled) {
                    loadLocalIndex();
                }
            }, []);
            
            const performLocalSearch = useCallback(async (q) => {
                if (!q.trim() || !localIndex) return [];
                const queryLower = q.toLowerCase();
                
                const items = Array.isArray(localIndex) ? localIndex : 
                              (localIndex.records) ? localIndex.records :
                              (localIndex.hits) ? localIndex.hits : [];
                
                return items
                    .map(item => {
                        const text = (item.title || item.label || item.name || item.text || '').toLowerCase();
                        const content = (item.content || item.description || item.body || '').toLowerCase();
                        let score = 0;
                        if (text.includes(queryLower)) score += 1.0;
                        if (content.includes(queryLower)) score += 0.5;
                        const words = queryLower.split(/\s+/).filter(w => w);
                        words.forEach(word => {
                            if (text.includes(word)) score += 0.2;
                            if (content.includes(word)) score += 0.1;
                        });
                        return { ...item, score, _source: 'local' };
                    })
                    .filter(item => item.score > 0)
                    .sort((a, b) => b.score - a.score)
                    .slice(0, ALGOLIA_CONFIG.searchParameters.hitsPerPage);
            }, [localIndex]);
            
            const debouncedSearch = useCallback(
                debounce(async (q) => {
                    if (!q.trim()) {
                        setResults([]);
                        setIsSearching(false);
                        return;
                    }
                    setIsSearching(true);
                    
                    let searchResults = [];
                    
                    if (ALGOLIA_CONFIG.enabled) {
                        // TODO: Integrate Algolia DocSearch here when credentials are available
                        // For now, fallback to local search or semantic search
                        searchResults = await performLocalSearch(q);
                        if (searchResults.length === 0) {
                            searchResults = await searchEngine.current.search(q, ALGOLIA_CONFIG.searchParameters.hitsPerPage);
                        }
                    } else if (localIndex) {
                        searchResults = await performLocalSearch(q);
                    } else {
                        searchResults = await searchEngine.current.search(q, 10);
                    }
                    
                    setResults(searchResults);
                    onSearch?.(searchResults);
                    setIsSearching(false);
                }, 300),
                [localIndex, onSearch, performLocalSearch]
            );
            
            const handleInputChange = (e) => {
                const value = e.target.value;
                setQuery(value);
                debouncedSearch(value);
            };
            
            const handleSelect = (result) => {
                setQuery(result.label || result.title || result.name || '');
                setResults([]);
                onSelect?.(result);
            };
            
            const placeholderText = ALGOLIA_CONFIG.enabled 
                ? 'Algolia 全站搜索...' 
                : (localIndex ? '本地索引搜索概念、定理...' : '语义搜索概念、定理、定义...');
            
            return (
                <div style={{ position: 'relative', marginBottom: '16px' }}>
                    <div className="ui input fluid" style={{ display: 'flex' }}>
                        <input
                            type="text"
                            placeholder={placeholderText}
                            value={query}
                            onChange={handleInputChange}
                            onKeyDown={(e) => e.key === 'Enter' && debouncedSearch(query)}
                            style={{
                                background: 'var(--bg-primary)',
                                color: 'var(--text-primary)',
                                borderColor: 'var(--border-color)',
                                flex: 1,
                                borderTopRightRadius: 0,
                                borderBottomRightRadius: 0
                            }}
                        />

        // Path Finder Component

        // ============================================
        // D3 Graph Component
        // ============================================
        const D3Graph = ({ 
            data, 
            filters, 
            selectedNode, 
            onNodeClick, 
            highlightedPath,
            width, 
            height 
        }) => {
            const svgRef = useRef(null);
            const containerRef = useRef(null);
            const simulationRef = useRef(null);
            const zoomRef = useRef(null);
            
            // Filter nodes and edges
            const { filteredNodes, filteredEdges } = useMemo(() => {
                const nodeSet = new Set();
                
                const nodes = data.nodes.filter(node => {
                    if (node.type === 'document' && filters.documents === false) return false;
                    if (node.type === 'theorem' && filters.theorems === false) return false;
                    if (node.type === 'definition' && filters.definitions === false) return false;
                    if (node.type === 'lemma' && filters.lemmas === false) return false;
                    
                    if (node.group === 'Struct' && filters.struct === false) return false;
                    if (node.group === 'Knowledge' && filters.knowledge === false) return false;
                    if (node.group === 'Flink' && filters.flink === false) return false;
                    
                    nodeSet.add(node.id);
                    return true;
                });
                
                const edges = data.edges.filter(edge => {
                    const sourceId = typeof edge.source === 'object' ? edge.source.id : edge.source;
                    const targetId = typeof edge.target === 'object' ? edge.target.id : edge.target;
                    return nodeSet.has(sourceId) && nodeSet.has(targetId);
                });
                
                return { filteredNodes: nodes, filteredEdges: edges };
            }, [data, filters]);
            
            useEffect(() => {
                if (!svgRef.current || !width || !height) return;
                
                const svg = d3.select(svgRef.current);
                svg.selectAll('*').remove();
                
                // Create main group
                const g = svg.append('g');
                
                // Setup zoom
                zoomRef.current = d3.zoom()
                    .scaleExtent([0.1, 4])
                    .on('zoom', (event) => {
                        g.attr('transform', event.transform);
                    });
                
                svg.call(zoomRef.current);
                
                // Create force simulation
                simulationRef.current = d3.forceSimulation(filteredNodes)
                    .force('link', d3.forceLink(filteredEdges)
                        .id(d => d.id)
                        .distance(d => d.type === 'dependency' ? 100 : 80)
                        .strength(0.5))
                    .force('charge', d3.forceManyBody().strength(d => 
                        d.type === 'document' ? -300 : -100
                    ))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(d => (d.size || 10) + 5));
                
                // Create arrow markers
                const defs = svg.append('defs');
                Object.entries(EDGE_COLORS).forEach(([type, color]) => {
                    defs.append('marker')
                        .attr('id', `arrow-${type}`)
                        .attr('viewBox', '0 -5 10 10')
                        .attr('refX', 25)
                        .attr('refY', 0)
                        .attr('markerWidth', 6)
                        .attr('markerHeight', 6)
                        .attr('orient', 'auto')
                        .append('path')
                        .attr('d', 'M0,-5L10,0L0,5')
                        .attr('fill', color);
                });
                
                // Draw edges
                const link = g.append('g')
                    .attr('class', 'links')
                    .selectAll('line')
                    .data(filteredEdges)
                    .enter().append('line')
                    .attr('class', d => `link ${d.type}`)
                    .attr('stroke', d => EDGE_COLORS[d.type] || '#999')
                    .attr('stroke-width', d => Math.sqrt(d.weight || 1))
                    .attr('marker-end', d => `url(#arrow-${d.type})`);
                
                // Draw nodes
                const node = g.append('g')
                    .attr('class', 'nodes')
                    .selectAll('g')
                    .data(filteredNodes)
                    .enter().append('g')
                    .attr('class', 'node')
                    .call(d3.drag()
                        .on('start', (event, d) => {
                            if (!event.active) simulationRef.current.alphaTarget(0.3).restart();
                            d.fx = d.x;
                            d.fy = d.y;
                        })
                        .on('drag', (event, d) => {
                            d.fx = event.x;
                            d.fy = event.y;
                        })
                        .on('end', (event, d) => {
                            if (!event.active) simulationRef.current.alphaTarget(0);
                            d.fx = null;
                            d.fy = null;
                        }));
                
                // Add circles to nodes
                node.append('circle')
                    .attr('r', d => d.size || 8)
                    .attr('fill', d => d.color || '#999')
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 1.5)
                    .attr('stroke-opacity', 0.3);
                
                // Add labels to nodes
                node.append('text')
                    .attr('class', 'node-label')
                    .attr('dx', d => (d.size || 8) + 5)
                    .attr('dy', 4)
                    .text(d => d.label || d.id)
                    .style('font-size', '10px')
                    .style('fill', 'var(--text-primary)')
                    .style('text-shadow', '0 1px 3px rgba(0,0,0,0.8)');
                
                // Node click handler
                node.on('click', (event, d) => {
                    event.stopPropagation();
                    onNodeClick?.(d);
                });
                
                // Update positions on tick
                simulationRef.current.on('tick', () => {
                    link
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);
                    
                    node.attr('transform', d => `translate(${d.x},${d.y})`);
                });
                
                // Handle highlighted path
                if (highlightedPath && highlightedPath.length > 0) {
                    const pathSet = new Set(highlightedPath);
                    node.classed('dimmed', d => !pathSet.has(d.id));
                    link.classed('dimmed', d => 
                        !pathSet.has(d.source.id) || !pathSet.has(d.target.id)
                    );
                }
                
                // Handle selected node
                if (selectedNode) {
                    node.classed('selected', d => d.id === selectedNode.id);
                }
                
                return () => {
                    simulationRef.current?.stop();
                };
            }, [filteredNodes, filteredEdges, width, height]);
            
            return (
                <div ref={containerRef} style={{ width: '100%', height: '100%' }}>
                    <svg ref={svgRef} width={width} height={height}></svg>
                </div>
            );
        };
        
        // ============================================
        // Main App Component
        // ============================================
        const KnowledgeGraphApp = () => {
            const [data, setData] = useState({ nodes: [], edges: [] });
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('controls');
            const [selectedNode, setSelectedNode] = useState(null);
            const [filters, setFilters] = useState({
                documents: true,
                theorems: true,
                definitions: true,
                lemmas: true,
                struct: true,
                knowledge: true,
                flink: true,
                layout: 'force'
            });
            const [highlightedPath, setHighlightedPath] = useState([]);
            const [dimensions, setDimensions] = useState({ width: 0, height: 0 });
            const [searchResults, setSearchResults] = useState([]);
            
            const containerRef = useRef(null);
            
            // Load data
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const response = await fetch('.vscode/graph-data.json');
                        if (response.ok) {
                            const graphData = await response.json();
                            setData(graphData);
                        } else {
                            // Use sample data
                            setData(generateSampleData());
                        }
                    } catch (error) {
                        console.error('Failed to load data:', error);
                        setData(generateSampleData());
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadData();
            }, []);
            
            // Handle resize
            useEffect(() => {
                const updateDimensions = () => {
                    if (containerRef.current) {
                        setDimensions({
                            width: containerRef.current.clientWidth,
                            height: containerRef.current.clientHeight
                        });
                    }
                };
                
                updateDimensions();
                window.addEventListener('resize', updateDimensions);
                return () => window.removeEventListener('resize', updateDimensions);
            }, []);
            
            // Calculate stats
            const stats = useMemo(() => ({
                nodes: data.nodes.length,
                edges: data.edges.length,
                documents: data.nodes.filter(n => n.type === 'document').length,
                theorems: data.nodes.filter(n => n.type === 'theorem').length,
                components: calculateConnectedComponents(data.nodes, data.edges)
            }), [data]);
            
            // Filter change handler
            const handleFilterChange = (key, value) => {
                setFilters(prev => ({ ...prev, [key]: value }));
            };
            
            // Find path handler
            const handleFindPath = (source, target, algorithm) => {
                // Simple BFS for shortest path
                const adj = {};
                data.nodes.forEach(n => adj[n.id] = []);
                data.edges.forEach(e => {
                    const s = typeof e.source === 'object' ? e.source.id : e.source;
                    const t = typeof e.target === 'object' ? e.target.id : e.target;
                    adj[s].push(t);
                });
                
                const queue = [[source]];
                const visited = new Set([source]);
                
                while (queue.length > 0) {
                    const path = queue.shift();
                    const node = path[path.length - 1];
                    
                    if (node === target) {
                        setHighlightedPath(path);
                        return;
                    }
                    
                    for (const neighbor of adj[node] || []) {
                        if (!visited.has(neighbor)) {
                            visited.add(neighbor);
                            queue.push([...path, neighbor]);
                        }
                    }
                }
                
                alert('未找到路径');
            };
            
            // Sample data generator
            const generateSampleData = () => {
                const nodes = [];
                const edges = [];
                
                const categories = {
                    Struct: ['foundation', 'properties', 'relationships'],
                    Knowledge: ['concepts', 'patterns', 'scenarios'],
                    Flink: ['architecture', 'core', 'sql']
                };
                
                Object.entries(categories).forEach(([group, cats]) => {
                    cats.forEach((cat, idx) => {
                        for (let i = 1; i <= 3; i++) {
                            const id = `${group}_${cat}_0${i}`;
                            nodes.push({
                                id,
                                label: `${group} ${cat} ${i}`,
                                type: 'document',
                                group,
                                size: 15 + Math.random() * 10,
                                color: COLORS[group],
                                x: Math.random() * 800,
                                y: Math.random() * 600
                            });
                            
                            if (nodes.length > 1 && Math.random() > 0.6) {
                                const targetIdx = Math.floor(Math.random() * (nodes.length - 1));
                                edges.push({
                                    source: id,
                                    target: nodes[targetIdx].id,
                                    type: Math.random() > 0.5 ? 'citation' : 'dependency',
                                    weight: 1 + Math.floor(Math.random() * 3)
                                });
                            }
                        }
                    });
                });
                
                return { nodes, edges };
            };
            
            if (loading) {
                return <LoadingScreen message="正在加载知识图谱 v4.0..." />;
            }
            
            return (
                <div style={{ display: 'flex', height: '100vh' }}>
                    {/* Sidebar */}

                        <Header 
                            title="知识图谱 v4.0"

                                className={`item ${activeTab === 'controls' ? 'active' : ''}`}
                                onClick={() => setActiveTab('controls')}
                            >
                                ⚙️ 控制

                                onClick={() => setActiveTab('path')}
                            >
                                🔍 路径
                            </a>
                            <a

                                onClick={() => setActiveTab('details')}
                            >
                                📋 详情
                            </a>
                        </div>
                        
                        {/* Tab Content */}
                        <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>

                                <div className="animate-fade-in">
                                    <SearchPanel 
                                        nodes={data.nodes}
                                        onSearch={setSearchResults}
                                        onSelect={(result) => {

                                        }}
                                    />
                                    <FilterPanel 
                                        filters={filters}
                                        onFilterChange={handleFilterChange}
                                    />
                                </div>
                            )}
                            
                            {activeTab === 'path' && (
                                <div className="animate-fade-in">
                                    <PathFinder 
                                        nodes={data.nodes}
                                        onFindPath={handleFindPath}
                                    />
                                </div>
                            )}
                            
                            {activeTab === 'details' && (
                                <div className="animate-fade-in">
                                    <NodeDetails 
                                        node={selectedNode}
                                        onClose={() => setSelectedNode(null)}
                                    />
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Graph Container */}
                    <div className="graph-container" ref={containerRef}>
                        {dimensions.width > 0 && (
                            <D3Graph
                                data={data}
                                filters={filters}
                                selectedNode={selectedNode}
                                onNodeClick={setSelectedNode}
                                highlightedPath={highlightedPath}
                                width={dimensions.width}
                                height={dimensions.height}
                            />
                        )}
                        
                        {/* Toolbar */}
                        <div className="toolbar">
                            <button className="toolbar-btn" title="放大">+</button>
                            <button className="toolbar-btn" title="缩小">−</button>
                            <button className="toolbar-btn" title="适应窗口">⊡</button>
                            <button className="toolbar-btn" title="重置">↺</button>
                            <button className="toolbar-btn" title="导出SVG">💾</button>
                            <button className="toolbar-btn" title="3D模式">🧊</button>
                        </div>
                        
                        {/* Stats Bar */}
                        <StatsBar stats={stats} />
                    </div>
                </div>
            );
        };
        
        // ============================================
        // Render App
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KnowledgeGraphApp />);
    </script>
    
    <!-- 性能监控 -->
    <script>
        (function() {
            'use strict';
            
            // 页面加载性能监控
            if (window.performance) {
                window.addEventListener('load', function() {
                    setTimeout(function() {
                        var timing = performance.timing;
                        var loadTime = timing.loadEventEnd - timing.navigationStart;
                        var domReady = timing.domContentLoadedEventEnd - timing.navigationStart;
                        
                        console.log('📊 页面加载统计:');
                        console.log('  - 总加载时间: ' + loadTime + 'ms');
                        console.log('  - DOM 就绪时间: ' + domReady + 'ms');
                        
                        // 发送性能数据到 GA（如果可用）
                        if (typeof gtag !== 'undefined') {
                            gtag('event', 'timing_complete', {
                                'name': 'page_load',
                                'value': loadTime
                            });
                        }
                        
                        // 性能警告
                        if (loadTime > 3000) {
                            console.warn('⚠️ 页面加载时间超过 3 秒，建议优化');
                        }
                    }, 0);
                });
            }
            
            // 资源加载错误监控
            window.addEventListener('error', function(e) {
                if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
                    console.error('❌ 资源加载失败:', e.target.src || e.target.href);
                    if (typeof gtag !== 'undefined') {
                        gtag('event', 'exception', {
                            'description': 'Resource load error: ' + (e.target.src || e.target.href),
                            'fatal': false
                        });
                    }
                }
            }, true);
        })();
    </script>
</body>
</html>
