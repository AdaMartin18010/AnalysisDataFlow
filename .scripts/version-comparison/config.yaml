# =============================================================================
# 差异报告配置
# =============================================================================
diff_report:
  # 高亮样式配置
  highlight_styles:
    added:
      markdown: "**{text}** ✨"
      html: '<span class="diff-added">{text} ✨</span>'
      css: "background-color: #d4edda; color: #155724;"
    removed:
      markdown: "~~{text}~~ ❌"
      html: '<span class="diff-removed">{text} ❌</span>'
      css: "background-color: #f8d7da; color: #721c24; text-decoration: line-through;"
    modified:
      markdown: "*{text}* 📝"
      html: '<span class="diff-modified">{text} 📝</span>'
      css: "background-color: #fff3cd; color: #856404;"
    deprecated:
      markdown: "_{text}_ ⚠️"
      html: '<span class="diff-deprecated">{text} ⚠️</span>'
      css: "background-color: #ffeaa7; color: #6c5ce7;"
  
  # 报告包含章节
  sections:
    - "summary"          # 变更摘要
    - "breaking_changes" # 破坏性变更
    - "new_features"     # 新增特性
    - "enhancements"     # 功能增强
    - "deprecations"     # 弃用功能
    - "migration_guide"  # 迁移指南

# =============================================================================
# 版本对比配置
# =============================================================================
version_comparison:
  # 默认比较的版本
  default_versions: ["2.4", "2.5", "3.0"]
  
  # 对比维度
  dimensions:
    - id: "release_info"
      name: "发布信息"
      weight: 0.1
    - id: "features"
      name: "功能特性"
      weight: 0.3
    - id: "performance"
      name: "性能优化"
      weight: 0.2
    - id: "compatibility"
      name: "兼容性"
      weight: 0.2
    - id: "ecosystem"
      name: "生态系统"
      weight: 0.2
  
  # 评分标准 (1-5分)
  scoring:
    stability:
      "2.4": 4
      "2.5": 5
      "3.0": 3  # 新架构稳定性待验证
    new_features:
      "2.4": 4
      "2.5": 5
      "3.0": 5
    performance:
      "2.4": 4
      "2.5": 5
      "3.0": 5
    migration_ease:
      "2.4": 4  # 2.3→2.4较容易
      "2.5": 5  # 2.4→2.5容易
      "3.0": 2  # 2.x→3.0需要较多改动

# =============================================================================
# 输出路径配置
# =============================================================================
output_paths:
  base_dir: "Flink/08-roadmap/version-comparison-output"
  reports:
    comparison: "{base_dir}/comparison-reports"
    diff: "{base_dir}/diff-reports"
    matrix: "{base_dir}/feature-matrix"
  logs: ".scripts/version-comparison/logs"
