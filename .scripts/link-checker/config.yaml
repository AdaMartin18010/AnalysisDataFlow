# 链接检查器配置文件 v2.0
# version: 2.0.0
# author: AnalysisDataFlow 项目

# ==================== 排除列表 ====================
# 正则表达式列表，匹配的URL将被跳过检查
exclude:
  # 本地/私有地址
  - '^https?://localhost'
  - '^https?://127\.'
  - '^https?://192\.168\.'
  - '^https?://10\.'
  - '^https?://172\.(1[6-9]|2[0-9]|3[01])\.'
  
  # 占位符/模板链接
  - '^https?://example\.com'
  - '^https?://www\.example\.com'
  - '^https?://your-domain\.com'
  - '^https?://your-api\.com'
  - '^https?://api\.example\.com'
  - '^https?://docs\.example\.com'
  
  # 内部系统/需要认证的链接
  - '^https?://intranet\.'
  - '^https?://internal\.'
  - '^https?://jira\.'
  - '^https?://confluence\.'
  - '^https?://git\.(your-company|internal)'
  
  # 已知的不稳定或限制访问的域名
  - '^https?://doi\.org'                    # DOI链接有时不稳定
  - '^https?://scholar\.google\.com'       # 需要登录
  - '^https?://patents\.google\.com'       # 反爬虫
  - '^https?://linkedin\.com'               # 需要登录
  - '^https?://.*\.linkedin\.com'
  - '^https?://facebook\.com'               # 需要登录
  - '^https?://.*\.facebook\.com'
  - '^https?://twitter\.com'                # 需要登录
  - '^https?://x\.com'                      # 需要登录
  - '^https?://.*\.twitter\.com'

# ==================== 超时设置 ====================
# 所有时间单位均为秒
timeout:
  # 总请求超时时间
  total: 30
  
  # 连接建立超时
  connect: 10

# ==================== 重试策略 ====================
retry:
  # 最大重试次数 (包括首次尝试)
  max_retries: 3
  
  # 基础重试延迟 (秒)
  delay: 1

# ==================== 并发控制 ====================
# 最大并发连接数
max_concurrent: 50

# 每个主机的最大连接数
max_per_host: 10

# 文件批处理大小
file_batch_size: 10

# ==================== 用户代理设置 ====================
# 默认User-Agent字符串
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 (LinkChecker/2.0.0)"

# ==================== 缓存设置 ====================
cache:
  # 启用结果缓存
  enabled: true
  
  # 缓存目录
  cache_dir: ".link-checker-cache"
  
  # 缓存过期时间 (小时)
  ttl: 24

# ==================== 速率限制 ====================
rate_limit:
  # 每个域名的请求间隔 (秒)
  domain_delay: 0.5
  
  # 需要特殊速率限制的域名
  domains:
    github.com:
      delay: 1.0
    apache.org:
      delay: 2.0
    docs.oracle.com:
      delay: 3.0
    docs.python.org:
      delay: 1.0
    docs.microsoft.com:
      delay: 1.5
    wikipedia.org:
      delay: 1.0
    researchgate.net:
      delay: 5.0
    academia.edu:
      delay: 5.0
