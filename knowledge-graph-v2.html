<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalysisDataFlow 知识图谱 2.0</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-force@3"></script>
    <style>
        :root {
            --color-struct: #4A90D9;
            --color-knowledge: #5CB85C;
            --color-flink: #F0AD4E;
            --color-theorem: #D9534F;
            --color-definition: #9B59B6;
            --color-lemma: #17A2B8;
            --color-proposition: #E83E8C;
            --color-corollary: #6C757D;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }
        
        #container {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏样式 */
        #sidebar {
            width: 360px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }
        
        #sidebar.collapsed {
            width: 50px;
        }
        
        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        #sidebar-header h1 {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        
        #sidebar-header p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .collapse-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        
        .collapse-btn:hover {
            color: var(--accent);
        }
        
        /* 标签页样式 */
        #tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .tab:hover {
            color: var(--text-primary);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }
        
        #tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .tab-panel {
            display: none;
        }
        
        .tab-panel.active {
            display: block;
        }
        
        /* 控制面板 */
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .control-group input[type="text"],
        .control-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: border-color 0.2s;
        }
        
        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 10px;
            background: var(--bg-dark);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        
        .checkbox-item:hover {
            border-color: var(--accent);
        }
        
        .checkbox-item input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        
        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        /* 图例 */
        .legend-section {
            margin-bottom: 20px;
        }
        
        .legend-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 8px;
            padding: 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .legend-item:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        
        /* 详情面板 */
        .detail-card {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .detail-type {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .detail-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .detail-item {
            margin-bottom: 12px;
        }
        
        .detail-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 13px;
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.5;
        }
        
        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .tag {
            padding: 3px 8px;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
            border-radius: 4px;
            font-size: 11px;
        }
        
        /* 推荐面板 */
        .recommendation-item {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .recommendation-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }
        
        .recommendation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .recommendation-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .recommendation-score {
            padding: 4px 10px;
            background: var(--color-knowledge);
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .recommendation-reason {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .recommendation-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* 主图区域 */
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-dark);
        }
        
        #graph {
            width: 100%;
            height: 100%;
        }
        
        /* 工具栏 */
        #toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .toolbar-btn:hover {
            background: var(--border-color);
            border-color: var(--accent);
            transform: scale(1.05);
        }
        
        /* 统计栏 */
        #stats-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 380px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            gap: 30px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* 图谱元素样式 */
        .link {
            stroke-opacity: 0.4;
            transition: stroke-opacity 0.2s, stroke-width 0.2s;
        }
        
        .link.dependency {
            stroke: var(--color-flink);
            stroke-dasharray: 5,5;
        }
        
        .link.citation {
            stroke: var(--color-knowledge);
        }
        
        .link.contains {
            stroke: var(--text-secondary);
            stroke-opacity: 0.2;
        }
        
        .link.highlighted {
            stroke-opacity: 1;
            stroke-width: 2px;
        }
        
        .node {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .node:hover {
            filter: brightness(1.3);
        }
        
        .node.selected circle {
            stroke: #fff;
            stroke-width: 3px;
        }
        
        .node.dimmed {
            opacity: 0.15;
        }
        
        .node.highlighted {
            opacity: 1;
        }
        
        .node-label {
            font-size: 10px;
            fill: var(--text-primary);
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        /* 工具提示 */
        .tooltip {
            position: absolute;
            padding: 12px 16px;
            background: rgba(22, 27, 34, 0.98);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-primary);
            pointer-events: none;
            z-index: 1000;
            max-width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .tooltip-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .tooltip-type {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        /* 搜索下拉 */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        
        .search-dropdown.active {
            display: block;
        }
        
        .search-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-item:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        
        .search-item:last-child {
            border-bottom: none;
        }
        
        /* 路径可视化 */
        .path-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-dark);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .path-step-number {
            width: 24px;
            height: 24px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .path-step-content {
            flex: 1;
        }
        
        .path-step-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .path-step-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* 按钮 */
        .btn {
            padding: 10px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            background: #4794eb;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--border-color);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            #sidebar {
                width: 320px;
            }
            #stats-bar {
                right: 340px;
            }
        }
        
        @media (max-width: 900px) {
            #sidebar {
                position: absolute;
                z-index: 200;
                height: 100%;
                transform: translateX(0);
            }
            #sidebar.collapsed {
                transform: translateX(-100%);
                width: 360px;
            }
            #stats-bar {
                right: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <aside id="sidebar">
            <div id="sidebar-header">
                <div>
                    <h1>🔮 知识图谱 2.0</h1>
                    <p>AnalysisDataFlow 交互式知识可视化</p>
                </div>
            </div>
            
            <!-- 标签页 -->
            <div id="tabs">
                <button class="tab active" data-tab="controls">
                    <span>⚙️</span> 控制
                </button>
                <button class="tab" data-tab="details">
                    <span>📋</span> 详情
                </button>
                <button class="tab" data-tab="recommend">
                    <span>💡</span> 推荐
                </button>
                <button class="tab" data-tab="legend">
                    <span>📖</span> 图例
                </button>
            </div>
            
            <div id="tab-content">
                <!-- 控制面板 -->
                <div class="tab-panel active" id="panel-controls">
                    <div class="control-group">
                        <label>🔍 搜索节点</label>
                        <div style="position: relative;">
                            <input type="text" id="search-input" placeholder="输入节点名称或ID...">
                            <div class="search-dropdown" id="search-dropdown"></div>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>📐 布局模式</label>
                        <select id="layout-select">
                            <option value="force">力导向布局</option>
                            <option value="hierarchy">层次布局</option>
                            <option value="circular">环形布局</option>
                            <option value="cluster">聚类布局</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label>📁 显示类型</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-documents" checked>
                                <span class="color-dot" style="background: var(--color-struct);"></span>
                                文档
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-theorems" checked>
                                <span class="color-dot" style="background: var(--color-theorem);"></span>
                                定理
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-definitions" checked>
                                <span class="color-dot" style="background: var(--color-definition);"></span>
                                定义
                            </label>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>🎯 显示阶段</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-struct" checked>
                                <span class="color-dot" style="background: var(--color-struct);"></span>
                                Struct
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-knowledge" checked>
                                <span class="color-dot" style="background: var(--color-knowledge);"></span>
                                Knowledge
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-flink" checked>
                                <span class="color-dot" style="background: var(--color-flink);"></span>
                                Flink
                            </label>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label>🔗 显示关系</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-citations" checked>
                                <span>引用</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-dependencies" checked>
                                <span>依赖</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-contains" checked>
                                <span>包含</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 详情面板 -->
                <div class="tab-panel" id="panel-details">
                    <div class="empty-state" id="empty-details">
                        <div class="empty-state-icon">📄</div>
                        <p>点击图谱中的节点<br>查看详细信息</p>
                    </div>
                    <div id="node-details-content" style="display: none;"></div>
                </div>
                
                <!-- 推荐面板 -->
                <div class="tab-panel" id="panel-recommend">
                    <div class="control-group">
                        <label>🎯 基于当前选择推荐</label>
                        <button class="btn" id="btn-generate-recommend">生成学习推荐</button>
                    </div>
                    
                    <div class="control-group">
                        <label>或输入已掌握概念</label>
                        <input type="text" id="known-concepts" placeholder="例: Thm-S-01-01, Def-K-02-01">
                        <button class="btn btn-secondary" id="btn-recommend-custom" style="margin-top: 8px;">基于输入推荐</button>
                    </div>
                    
                    <div id="recommendations-list"></div>
                </div>
                
                <!-- 图例面板 -->
                <div class="tab-panel" id="panel-legend">
                    <div class="legend-section">
                        <div class="legend-title">📁 文档目录</div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-struct);"></span>
                            <span>Struct - 形式理论</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-knowledge);"></span>
                            <span>Knowledge - 知识结构</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-flink);"></span>
                            <span>Flink - Flink专项</span>
                        </div>
                    </div>
                    
                    <div class="legend-section">
                        <div class="legend-title">📐 形式化元素</div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-theorem);"></span>
                            <span>定理 (Theorem)</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-definition);"></span>
                            <span>定义 (Definition)</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-lemma);"></span>
                            <span>引理 (Lemma)</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-proposition);"></span>
                            <span>命题 (Proposition)</span>
                        </div>
                        <div class="legend-item">
                            <span class="color-dot" style="background: var(--color-corollary);"></span>
                            <span>推论 (Corollary)</span>
                        </div>
                    </div>
                    
                    <div class="legend-section">
                        <div class="legend-title">🔗 关系类型</div>
                        <div class="legend-item">
                            <svg width="30" height="10">
                                <line x1="0" y1="5" x2="30" y2="5" stroke="var(--color-knowledge)" stroke-width="2"/>
                            </svg>
                            <span>引用关系</span>
                        </div>
                        <div class="legend-item">
                            <svg width="30" height="10">
                                <line x1="0" y1="5" x2="30" y2="5" stroke="var(--color-flink)" stroke-width="2" stroke-dasharray="5,5"/>
                            </svg>
                            <span>依赖关系</span>
                        </div>
                        <div class="legend-item">
                            <svg width="30" height="10">
                                <line x1="0" y1="5" x2="30" y2="5" stroke="var(--text-secondary)" stroke-width="1" opacity="0.4"/>
                            </svg>
                            <span>包含关系</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        
        <main id="graph-container">
            <div id="toolbar">
                <button class="toolbar-btn" id="btn-zoom-in" title="放大">+</button>
