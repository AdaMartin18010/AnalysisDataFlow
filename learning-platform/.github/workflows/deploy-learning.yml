name: Deploy Learning Platform to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'learning-platform/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-learning"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./learning-platform/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: ./learning-platform/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('./learning-platform/package-lock.json') }}-${{ hashFiles('./learning-platform/**/*.js', './learning-platform/**/*.jsx', './learning-platform/**/*.ts', './learning-platform/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('./learning-platform/package-lock.json') }}-

      - name: Install dependencies
        run: |
          cd learning-platform
          npm ci

      - name: Build with Next.js
        run: |
          cd learning-platform
          npm run build

      - name: Create .nojekyll
        run: |
          touch ./learning-platform/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./learning-platform/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}learning/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
