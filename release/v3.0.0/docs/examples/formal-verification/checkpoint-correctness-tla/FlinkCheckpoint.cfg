\* ============================================
\* TLC Model Configuration for FlinkCheckpoint
\* ============================================

\* 常量定义（限制状态空间）
CONSTANTS
    Tasks = {t1, t2}
    MaxCheckpoint = 3
    MaxAttempts = 2

\* 验证的性质
PROPERTIES
    ValidCompletion
    CheckpointOutcome
    Consistency
    MonotonicCheckpoint

\* 不变式检查
INVARIANTS
    TypeInvariant
    SafetyInvariant
    GlobalInvariant

\* 检查死锁
CHECK_DEADLOCK
    TRUE

\* 状态约束（防止状态爆炸）
CONSTRAINT
    StateConstraint

\* 对称性约简（如果适用）
\* SYMMETRY
\*     SymmetryPerms

\* 行为选项
\* ACTION_CONSTRAINT
\*     ActionConstraint
