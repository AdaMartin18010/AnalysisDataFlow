# TwoPhaseCommit.tla TLC 模型检测配置文件
# 
# 使用方法:
# 1. 在 TLA+ Toolbox 中: 创建新模型并导入此配置
# 2. 命令行: java -cp tla2tools.jar tlc2.TLC TwoPhaseCommit -config TwoPhaseCommit.cfg
#
# 所属阶段: Struct/ | 形式化等级: L5

# =============================================================================
# 常量实例化 (CONSTANTS)
# =============================================================================

# 资源管理器集合 - 使用 3 个 RM 进行模型检测
# 可以根据需要增加，但状态空间会指数增长
CONSTANT RM = {r1, r2, r3}

# 提案号集合 - 使用单个提案号简化模型
# 在多事务场景中可以扩展为多个 ballot
CONSTANT Ballot = {0}

# =============================================================================
# 对称性优化 (SYMMETRY)
# =============================================================================

# 启用对称性约简：TLC 会将 {r1, r2, r3} 的排列视为等价状态
# 这会显著减少需要检查的状态数量
SYMMETRY RM

# =============================================================================
# 不变式检查 (INVARIANTS)
# =============================================================================

# 必须始终成立的不变式
# 如果 TLC 发现这些不变式被违反，会报告错误轨迹

# 基础类型不变式 - 确保所有变量类型正确
INVARIANT TypeInvariant

# 核心一致性不变式 - 确保所有 RM 不会同时处于 committed 和 aborted
INVARIANT Consistency

# TM 提交的前提条件 - 确保 TM 只在所有 RM 已准备时才提交
INVARIANT TMCommitImpliesAllPrepared

# 已准备集合一致性 - 确保 tmPrepared 与 rmState 一致
INVARIANT PreparedSetConsistency

# TM 决定 commit 后没有 working 状态的 RM
INVARIANT TMCommitNoWorking

# TM 决定 abort 后没有 committed 状态的 RM
INVARIANT TMAbortNoCommitted

# 组合不变式 - 包含所有安全性检查
INVARIANT Invariant

# =============================================================================
# 活性性质检查 (PROPERTIES)
# =============================================================================

# 要验证的时序性质（使用 TLC 的 LTL 检查功能）
# 注意: 某些活性性质可能需要公平性条件才能成立

# 所有 RM 最终会达成一致决定
# PROPERTY EventuallyDecided

# 所有 RM 准备后 TM 最终会提交
# PROPERTY AllPreparedLeadsToCommit

# TM 提交后 RM 最终会 committed
# PROPERTY TMCommitLeadsToRMCommitted

# TM 中止后 RM 最终会 aborted
# PROPERTY TMAbortLeadsToRMAborted

# =============================================================================
# 状态约束 (CONSTRAINT)
# =============================================================================

# 可选：添加状态约束以限制搜索深度
# 这在处理无限状态空间时特别有用
# CONSTRAINT StateConstraint

# =============================================================================
# 运行选项 (OPTIONS)
# =============================================================================

# 并行工作线程数
# workers = 4

# 状态空间限制（防止内存溢出）
# max_states = 1000000

# 检查死锁
# check_deadlock = true

# =============================================================================
# 示例运行输出
# =============================================================================
#
# 成功输出示例:
# ------------------------
# TLC 2.18
# Model checking completed. No errors found.
# 
# States found:  32 distinct states
# States examined:  52 transitions
# 
# The following invariants hold:
#   TypeInvariant
#   Consistency
#   TMCommitImpliesAllPrepared
#   ...
# ------------------------
#
# 错误输出示例:
# ------------------------
# Error: Invariant Consistency is violated.
# 
# Error trace:
# State 1: Initial state
#   rmState = [r1 |-> "working", r2 |-> "working", r3 |-> "working"]
#   tmState = "init"
#   tmPrepared = {}
#   ...
# ------------------------

# =============================================================================
# 配置说明
# =============================================================================
#
# 1. RM 数量与状态空间:
#    - 3 RM: 约 32 个状态，可快速检测
#    - 4 RM: 约 100+ 个状态，检测时间增加
#    - 5 RM: 约 300+ 个状态，可能需要较长时间
#
# 2. 建议的检测顺序:
#    a) 先用 3 RM 检查所有不变式
#    b) 确认通过后尝试活性性质
#    c) 增加 RM 数量验证可扩展性
#
# 3. 故障注入测试:
#    - 可以通过修改规约来模拟 RM 故障
#    - 测试 TMAbort 在各种场景下的行为
#
# =============================================================================
