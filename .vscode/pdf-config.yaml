# AnalysisDataFlow PDF 导出配置文件
# PDF Export Configuration for AnalysisDataFlow Project

# ==================== 基础配置 ====================
# 文档元数据
metadata:
  title: "AnalysisDataFlow - 流计算理论模型与工程实践知识库"
  subtitle: "Unified Streaming Theory Model & Engineering Practice Knowledge Base"
  author: "AnalysisDataFlow Project"
  version: "v2.9"
  date: "\\today"
  keywords: ["流计算", "Stream Processing", "Flink", "Dataflow", "Actor模型", "CSP"]

# ==================== 页面设置 ====================
page:
  # 页面大小: a4, letter, a5
  size: a4
  # 边距 (单位: mm)
  margin:
    top: 25
    bottom: 25
    left: 30
    right: 25
  # 行间距 (1.0 = 单倍行距)
  line_spacing: 1.3

# ==================== 字体设置 ====================
fonts:
  # 主字体配置
  main: "Latin Modern Roman"
  sans: "Latin Modern Sans"
  mono: "Latin Modern Mono"
  
  # 中文字体 (使用 XeCJK)
  chinese:
    main: "Source Han Serif SC"      # 思源宋体
    sans: "Source Han Sans SC"       # 思源黑体
    mono: "Noto Sans Mono CJK SC"    # Noto Mono CJK
  
  # 字体大小 (pt)
  sizes:
    tiny: 8
    scriptsize: 9
    footnotesize: 10
    small: 10.5
    normalsize: 11
    large: 12
    Large: 14
    LARGE: 17
    huge: 20
    Huge: 25

# ==================== 目录设置 ====================
table_of_contents:
  # 是否生成目录
  enabled: true
  # 目录深度: 1-4 (对应标题级别)
  depth: 3
  # 目录标题
  title: "目录 Contents"
  # 是否显示页码
  show_page_numbers: true

# ==================== 页眉页脚 ====================
header_footer:
  # 页眉
  header:
    enabled: true
    # 左右内容
    left: "AnalysisDataFlow"
    center: ""
    right: "\\leftmark"  # 当前章节名
  
  # 页脚
  footer:
    enabled: true
    left: ""
    center: "\\thepage"  # 页码
    right: ""
  
  # 页码样式: arabic, roman, Roman, alph, Alph
  page_number_style: arabic

# ==================== 代码块设置 ====================
code_blocks:
  # 代码块背景色
  background_color: "F5F5F5"
  # 代码块边框
  border: true
  border_color: "E0E0E0"
  border_width: "0.5pt"
  # 代码字体大小
  font_size: "small"
  # 行号
  line_numbers: true
  # 语法高亮主题
  # 可选: tango, pygments, kate, monochrome, espresso, zenburn, haddock
  highlight_theme: "tango"
  # 代码块内边距
  padding: "8pt"

# ==================== 定理/定义框设置 ====================
theorem_boxes:
  # 定理框样式
  theorem:
    background_color: "E8F4FD"
    border_color: "2196F3"
    border_width: "1pt"
    border_left_width: "4pt"
    title_color: "1976D2"
  
  # 定义框样式
  definition:
    background_color: "E8F5E9"
    border_color: "4CAF50"
    border_width: "1pt"
    border_left_width: "4pt"
    title_color: "388E3C"
  
  # 引理框样式
  lemma:
    background_color: "FFF3E0"
    border_color: "FF9800"
    border_width: "1pt"
    border_left_width: "4pt"
    title_color: "F57C00"
  
  # 命题框样式
  proposition:
    background_color: "F3E5F5"
    border_color: "9C27B0"
    border_width: "1pt"
    border_left_width: "4pt"
    title_color: "7B1FA2"
  
  # 推论框样式
  corollary:
    background_color: "E0F2F1"
    border_color: "009688"
    border_width: "1pt"
    border_left_width: "4pt"
    title_color: "00796B"

# ==================== 表格设置 ====================
tables:
  # 表格默认对齐方式
  default_alignment: "center"
  # 表头背景色
  header_background: "E3F2FD"
  # 交替行背景色
  alternate_rows: true
  alternate_row_background: "F5F5F5"
  # 表格边框
  borders: true
  border_color: "BDBDBD"
  # 表格字体大小
  font_size: "small"
  # 表格内边距
  padding: "6pt"

# ==================== 链接设置 ====================
links:
  # 内部链接颜色
  internal_color: "1565C0"
  # 外部链接颜色
  external_color: "2E7D32"
  # 是否下划线
  underline: false
  # URL 样式
  url_style: "tt"

# ==================== 图片设置 ====================
images:
  # 默认图片宽度 (相对于文本宽度的百分比)
  default_width: "80%"
  # 图片最大高度
  max_height: "20cm"
  # 图片对齐
  alignment: "center"
  # 图片标题位置: above, below
  caption_position: "below"
  # 图片标题字体大小
  caption_font_size: "small"

# ==================== Mermaid图表设置 ====================
mermaid:
  # Mermaid 渲染方式: puppeteer, mmdc
  renderer: "mmdc"
  # Mermaid CLI 路径 (如未在 PATH 中)
  cli_path: ""
  # 图表输出格式: png, svg, pdf
  output_format: "png"
  # 图表分辨率 (DPI)
  dpi: 150
  # 图表背景色
  background: "white"
  # Mermaid 主题
  theme: "default"
  # 图表缩放比例
  scale: 2

# ==================== 导出模式 ====================
export_modes:
  # 单文档导出
  single:
    # 输出文件名模板
    # 可用变量: {filename}, {date}, {title}
    output_template: "{filename}.pdf"
    # 是否包含目录
    include_toc: true
  
  # 批量导出
  batch:
    # 输出目录
    output_dir: "./pdf-output"
    # 是否保留目录结构
    preserve_structure: true
    # 并行导出数量
    parallel_jobs: 4
  
  # 合并导出
  merge:
    # 合并后文件名
    output_file: "AnalysisDataFlow-Complete.pdf"
    # 章节间是否添加分页
    page_break_between: true
    # 是否为每个文档添加封面页
    cover_per_document: false

# ==================== 过滤器配置 ====================
filters:
  # 是否启用 pandoc-crossref 进行交叉引用
  crossref: true
  # 是否启用 citeproc 进行引用处理
  citeproc: false
  # 自定义 Lua 过滤器
  lua_filters:
    - "mermaid-filter.lua"
    - "theorem-boxes.lua"

# ==================== Pandoc 额外参数 ====================
pandoc_args:
  # 其他 pandoc 参数
  extra:
    - "--standalone"
    - "--number-sections"
    - "--highlight-style=tango"

# ==================== 输出质量 ====================
quality:
  # PDF 压缩级别: 0-4 (0=无压缩, 4=最大压缩)
  compression: 2
  # 图片分辨率 (DPI)
  image_resolution: 150
  # 是否嵌入字体
  embed_fonts: true
