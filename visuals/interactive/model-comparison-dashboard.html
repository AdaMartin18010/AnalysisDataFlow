<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalysisDataFlow - 模型对比仪表板</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --panel-dark: #1e293b;
            --panel-light: #ffffff;
            --text-dark: #e2e8f0;
            --text-light: #1e293b;
            --accent-actor: #3b82f6;
            --accent-csp: #10b981;
            --accent-dataflow: #f59e0b;
            --accent-pi: #8b5cf6;
            --border-dark: #334155;
            --border-light: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-theme {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-light);
        }

        /* 头部 */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid;
        }

        .dark-theme #header {
            background: rgba(15, 23, 42, 0.95);
            border-color: var(--border-dark);
            backdrop-filter: blur(10px);
        }

        .light-theme #header {
            background: rgba(248, 250, 252, 0.95);
            border-color: var(--border-light);
            backdrop-filter: blur(10px);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
        }

        .header-title i {
            color: var(--accent-actor);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            padding: 8px 16px;
            border: 1px solid;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .dark-theme .header-btn {
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .light-theme .header-btn {
            border-color: var(--border-light);
            color: var(--text-light);
        }

        .header-btn:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .header-btn.primary {
            background: var(--accent-actor);
            color: white;
            border-color: var(--accent-actor);
        }

        /* 主体布局 */
        #container {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }

        /* 侧边栏 */
        #sidebar {
            width: 280px;
            flex-shrink: 0;
            border-right: 1px solid;
            padding: 20px;
            position: fixed;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .dark-theme #sidebar {
            background: var(--panel-dark);
            border-color: var(--border-dark);
        }

        .light-theme #sidebar {
            background: var(--panel-light);
            border-color: var(--border-light);
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        /* 模型选择 */
        .model-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .model-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-theme .model-item {
            border-color: var(--border-dark);
        }

        .light-theme .model-item {
            border-color: var(--border-light);
        }

        .model-item:hover {
            transform: translateX(4px);
        }

        .model-item.active {
            border-width: 2px;
        }

        .model-item.actor.active { border-color: var(--accent-actor); background: rgba(59, 130, 246, 0.1); }
        .model-item.csp.active { border-color: var(--accent-csp); background: rgba(16, 185, 129, 0.1); }
        .model-item.dataflow.active { border-color: var(--accent-dataflow); background: rgba(245, 158, 11, 0.1); }
        .model-item.pi.active { border-color: var(--accent-pi); background: rgba(139, 92, 246, 0.1); }

        .model-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .model-color.actor { background: var(--accent-actor); }
        .model-color.csp { background: var(--accent-csp); }
        .model-color.dataflow { background: var(--accent-dataflow); }
        .model-color.pi { background: var(--accent-pi); }

        .model-name {
            font-weight: 500;
            font-size: 14px;
        }

        /* 对比维度 */
        .dimension-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dimension-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dimension-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .dimension-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .dimension-label {
            font-size: 13px;
            flex: 1;
        }

        /* 主内容区 */
        #main-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-card {
            border: 1px solid;
            border-radius: 12px;
            overflow: hidden;
        }

        .dark-theme .dashboard-card {
            background: var(--panel-dark);
            border-color: var(--border-dark);
        }

        .light-theme .dashboard-card {
            background: var(--panel-light);
            border-color: var(--border-light);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dark-theme .card-header {
            border-color: var(--border-dark);
        }

        .light-theme .card-header {
            border-color: var(--border-light);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .dark-theme .card-btn {
            color: var(--text-dark);
        }

        .light-theme .card-btn {
            color: var(--text-light);
        }

        .card-btn:hover {
            opacity: 1;
            background: rgba(128, 128, 128, 0.2);
        }

        .card-body {
            padding: 20px;
            min-height: 300px;
        }

        /* 全宽卡片 */
        .dashboard-card.full-width {
            grid-column: span 2;
        }

        /* 对比矩阵 */
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .matrix-table th,
        .matrix-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid;
        }

        .dark-theme .matrix-table th,
        .dark-theme .matrix-table td {
            border-color: var(--border-dark);
        }

        .light-theme .matrix-table th,
        .light-theme .matrix-table td {
            border-color: var(--border-light);
        }

        .matrix-table th {
            font-weight: 600;
            background: rgba(128, 128, 128, 0.1);
        }

        .matrix-table th:first-child {
            text-align: left;
        }

        .matrix-table td:first-child {
            text-align: left;
            font-weight: 500;
        }

        .matrix-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .score-high { color: #10b981; }
        .score-medium { color: #f59e0b; }
        .score-low { color: #ef4444; }

        /* 雷达图容器 */
        .radar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* 层次可视化 */
        .hierarchy-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .hierarchy-level {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 0 30px;
            position: relative;
        }

        .hierarchy-level:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 30px;
            height: 2px;
            background: linear-gradient(to right, currentColor, transparent);
            opacity: 0.3;
        }

        .level-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(128, 128, 128, 0.1);
        }

        .level-models {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .level-model {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-model:hover {
            transform: scale(1.05);
        }

        .level-model.actor { background: rgba(59, 130, 246, 0.2); color: var(--accent-actor); }
        .level-model.csp { background: rgba(16, 185, 129, 0.2); color: var(--accent-csp); }
        .level-model.dataflow { background: rgba(245, 158, 11, 0.2); color: var(--accent-dataflow); }
        .level-model.pi { background: rgba(139, 92, 246, 0.2); color: var(--accent-pi); }

        /* 决策树 */
        .decision-tree {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .decision-node {
            padding: 16px;
            border: 1px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-theme .decision-node {
            border-color: var(--border-dark);
            background: rgba(30, 41, 59, 0.5);
        }

        .light-theme .decision-node {
            border-color: var(--border-light);
            background: rgba(255, 255, 255, 0.5);
        }

        .decision-node:hover {
            border-color: var(--accent-actor);
        }

        .decision-node.active {
            border-color: var(--accent-actor);
            background: rgba(59, 130, 246, 0.1);
        }

        .decision-question {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .decision-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .decision-option {
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-theme .decision-option {
            background: var(--border-dark);
        }

        .light-theme .decision-option {
            background: var(--border-light);
        }

        .decision-option:hover {
            background: var(--accent-actor);
            color: white;
        }

        .decision-option.selected {
            background: var(--accent-actor);
            color: white;
        }

        .decision-result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .decision-result.visible {
            display: block;
        }

        .dark-theme .decision-result {
            background: rgba(59, 130, 246, 0.1);
        }

        .light-theme .decision-result {
            background: rgba(59, 130, 246, 0.05);
        }

        /* 报告生成 */
        .report-preview {
            padding: 20px;
            border: 1px solid;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
        }

        .dark-theme .report-preview {
            background: rgba(30, 41, 59, 0.5);
            border-color: var(--border-dark);
        }

        .light-theme .report-preview {
            background: rgba(255, 255, 255, 0.5);
            border-color: var(--border-light);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-card.full-width {
                grid-column: span 1;
            }

            #sidebar {
                transform: translateX(-100%);
                z-index: 90;
            }

            #sidebar.visible {
                transform: translateX(0);
            }

            #main-content {
                margin-left: 0;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid transparent;
            border-top-color: var(--accent-actor);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 工具提示 */
        #tooltip {
            position: fixed;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
        }

        .dark-theme #tooltip {
            background: var(--panel-dark);
            border: 1px solid var(--border-dark);
            color: var(--text-dark);
        }

        .light-theme #tooltip {
            background: var(--panel-light);
            border: 1px solid var(--border-light);
            color: var(--text-light);
        }
    </style>
</head>
<body class="dark-theme">
    <!-- 头部 -->
    <header id="header">
        <div class="header-title">
            <i class="fas fa-th-large"></i>
            <span>模型对比仪表板</span>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleTheme()">
                <i class="fas fa-sun" id="theme-icon"></i>
                <span>主题</span>
            </button>
            <button class="header-btn primary" onclick="generateReport()">
                <i class="fas fa-file-export"></i>
                <span>导出报告</span>
            </button>
        </div>
    </header>

    <div id="container">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">选择模型</div>
                <div class="model-list">
                    <label class="model-item actor active" data-model="actor">
                        <span class="model-color actor"></span>
                        <span class="model-name">Actor 模型</span>
                        <input type="checkbox" checked style="margin-left: auto;" onchange="toggleModel('actor')">
                    </label>
                    <label class="model-item csp active" data-model="csp">
                        <span class="model-color csp"></span>
                        <span class="model-name">CSP 进程代数</span>
                        <input type="checkbox" checked style="margin-left: auto;" onchange="toggleModel('csp')">
                    </label>
                    <label class="model-item dataflow active" data-model="dataflow">
                        <span class="model-color dataflow"></span>
                        <span class="model-name">Dataflow 模型</span>
                        <input type="checkbox" checked style="margin-left: auto;" onchange="toggleModel('dataflow')">
                    </label>
                    <label class="model-item pi active" data-model="pi">
                        <span class="model-color pi"></span>
                        <span class="model-name">π 演算</span>
                        <input type="checkbox" checked style="margin-left: auto;" onchange="toggleModel('pi')">
                    </label>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">对比维度</div>
                <div class="dimension-list">
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="expressiveness">
                        <span class="dimension-label">表达能力</span>
                    </label>
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="composition">
                        <span class="dimension-label">组合性</span>
                    </label>
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="verification">
                        <span class="dimension-label">可验证性</span>
                    </label>
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="performance">
                        <span class="dimension-label">执行效率</span>
                    </label>
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="scalability">
                        <span class="dimension-label">可扩展性</span>
                    </label>
                    <label class="dimension-item">
                        <input type="checkbox" checked onchange="updateCharts()" data-dim="practicality">
                        <span class="dimension-label">工程实用性</span>
                    </label>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">快速操作</div>
                <div class="dimension-list">
                    <div class="dimension-item" onclick="selectAllModels()">
                        <i class="fas fa-check-square"></i>
                        <span class="dimension-label">全选模型</span>
                    </div>
                    <div class="dimension-item" onclick="resetComparison()">
                        <i class="fas fa-undo"></i>
                        <span class="dimension-label">重置对比</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main id="main-content">
            <div class="dashboard-grid">
                <!-- 对比矩阵 -->
                <div class="dashboard-card full-width">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-table"></i>
                            <span>模型对比矩阵</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn" onclick="exportMatrix()" title="导出">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="matrix-table" id="matrix-table">
                            <thead>
                                <tr>
                                    <th>维度 / 模型</th>
                                    <th>Actor 模型</th>
                                    <th>CSP 进程代数</th>
                                    <th>Dataflow 模型</th>
                                    <th>π 演算</th>
                                </tr>
                            </thead>
                            <tbody id="matrix-body">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 雷达图 -->
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-chart-radar"></i>
                            <span>性能特征雷达图</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="radar-container">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 表达力层次 -->
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-layer-group"></i>
                            <span>表达能力层次</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="hierarchy-container" id="hierarchy-viz">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>

                <!-- 决策树 -->
                <div class="dashboard-card full-width">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-sitemap"></i>
                            <span>应用场景决策树</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="decision-tree" id="decision-tree">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 工具提示 -->
    <div id="tooltip"></div>

    <script>
        // ==========================================
        // 模型数据定义
        // ==========================================
        const models = {
            actor: {
                name: 'Actor 模型',
                color: '#3b82f6',
                description: '基于消息传递的并发模型',
                scores: {
                    expressiveness: 8,
                    composition: 7,
                    verification: 6,
                    performance: 8,
                    scalability: 9,
                    practicality: 9
                },
                features: ['消息传递', '状态封装', '位置透明', '容错性', '分布式友好'],
                useCases: ['分布式系统', '微服务', '实时消息处理', '游戏服务器'],
                pros: ['天然分布式', '容错性强', '易于水平扩展'],
                cons: ['调试困难', '消息顺序不保证', '状态管理复杂']
            },
            csp: {
                name: 'CSP 进程代数',
                color: '#10b981',
                description: '基于通信顺序进程的并发模型',
                scores: {
                    expressiveness: 7,
                    composition: 9,
                    verification: 9,
                    performance: 7,
                    scalability: 6,
                    practicality: 7
                },
                features: ['同步通信', '通道抽象', '组合推理', '形式化验证', '死锁检测'],
                useCases: ['形式化验证', '协议设计', '安全关键系统', 'Go语言并发'],
                pros: ['数学基础扎实', '可组合推理', '工具支持好'],
                cons: ['同步通信开销', '编程模型严格', '学习曲线陡峭']
            },
            dataflow: {
                name: 'Dataflow 模型',
                color: '#f59e0b',
                description: '基于数据流的计算模型',
                scores: {
                    expressiveness: 9,
                    composition: 8,
                    verification: 7,
                    performance: 9,
                    scalability: 8,
                    practicality: 9
                },
                features: ['数据驱动', '自动并行', '声明式', '流式处理', '时间语义'],
                useCases: ['流处理', 'ETL管道', '实时分析', '机器学习推理'],
                pros: ['自动并行化', '声明式编程', '优化空间大'],
                cons: ['调试困难', '延迟不可控', '状态管理复杂']
            },
            pi: {
                name: 'π 演算',
                color: '#8b5cf6',
                description: '支持移动性的进程演算',
                scores: {
                    expressiveness: 10,
                    composition: 8,
                    verification: 8,
                    performance: 5,
                    scalability: 5,
                    practicality: 4
                },
                features: ['通道传递', '移动性', '动态拓扑', '高阶类型', '最强表达力'],
                useCases: ['协议验证', '移动计算', '动态重配置', '理论基础研究'],
                pros: ['表达能力最强', '理论基础完备', '灵活性极高'],
                cons: ['实现困难', '性能开销大', '工程应用少']
            }
        };

        const dimensions = {
            expressiveness: { name: '表达能力', description: '描述和建模复杂系统的能力' },
            composition: { name: '组合性', description: '模块化组合和推理的能力' },
            verification: { name: '可验证性', description: '形式化验证和正确性证明的难易程度' },
            performance: { name: '执行效率', description: '运行时性能和资源利用率' },
            scalability: { name: '可扩展性', description: '水平扩展和分布式部署能力' },
            practicality: { name: '工程实用性', description: '工业界采用度和工程支持'
            }
        };

        const matrixData = [
            { dim: 'expressiveness', actor: 8, csp: 7, dataflow: 9, pi: 10 },
            { dim: 'composition', actor: 7, csp: 9, dataflow: 8, pi: 8 },
            { dim: 'verification', actor: 6, csp: 9, dataflow: 7, pi: 8 },
            { dim: 'performance', actor: 8, csp: 7, dataflow: 9, pi: 5 },
            { dim: 'scalability', actor: 9, csp: 6, dataflow: 8, pi: 5 },
            { dim: 'practicality', actor: 9, csp: 7, dataflow: 9, pi: 4 }
        ];

        // 全局状态
        let activeModels = ['actor', 'csp', 'dataflow', 'pi'];
        let activeDimensions = ['expressiveness', 'composition', 'verification', 'performance', 'scalability', 'practicality'];
        let radarChart = null;

        // ==========================================
        // 初始化
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            initMatrix();
            initRadarChart();
            initHierarchy();
            initDecisionTree();
        });

        // ==========================================
        // 对比矩阵
        // ==========================================
        function initMatrix() {
            const tbody = document.getElementById('matrix-body');
            tbody.innerHTML = '';

            matrixData.forEach(row => {
                const tr = document.createElement('tr');
                const dimName = dimensions[row.dim].name;
                
                tr.innerHTML = `
                    <td>${dimName}</td>
                    <td>${renderScoreCell(row.actor)}</td>
                    <td>${renderScoreCell(row.csp)}</td>
                    <td>${renderScoreCell(row.dataflow)}</td>
                    <td>${renderScoreCell(row.pi)}</td>
                `;
                
                tbody.appendChild(tr);
            });
        }

        function renderScoreCell(score) {
            const icon = score >= 8 ? 'fa-check-circle' : score >= 6 ? 'fa-check' : 'fa-minus';
            const colorClass = score >= 8 ? 'score-high' : score >= 6 ? 'score-medium' : 'score-low';
            return `
                <div class="matrix-cell ${colorClass}">
                    <i class="fas ${icon}"></i>
                    <span>${score}/10</span>
                </div>
            `;
        }

        // ==========================================
        // 雷达图
        // ==========================================
        function initRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            const datasets = activeModels.map(modelKey => ({
                label: models[modelKey].name,
                data: activeDimensions.map(dim => models[modelKey].scores[dim]),
                backgroundColor: models[modelKey].color + '33',
                borderColor: models[modelKey].color,
                borderWidth: 2,
                pointBackgroundColor: models[modelKey].color,
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: models[modelKey].color
            }));

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: activeDimensions.map(dim => dimensions[dim].name),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 10,
                            min: 0,
                            ticks: {
                                stepSize: 2,
                                color: document.body.classList.contains('dark-theme') ? '#94a3b8' : '#64748b'
                            },
                            grid: {
                                color: document.body.classList.contains('dark-theme') ? '#334155' : '#e2e8f0'
                            },
                            angleLines: {
                                color: document.body.classList.contains('dark-theme') ? '#334155' : '#e2e8f0'
                            },
                            pointLabels: {
                                color: document.body.classList.contains('dark-theme') ? '#e2e8f0' : '#1e293b',
                                font: { size: 11 }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: document.body.classList.contains('dark-theme') ? '#e2e8f0' : '#1e293b',
                                padding: 15,
                                font: { size: 11 }
                            }
                        }
                    }
                }
            });
        }

        function updateRadarChart() {
            if (!radarChart) return;

            radarChart.data.labels = activeDimensions.map(dim => dimensions[dim].name);
            radarChart.data.datasets = activeModels.map(modelKey => ({
                label: models[modelKey].name,
                data: activeDimensions.map(dim => models[modelKey].scores[dim]),
                backgroundColor: models[modelKey].color + '33',
                borderColor: models[modelKey].color,
                borderWidth: 2,
                pointBackgroundColor: models[modelKey].color,
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: models[modelKey].color
            }));
            
            radarChart.update();
        }

        // ==========================================
        // 表达力层次
        // ==========================================
        function initHierarchy() {
            const container = document.getElementById('hierarchy-viz');
            
            const levels = [
                { title: '最高表达力', models: ['pi'], desc: '图灵完备，支持移动性' },
                { title: '高表达力', models: ['dataflow', 'actor'], desc: '适合流处理和分布式' },
                { title: '中等表达力', models: ['csp'], desc: '强调组合和验证' }
            ];

            container.innerHTML = levels.map(level => `
                <div class="hierarchy-level">
                    <div class="level-title">${level.title}</div>
                    <div class="level-models">
                        ${level.models.map(m => `
                            <div class="level-model ${m}" onclick="showModelDetail('${m}')">
                                ${models[m].name}
                            </div>
                        `).join('')}
                    </div>
                    <div style="font-size: 11px; opacity: 0.7; text-align: center; margin-top: 4px;">${level.desc}</div>
                </div>
            `).join('');
        }

        // ==========================================
        // 决策树
        // ==========================================
        function initDecisionTree() {
            const container = document.getElementById('decision-tree');
            
            const questions = [
                {
                    id: 'q1',
                    question: '您的应用场景是什么？',
                    options: [
                        { label: '流式数据处理', value: 'streaming', next: 'q2' },
                        { label: '分布式微服务', value: 'microservices', next: 'result-actor' },
                        { label: '形式化验证', value: 'verification', next: 'result-csp' },
                        { label: '协议设计', value: 'protocol', next: 'result-pi' }
                    ]
                },
                {
                    id: 'q2',
                    question: '对延迟的要求如何？',
                    options: [
                        { label: '超低延迟 (<10ms)', value: 'low', next: 'result-actor' },
                        { label: '低延迟 (<100ms)', value: 'medium', next: 'q3' },
                        { label: '高吞吐优先', value: 'throughput', next: 'result-dataflow' }
                    ]
                },
                {
                    id: 'q3',
                    question: '是否需要状态管理？',
                    options: [
                        { label: '复杂状态', value: 'complex', next: 'result-dataflow' },
                        { label: '简单状态', value: 'simple', next: 'q4' }
                    ]
                },
                {
                    id: 'q4',
                    question: '对容错性的要求？',
                    options: [
                        { label: '必须保证Exactly-Once', value: 'exactly-once', next: 'result-dataflow' },
                        { label: 'At-Least-Once即可', value: 'at-least', next: 'result-actor' }
                    ]
                }
            ];

            const results = {
                'result-actor': { model: 'actor', reason: 'Actor模型天然适合分布式场景，容错性强，适合微服务架构。' },
                'result-csp': { model: 'csp', reason: 'CSP有强大的形式化基础，适合需要严格验证的场景。' },
                'result-dataflow': { model: 'dataflow', reason: 'Dataflow模型自动并行化，适合大规模流处理。' },
                'result-pi': { model: 'pi', reason: 'π演算表达能力最强，适合协议设计和理论研究。' }
            };

            function renderQuestion(q) {
                return `
                    <div class="decision-node" data-question="${q.id}">
                        <div class="decision-question">${q.question}</div>
                        <div class="decision-options">
                            ${q.options.map(opt => `
                                <span class="decision-option" data-next="${opt.next}" data-value="${opt.value}">
                                    ${opt.label}
                                </span>
                            `).join('')}
                        </div>
                        <div class="decision-result" id="result-${q.id}"></div>
                    </div>
                `;
            }

            container.innerHTML = questions.map(q => renderQuestion(q)).join('');

            // 绑定点击事件
            container.querySelectorAll('.decision-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    const node = this.closest('.decision-node');
                    const questionId = node.dataset.question;
                    const next = this.dataset.next;
                    const value = this.dataset.value;

                    // 高亮选中
                    node.querySelectorAll('.decision-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    node.classList.add('active');

                    // 显示结果或下一题
                    if (next.startsWith('result-')) {
                        const result = results[next];
                        const resultDiv = document.getElementById(`result-${questionId}`);
                        resultDiv.innerHTML = `
                            <strong>推荐模型：${models[result.model].name}</strong><br>
                            ${result.reason}
                        `;
                        resultDiv.classList.add('visible');
                    }
                });
            });
        }

        // ==========================================
        // 交互功能
        // ==========================================
        function toggleModel(model) {
            const index = activeModels.indexOf(model);
            if (index > -1) {
                activeModels.splice(index, 1);
                document.querySelector(`.model-item[data-model="${model}"]`).classList.remove('active');
            } else {
                activeModels.push(model);
                document.querySelector(`.model-item[data-model="${model}"]`).classList.add('active');
            }
            updateCharts();
        }

        function updateCharts() {
            // 更新维度
            activeDimensions = Array.from(document.querySelectorAll('.dimension-list input:checked'))
                .map(cb => cb.dataset.dim);
            
            updateRadarChart();
        }

        function selectAllModels() {
            activeModels = ['actor', 'csp', 'dataflow', 'pi'];
            document.querySelectorAll('.model-item').forEach(item => item.classList.add('active'));
            document.querySelectorAll('.model-list input').forEach(cb => cb.checked = true);
            updateCharts();
        }

        function resetComparison() {
            activeModels = ['actor', 'csp', 'dataflow', 'pi'];
            activeDimensions = ['expressiveness', 'composition', 'verification', 'performance', 'scalability', 'practicality'];
            
            document.querySelectorAll('.model-item').forEach(item => item.classList.add('active'));
            document.querySelectorAll('.model-list input').forEach(cb => cb.checked = true);
            document.querySelectorAll('.dimension-list input').forEach(cb => cb.checked = true);
            
            updateCharts();
        }

        function showModelDetail(modelKey) {
            const model = models[modelKey];
            alert(`${model.name}\n\n${model.description}\n\n特点：${model.features.join('、')}\n\n适用场景：${model.useCases.join('、')}`);
        }

        // ==========================================
        // 导出功能
        // ==========================================
        function generateReport() {
            const report = `
# 并发模型对比报告

生成时间: ${new Date().toLocaleString()}

## 对比模型
${activeModels.map(m => `- ${models[m].name}`).join('\n')}

## 综合评分

| 维度 | ${activeModels.map(m => models[m].name).join(' | ')} |
|------|${activeModels.map(() => '------|').join('')}
${activeDimensions.map(dim => {
    return `| ${dimensions[dim].name} | ${activeModels.map(m => models[m].scores[dim]).join(' | ')} |`;
}).join('\n')}

## 模型详情

${activeModels.map(m => `
### ${models[m].name}
${models[m].description}

**特点**: ${models[m].features.join('、')}

**适用场景**: ${models[m].useCases.join('、')}

**优势**: ${models[m].pros.join('、')}

**劣势**: ${models[m].cons.join('、')}
`).join('\n')}

## 推荐建议

根据您的应用场景，建议选择：

- **流式数据处理**: Dataflow 模型
- **分布式微服务**: Actor 模型  
- **形式化验证**: CSP 进程代数
- **协议设计**: π 演算

---
*本报告由 AnalysisDataFlow 模型对比仪表板生成*
            `.trim();

            const blob = new Blob([report], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `model-comparison-report-${new Date().toISOString().slice(0, 10)}.md`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function exportMatrix() {
            let csv = '维度,' + activeModels.map(m => models[m].name).join(',') + '\n';
            
            matrixData.forEach(row => {
                if (activeDimensions.includes(row.dim)) {
                    csv += dimensions[row.dim].name + ',';
                    csv += activeModels.map(m => row[m]).join(',');
                    csv += '\n';
                }
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `model-comparison-matrix-${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-sun');
            icon.classList.toggle('fa-moon');

            // 更新图表主题
            if (radarChart) {
                const isDark = document.body.classList.contains('dark-theme');
                radarChart.options.scales.r.ticks.color = isDark ? '#94a3b8' : '#64748b';
                radarChart.options.scales.r.grid.color = isDark ? '#334155' : '#e2e8f0';
                radarChart.options.scales.r.angleLines.color = isDark ? '#334155' : '#e2e8f0';
                radarChart.options.scales.r.pointLabels.color = isDark ? '#e2e8f0' : '#1e293b';
                radarChart.options.plugins.legend.labels.color = isDark ? '#e2e8f0' : '#1e293b';
                radarChart.update();
            }
        }

        // 响应式处理
        window.addEventListener('resize', () => {
            if (radarChart) {
                radarChart.resize();
            }
        });
    </script>
</body>
</html>
