# Performance Benchmark CI/CD Pipeline
# Phase 2 Task 5-6: Automated Performance Testing

name: Performance Benchmark

on:
  schedule:
    # Run benchmarks daily at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Type of benchmark to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - throughput
          - latency
          - checkpoint

env:
  FLINK_VERSION: '1.18.0'
  BENCHMARK_TIMEOUT: 3600

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      benchmark_id: ${{ steps.setup.outputs.benchmark_id }}
    steps:
      - name: Generate Benchmark ID
        id: setup
        run: echo "benchmark_id=bm-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@v4

  throughput-benchmark:
    needs: setup
    if: github.event.inputs.benchmark_type == 'throughput' || github.event.inputs.benchmark_type == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Flink
        run: |
          wget https://archive.apache.org/dist/flink/flink-${FLINK_VERSION}/flink-${FLINK_VERSION}-bin-scala_2.12.tgz
          tar -xzf flink-${FLINK_VERSION}-bin-scala_2.12.tgz
          echo "FLINK_HOME=$PWD/flink-${FLINK_VERSION}" >> $GITHUB_ENV

      - name: Run Throughput Benchmark
        run: |
          cd benchmarks/throughput
          ./run-benchmark.sh --duration 300 --output ../results/${{ needs.setup.outputs.benchmark_id }}-throughput.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: throughput-results
          path: benchmarks/results/*-throughput.json

  latency-benchmark:
    needs: setup
    if: github.event.inputs.benchmark_type == 'latency' || github.event.inputs.benchmark_type == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Latency Benchmark
        run: |
          cd benchmarks/latency
          ./run-benchmark.sh --duration 300 --percentiles 50,99,99.9

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: latency-results
          path: benchmarks/results/*-latency.json

  checkpoint-benchmark:
    needs: setup
    if: github.event.inputs.benchmark_type == 'checkpoint' || github.event.inputs.benchmark_type == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Checkpoint Benchmark
        run: |
          cd benchmarks/checkpoint
          ./run-benchmark.sh --state-size 1gb --checkpoint-interval 60s

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint-results
          path: benchmarks/results/*-checkpoint.json

  report:
    needs: [setup, throughput-benchmark, latency-benchmark, checkpoint-benchmark]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: benchmarks/results
          pattern: '*-results'

      - name: Generate Report
        run: |
          python benchmarks/generate-report.py \
            --benchmark-id ${{ needs.setup.outputs.benchmark_id }} \
            --output benchmarks/reports/${{ needs.setup.outputs.benchmark_id }}-report.md

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmarks/reports/*-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmarks/reports/${{ needs.setup.outputs.benchmark_id }}-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Performance Benchmark Results\n\n${report}`
            });

  notify:
    needs: report
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Notification
        run: |
          echo "Benchmark completed: ${{ needs.setup.outputs.benchmark_id }}"
          echo "Status: ${{ job.status }}"
          # Add notification logic here (email, Slack, etc.)
