# docker-compose.yml - 矿业IoT监控系统
version: '3.8'

services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mining-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mining-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Topics初始化
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mining-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 10
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.equipment.sensors --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.personnel.location --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.environment.data --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.video.analytics --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.alerts --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mining.analytics --partitions 3 --replication-factor 1
      echo 'Topics created successfully'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - mining-network
    restart: "no"

  # TDengine - 时序数据库
  tdengine:
    image: tdengine/tdengine:3.2.0.0
    container_name: mining-tdengine
    ports:
      - "6030:6030"
      - "6041:6041"
      - "6043-6049:6043-6049"
      - "6043-6049:6043-6049/udp"
    environment:
      TAOS_FQDN: tdengine
      TAOS_SERVER_PORT: 6030
    volumes:
      - tdengine_data:/var/lib/taos
      - ../flink-sql/init-tdengine.sql:/init.sql
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "taos", "-s", "show databases"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - 关系数据库
  postgres:
    image: postgres:16-alpine
    container_name: mining-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mining_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../flink-sql/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mining-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存
  redis:
    image: redis:7.2-alpine
    container_name: mining-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mining-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO - 对象存储
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: mining-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Flink JobManager
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12
    container_name: mining-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - FLINK_PROPERTIES=
          jobmanager.memory.process.size: 2048m
          jobmanager.memory.jvm-heap.size: 1536m
          jobmanager.memory.off-heap.size: 256m
          state.backend: rocksdb
          state.checkpoint-storage: filesystem
          state.checkpoints.dir: file:///tmp/flink-checkpoints
    volumes:
      - ../flink-sql:/opt/flink/sql
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - mining-network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tdengine:
        condition: service_healthy

  # Flink TaskManager
  flink-taskmanager:
    image: flink:1.18.1-scala_2.12
    container_name: mining-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - FLINK_PROPERTIES=
          taskmanager.memory.process.size: 4096m
          taskmanager.memory.flink.size: 3072m
          taskmanager.memory.managed.size: 1024m
          taskmanager.numberOfTaskSlots: 4
          state.backend: rocksdb
          state.checkpoint-storage: filesystem
          state.checkpoints.dir: file:///tmp/flink-checkpoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - mining-network
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 4G

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:10.3.0
    container_name: mining-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=tdengine-datasource,grafana-clock-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../grafana/dashboards:/var/lib/grafana/dashboards
      - ../grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - tdengine
      - postgres
    networks:
      - mining-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 设备数据模拟器
  equipment-simulator:
    build:
      context: ../mock-data
      dockerfile: Dockerfile.equipment
    container_name: mining-equipment-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - SIMULATION_RATE=10
      - EQUIPMENT_COUNT=10
    networks:
      - mining-network
    restart: unless-stopped

  # 人员定位模拟器
  personnel-simulator:
    build:
      context: ../mock-data
      dockerfile: Dockerfile.personnel
    container_name: mining-personnel-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - PERSONNEL_COUNT=50
      - SIMULATION_RATE=2
    networks:
      - mining-network
    restart: unless-stopped

  # 环境数据模拟器
  environment-simulator:
    build:
      context: ../mock-data
      dockerfile: Dockerfile.environment
    container_name: mining-environment-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - SENSOR_COUNT=20
      - SIMULATION_RATE=1
    networks:
      - mining-network
    restart: unless-stopped

networks:
  mining-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  zookeeper_data:
  kafka_data:
  tdengine_data:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  flink-checkpoints:
