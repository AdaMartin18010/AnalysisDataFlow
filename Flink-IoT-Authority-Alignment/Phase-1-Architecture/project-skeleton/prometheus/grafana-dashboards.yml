apiVersion: 1

providers:
  - name: 'Flink IoT Dashboards'
    orgId: 1
    folder: 'Flink IoT'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
