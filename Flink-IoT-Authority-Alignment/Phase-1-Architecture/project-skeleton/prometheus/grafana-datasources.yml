# ============================================================================
# Grafana 数据源配置
# 文档编号: F-GRAFANA-DS-07
# 形式化等级: L4
# 创建时间: 2026-04-05
# ============================================================================

apiVersion: 1

datasources:
  # --------------------------------------------------------------------------
  # Prometheus 数据源
  # --------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
      manageAlerts: true
      alertmanagerUid: prometheus
      prometheusType: Prometheus
      cacheLevel: 'High'
      disableRecordingRules: false
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m
    secureJsonData: {}

  # --------------------------------------------------------------------------
  # InfluxDB 数据源
  # --------------------------------------------------------------------------
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    editable: true
    jsonData:
      version: Flux
      organization: flink-iot
      defaultBucket: sensor-data
      tlsSkipVerify: true
    secureJsonData:
      token: flink-iot-token-12345

  # --------------------------------------------------------------------------
  # InfluxDB (Legacy) 数据源 - 用于InfluxQL查询
  # --------------------------------------------------------------------------
  - name: InfluxDB-Legacy
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    editable: true
    database: sensor-data
    user: admin
    jsonData:
      httpMode: GET
    secureJsonData:
      password: flink-iot-2024

  # --------------------------------------------------------------------------
  # Loki 日志数据源 (可选)
  # --------------------------------------------------------------------------
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'

  # --------------------------------------------------------------------------
  # Jaeger 分布式追踪 (可选)
  # --------------------------------------------------------------------------
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        tags: ['pod', 'namespace']
        mappedTags: [{ key: 'service.name', value: 'service' }]
        mapTagNamesEnabled: false
        spanStartTimeShift: '1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        filterBySpanID: false
