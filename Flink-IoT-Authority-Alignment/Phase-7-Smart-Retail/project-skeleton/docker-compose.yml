# Flink IoT 智能零售项目 - Docker Compose配置
# 适用于Phase-7-Smart-Retail项目

version: '3.8'

services:
  # ========================================
  # Zookeeper (Kafka依赖)
  # ========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: retail-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - retail-network

  # ========================================
  # Kafka消息队列
  # ========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: retail-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "rfid-events:3:1,weight-events:3:1,vision-events:3:1,customer-position:3:1,customer-interaction:3:1,pos-sales:3:1,inventory-state:3:1,inventory-alerts:3:1,heatmap-data:3:1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - retail-network

  # ========================================
  # PostgreSQL数据仓库
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: retail-postgres
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_pass
      POSTGRES_DB: retail_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - retail-network

  # ========================================
  # Redis缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - retail-network

  # ========================================
  # Flink JobManager
  # ========================================
  jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: retail-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - FLINK_PROPERTIES=
          jobmanager.memory.process.size: 2048m
          jobmanager.memory.jvm-heap.size: 1536m
    volumes:
      - ./flink-sql:/opt/flink/sql
      - ./mock-data:/opt/flink/data
    networks:
      - retail-network

  # ========================================
  # Flink TaskManager
  # ========================================
  taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: retail-flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - FLINK_PROPERTIES=
          taskmanager.memory.process.size: 4096m
          taskmanager.memory.flink.size: 3072m
          taskmanager.numberOfTaskSlots: 4
    networks:
      - retail-network

  # ========================================
  # 传感器数据模拟器
  # ========================================
  sensor-simulator:
    build: 
      context: ./rfid-simulator
      dockerfile: Dockerfile
    container_name: retail-sensor-simulator
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STORE_ID: STORE_001
      SIMULATION_SPEED: "5"
      LOG_LEVEL: INFO
    volumes:
      - ./mock-data:/app/data
    networks:
      - retail-network

  # ========================================
  # Schema Registry (Kafka schema管理)
  # ========================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: retail-schema-registry
    depends_on:
      - kafka
    ports:
      - "8082:8082"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8082
    networks:
      - retail-network

  # ========================================
  # Kafka Connect (数据集成)
  # ========================================
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: retail-kafka-connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java
    networks:
      - retail-network

  # ========================================
  # Grafana可视化
  # ========================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: retail-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    networks:
      - retail-network

  # ========================================
  # Prometheus监控
  # ========================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: retail-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - retail-network

  # ========================================
  # MinIO对象存储 (S3兼容)
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: retail-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - retail-network

  # ========================================
  # Kafdrop (Kafka UI)
  # ========================================
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: retail-kafdrop
    depends_on:
      - kafka
    ports:
      - "9002:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - retail-network

volumes:
  zookeeper-data:
  kafka-data:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:
  minio-data:

networks:
  retail-network:
    driver: bridge
