# StreamingCheckpoint.tla TLC 模型检测配置文件
#
# 使用方法:
# 1. 在 TLA+ Toolbox 中: 创建新模型并导入此配置
# 2. 命令行: java -cp tla2tools.jar tlc2.TLC StreamingCheckpoint -config StreamingCheckpoint.cfg
#
# 所属阶段: Flink/04-runtime | 形式化等级: L5
# 状态: 标准验证配置（3 Tasks + 2 Barriers）

# =============================================================================
# 常量实例化 (CONSTANTS)
# =============================================================================

# 逻辑算子集合：Source -> Map -> Sink 的线性 DAG
CONSTANT Operators = {op_src, op_map, op_sink}

# 物理 Task 集合：每个算子一个并行实例
CONSTANT Tasks = {t_src, t_map, t_sink}

# 算子类型映射
CONSTANT OperatorType = [t_src |-> "source", t_map |-> "map", t_sink |-> "sink"]

# Barrier ID 集合：对应 Checkpoint epoch {1, 2}
CONSTANT Barriers = {1, 2}

# Checkpoint epoch 编号集合
CONSTANT Checkpoints = {1, 2}

# 状态快照标识集合
CONSTANT StateSnapshots = {s1, s2}

# DAG 上游关系：Source 无上游，Map 的上游是 Source，Sink 的上游是 Map
CONSTANT Upstream = [t_src |-> {}, t_map |-> {t_src}, t_sink |-> {t_map}]

# DAG 下游关系
CONSTANT Downstream = [t_src |-> {t_map}, t_map |-> {t_sink}, t_sink |-> {}]

# 最大在途数据量：限制状态空间，防止 inFlightData 序列无限增长
CONSTANT MaxInFlight = 3

# =============================================================================
# 初始状态与下一步关系
# =============================================================================

INIT Init
NEXT Next

# =============================================================================
# 不变式检查 (INVARIANTS)
# =============================================================================

# 基础类型不变式：所有变量始终保持合法类型
INVARIANT TypeInvariant

# Checkpoint 完整性：每个全局完成的 checkpoint，所有 task 均已确认快照
INVARIANT CheckpointCompleteness

# Exactly-Once 核心不变式：端到端 exactly-once 语义保证
INVARIANT ExactlyOnceInv

# 无孤立快照状态：已确认快照必须与 barrier acknowledged 状态一致
INVARIANT NoOrphanedState

# 快照一致性：同一 checkpoint 下所有 task 的快照构成一致割
INVARIANT SnapshotConsistency

# =============================================================================
# 活性性质检查 (PROPERTIES)
# =============================================================================

# 每个已触发的 Checkpoint 最终全局完成（在 Fairness 条件下）
PROPERTY EventuallyCheckpointCompletes(1)

# Barrier 从 Source 最终传播到所有 Sink
PROPERTY BarrierEventuallyReachesSinks(1)

# Sink 的 in_flight 记录在 checkpoint 完成后最终变为 committed
PROPERTY PendingRecordsEventuallyCommitted

# =============================================================================
# 状态约束 (CONSTRAINT)
# =============================================================================

# 状态约束用于限制 TLC 搜索的状态空间，防止状态爆炸。
# 以下约束需要在 StreamingCheckpoint.tla 模块中定义对应的 StateConstraint
# 谓词后启用。当前配置已通过 CONSTANTS 的小值赋值（Barriers={1,2},
# MaxInFlight=3）实现对状态空间的初步限制。
#
# 建议加入模块的 StateConstraint 定义：
#   StateConstraint ==
#       /\ \A t \in Tasks : Len(inFlightData[t]) <= MaxInFlight
#       /\ \A t \in Tasks : Len(outputRecords[t]) <= 5
#       /\ Cardinality(completedCheckpoints) <= 2
#
# CONSTRAINT StateConstraint

# =============================================================================
# 对称性优化 (SYMMETRY)
# =============================================================================

# Barrier ID 是同质的，启用对称性约简可显著减少等价状态。
# 注意：Tasks 集合因 OperatorType 不同（source/map/sink）而不具备完整
# 对称性；若扩展为多个同类型 Task（如 2 个 Map），需在模块中定义
# 子集置换集合后再声明 SYMMETRY。
SYMMETRY Barriers

# =============================================================================
# 运行选项 (OPTIONS)
# =============================================================================

# 启用死锁检查（TLC 默认行为）
CHECK_DEADLOCK

# =============================================================================
# 模型配置说明
# =============================================================================
#
# 1. Task 数量与拓扑:
#    - 3 Tasks (1 Source + 1 Map + 1 Sink): 最小线性 DAG，可快速验证核心语义
#    - 5 Tasks (1 Source + 2 Map + 1 Window + 1 Sink): 验证分支/合并拓扑
#    - 7+ Tasks: 验证复杂 DAG，状态空间指数增长
#
# 2. Barrier / Checkpoint 设置:
#    - {1}: 验证单个 checkpoint 的完整生命周期（最小状态空间）
#    - {1, 2}: 验证连续 checkpoint 的叠加与隔离（推荐配置）
#    - {1, 2, 3}: 验证多 checkpoint 并发场景，状态空间显著增大
#
# 3. MaxInFlight 设置:
#    - 2-3: 基础验证，限制在途数据缓冲区大小（推荐）
#    - 5+: 验证反压前的高吞吐场景，状态空间增大
#
# 4. 建议的验证顺序:
#    a) 先用 1 个 Barrier 检查所有不变式（最小状态空间，快速反馈）
#    b) 增加 Barrier 数量验证连续 checkpoint 场景
#    c) 启用活性性质检查（需要 Fairness 条件，计算开销更大）
#    d) 逐步扩展 Task 数量和 DAG 复杂度
#
# 5. 状态空间估算（3 Tasks, 2 Barriers, MaxInFlight=3）:
#    - 类型状态空间理论乘积上界: ~10^18
#    - 实际可达状态（受动作约束限制）: ~10^4 ~ 10^5
#    - 预估 TLC 运行时间: < 5 min
#    - 预估内存占用: < 2 GB
#
# 6. FORMAL-GAP 与验证范围:
#    - 当前配置验证的是无故障、网络可靠环境下的 exactly-once 语义
#    - 未覆盖：Task 故障恢复、网络分区、反压超时、端到端外部系统事务
#    - 这些场景需在模块中补充故障模型和恢复协议后重新验证
#
# =============================================================================
