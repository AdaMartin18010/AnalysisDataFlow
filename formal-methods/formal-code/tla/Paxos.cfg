# Paxos.tla TLC 模型检测配置文件
# 
# 使用方法:
# 1. 在 TLA+ Toolbox 中: 创建新模型并导入此配置
# 2. 命令行: java -cp tla2tools.jar tlc2.TLC Paxos -config Paxos.cfg
#
# 所属阶段: Struct/ | 形式化等级: L5
# 状态: 基础框架配置

# =============================================================================
# 常量实例化 (CONSTANTS)
# =============================================================================

# Acceptor 集合 - 接受者节点
# 3 个 Acceptor 是支持 1 个故障的最小配置
CONSTANT Acceptor = {a1, a2, a3}

# Proposer 集合 - 提议者节点
CONSTANT Proposer = {p1, p2}

# 可提议的值集合
CONSTANT Value = {v1, v2}

# 选票号集合 - 用于排序提议
# 使用自然数子集
CONSTANT Ballot = {0, 1}

# Quorum 法定集合 - 多数派的子集族
# 对于 3 个 Acceptor，Quorum 可以是任意 2 个
CONSTANT Quorum = {{a1, a2}, {a1, a3}, {a2, a3}}

# =============================================================================
# 对称性优化 (SYMMETRY)
# =============================================================================

# 启用对称性约简
SYMMETRY Acceptor
SYMMETRY Value

# =============================================================================
# 不变式检查 (INVARIANTS)
# =============================================================================

# 基础类型不变式
INVARIANT TypeInvariant

# 核心安全性不变式 - Paxos 的核心保证
INVARIANT Consistency
INVARIANT ConsistencyStrong
INVARIANT Nontriviality

# 辅助不变式
INVARIANT BallotPromiseConsistency
INVARIANT SingleValuePerBallot
INVARIANT Safety

# 组合不变式
INVARIANT Invariant

# 注意: 以下不变式在基础框架中可能不完全成立，需要在完整实现后启用
# INVARIANT QuorumIntersectionProperty

# =============================================================================
# 活性性质检查 (PROPERTIES)
# =============================================================================

# 注意: 活性性质的检查需要完整实现动作定义
# 在基础框架阶段可以先注释掉

# PROPERTY EventuallyValueChosen
# PROPERTY Liveness

# =============================================================================
# 状态约束 (CONSTRAINT)
# =============================================================================

# 可选：添加状态约束以限制搜索深度
# 这在处理无限状态空间时特别有用
# CONSTRAINT StateConstraint

# =============================================================================
# 配置说明
# =============================================================================
#
# 1. Acceptor 数量:
#    - 3 Acceptor: 最小配置，可以容忍 1 个故障（F=1）
#    - 5 Acceptor: 可以容忍 2 个故障（F=2），Quorum 大小为 3
#    - 注意: 状态空间随 Acceptor 数量指数增长
#
# 2. Quorum 定义:
#    - 3 个 Acceptor 时，Quorum 是任意 2 个
#    - 5 个 Acceptor 时，Quorum 是任意 3 个
#    - 关键性质: 任意两个 Quorum 必须有交集
#
# 3. Ballot 设置:
#    - {0, 1}: 基础验证，检查 Phase 1/2 逻辑
#    - {0, 1, 2}: 验证多轮提议竞争场景
#    - 更大的 Ballot 集合: 全面验证，但状态空间会显著增大
#
# 4. Value 设置:
#    - {v1}: 单值场景，验证基本流程
#    - {v1, v2}: 多值竞争场景，验证一致性保证
#
# 5. 建议的验证顺序:
#    a) 先用单值和 2 个 ballot 检查基本类型
#    b) 增加 Value 数量验证一致性
#    c) 逐步完善动作实现
#    d) 最后验证活性性质
#
# =============================================================================
# Paxos 协议关键性质回顾
# =============================================================================
#
# 安全性（Safety）:
#   - 一致性（Consistency）: 最多一个值被选中
#   - 非平凡性（Nontriviality）: 只有被提议的值才能被选中
#
# 活性（Liveness）:
#   - 如果多数派 Acceptor 存活且可以通信，最终某个值会被选中
#   - 需要假设网络最终可靠且有唯一的 Leader（Single-Decree Paxos）
#
# 不变式验证重点:
#   1. Consistency - 核心安全性保证
#   2. BallotPromiseConsistency - Phase 1 承诺机制正确性
#   3. SingleValuePerBallot - 每个 ballot 最多一个值
#
# =============================================================================
