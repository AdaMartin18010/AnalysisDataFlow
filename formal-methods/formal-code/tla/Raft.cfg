# Raft.tla TLC 模型检测配置文件
# 
# 使用方法:
# 1. 在 TLA+ Toolbox 中: 创建新模型并导入此配置
# 2. 命令行: java -cp tla2tools.jar tlc2.TLC Raft -config Raft.cfg
#
# 所属阶段: Struct/ | 形式化等级: L5
# 状态: 基础框架配置

# =============================================================================
# 常量实例化 (CONSTANTS)
# =============================================================================

# 服务器节点集合
# 5 个节点是典型的 Raft 部署配置
CONSTANT Server = {s1, s2, s3, s4, s5}

# 可提交的客户端命令值
# 使用简化的值集合
CONSTANT Value = {v1, v2}

# 最大任期号（限制状态空间）
# 对于基础框架验证，较小的值即可
CONSTANT MaxTerm = 3

# 最大日志长度（限制状态空间）
# 防止无限增长的日志导致状态空间爆炸
CONSTANT MaxLogLength = 3

# =============================================================================
# 对称性优化 (SYMMETRY)
# =============================================================================

# 启用对称性约简
# TLC 会将 Server 的排列视为等价状态
SYMMETRY Server

# 对 Value 也启用对称性
SYMMETRY Value

# =============================================================================
# 不变式检查 (INVARIANTS)
# =============================================================================

# 基础类型不变式
INVARIANT TypeInvariant

# 核心安全性不变式
INVARIANT ElectionSafety
INVARIANT TermMonotonicity
INVARIANT CommitIndexMonotonicity

# 组合不变式
INVARIANT Invariant

# 注意: 以下不变式在基础框架中可能不完全成立，需要在完整实现后启用
# INVARIANT LeaderAppendOnly
# INVARIANT LogMatching
# INVARIANT LeaderCompleteness
# INVARIANT StateMachineSafety

# =============================================================================
# 活性性质检查 (PROPERTIES)
# =============================================================================

# 注意: 活性性质的检查需要完整实现动作定义
# 在基础框架阶段可以先注释掉

# PROPERTY ElectionEventuallySucceeds
# PROPERTY CommittedEntryEventuallyApplied

# =============================================================================
# 状态约束 (CONSTRAINT)
# =============================================================================

# 可选：添加状态约束以限制搜索深度
# CONSTRAINT StateConstraint

# =============================================================================
# 配置说明
# =============================================================================
#
# 1. 服务器数量:
#    - 3 服务器: 最小配置，可以容忍 1 个故障
#    - 5 服务器: 典型生产配置，可以容忍 2 个故障（推荐）
#    - 7 服务器: 高可用配置，状态空间会显著增大
#
# 2. MaxTerm 设置:
#    - 2-3: 基础验证，检查任期转换逻辑
#    - 5+: 更全面的验证，但状态空间会增大
#
# 3. MaxLogLength 设置:
#    - 2-3: 基础验证，检查日志复制逻辑
#    - 5+: 需要完整实现后才能有效验证
#
# 4. 建议的验证顺序:
#    a) 先用基础框架检查 TypeInvariant
#    b) 逐步完善动作实现
#    c) 启用更多安全性不变式
#    d) 最后验证活性性质
#
# =============================================================================
