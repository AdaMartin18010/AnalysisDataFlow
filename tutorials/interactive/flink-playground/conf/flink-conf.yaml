# Flink 配置文件 - Playground 环境
# =============================================================================

# -----------------------------------------------------------------------------
# JobManager 配置
# -----------------------------------------------------------------------------
jobmanager.memory.process.size: 2048m
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.bind-host: 0.0.0.0

# -----------------------------------------------------------------------------
# TaskManager 配置
# -----------------------------------------------------------------------------
taskmanager.memory.process.size: 4096m
taskmanager.numberOfTaskSlots: 4
taskmanager.bind-host: 0.0.0.0

# -----------------------------------------------------------------------------
# 高可用性配置 (基于文件系统)
# -----------------------------------------------------------------------------
high-availability: org.apache.flink.kubernetes.highavailability.KubernetesHaServicesFactory
high-availability.storageDir: file:///tmp/flink/ha

# -----------------------------------------------------------------------------
# Checkpoint 配置
# -----------------------------------------------------------------------------
execution.checkpointing.interval: 10s
execution.checkpointing.min-pause-between-checkpoints: 5s
execution.checkpointing.timeout: 10min
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
state.checkpoints.dir: s3://flink-checkpoints/checkpoints

# -----------------------------------------------------------------------------
# Savepoint 配置
# -----------------------------------------------------------------------------
state.savepoints.dir: s3://flink-savepoints/savepoints

# -----------------------------------------------------------------------------
# 状态后端配置
# -----------------------------------------------------------------------------
state.backend: rocksdb
state.backend.incremental: true
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.predefined-options: FLASH_SSD_OPTIMIZED

# -----------------------------------------------------------------------------
# 网络配置
# -----------------------------------------------------------------------------
taskmanager.memory.network.fraction: 0.15
taskmanager.memory.network.min: 128mb
taskmanager.memory.network.max: 512mb

# -----------------------------------------------------------------------------
# Web UI 配置
# -----------------------------------------------------------------------------
rest.bind-address: 0.0.0.0
rest.port: 8081
web.submit.enable: true
web.cancel.enable: true

# -----------------------------------------------------------------------------
# 类加载配置
# -----------------------------------------------------------------------------
classloader.resolve-order: parent-first
classloader.check-leaked-classloader: true

# -----------------------------------------------------------------------------
# 并行度默认值
# -----------------------------------------------------------------------------
parallelism.default: 2

# -----------------------------------------------------------------------------
# 重启策略
# -----------------------------------------------------------------------------
restart-strategy: fixed-delay
restart-strategy.fixed-delay.attempts: 3
restart-strategy.fixed-delay.delay: 10s

# -----------------------------------------------------------------------------
# 指标配置
# -----------------------------------------------------------------------------
metrics.reporters: prom
metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prom.port: 9249

# -----------------------------------------------------------------------------
# S3 配置 (MinIO)
# -----------------------------------------------------------------------------
s3.endpoint: http://minio:9000
s3.access-key: minioadmin
s3.secret-key: minioadmin
s3.path.style.access: true
